/* ---------- Import Controller ---------- */
class ImportController {
  static openModal(){
    const bodyHtml = `
      <div class="field full">
        <label>Selecione um arquivo (JSON, CSV, TXT ou HTML)</label>
        <input type="file" id="import-file" accept=".json,.csv,.txt,.html,.htm">
        <p class="hint">O formato é detectado automaticamente pela extensão do arquivo.</p>
      </div>
      <div id="import-status" style="font-size:13px;color:var(--text-1)"></div>
    `;
    const {el, close} = Modal.open({
      title:'Importar dados',
      bodyHtml,
      footerHtml:`<button class="btn btn-ghost" data-cancel>Cancelar</button>`,
      onMount:(modalEl, closeFn)=>{
        modalEl.querySelector('[data-cancel]').addEventListener('click', closeFn);
        modalEl.querySelector('#import-file').addEventListener('change', async (ev)=>{
          const file = ev.target.files[0];
          if(!file) return;
          const statusEl = modalEl.querySelector('#import-status');
          statusEl.textContent = 'Lendo arquivo...';
          Loading.show('Importando dados...');
          try{
            const key = ImporterRegistry.detectByExtension(file.name);
            const importer = key && ImporterRegistry.get(key);
            if(!importer) throw new Error('Formato de arquivo não suportado.');
            const text = await file.text();
            const {exam, questions} = importer.parse(text);
            questions.forEach(q=> StorageManager.upsertQuestion(q));
            if(exam) StorageManager.upsertExam(exam);
            Loading.hide();
            statusEl.textContent = `Importado: ${questions.length} questão(ões)${exam?` e 1 exame ("${exam.title}")`:''}.`;
            Toast.show(`Importação concluída: ${questions.length} questão(ões).`, 'success');
            setTimeout(()=>{ closeFn(); App.instance.router.go('dashboard'); }, 900);
          }catch(err){
            Loading.hide();
            console.error(err);
            statusEl.textContent = 'Erro ao importar: ' + err.message;
            Toast.show('Falha na importação: ' + err.message, 'error');
          }
        });
      }
    });
  }
}

/* ---------- Export Controller ---------- */
class ExportController {
  static openModal(examId){
    const exam = StorageManager.getExam(examId);
    if(!exam){ Toast.show('Exame não encontrado.', 'error'); return; }
    const questions = StorageManager.getQuestions().filter(q=>exam.questionIds.includes(q.id));
    const bodyHtml = `
      <p style="font-size:13px;color:var(--text-1);margin-bottom:14px">Escolha o formato de exportação para "<strong>${Util.escapeHtml(exam.title)}</strong>" (${questions.length} questões).</p>
      <div class="row" style="gap:10px">
        <button class="btn btn-primary" data-export="json">JSON</button>
        <button class="btn btn-primary" data-export="csv">CSV</button>
        <button class="btn btn-primary" data-export="html">HTML</button>
      </div>
    `;
    Modal.open({
      title:'Exportar exame',
      bodyHtml,
      onMount:(modalEl, closeFn)=>{
        modalEl.querySelectorAll('[data-export]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            const exporter = ExporterRegistry.get(btn.dataset.export);
            const content = exporter.export(exam, questions);
            const filename = `${exam.title.replace(/[^a-z0-9]+/gi,'_')||'exame'}.${exporter.extension}`;
            Util.download(filename, content, exporter.mime);
            Toast.show(`Exportado como ${exporter.label}.`, 'success');
            closeFn();
          });
        });
      }
    });
  }
}

/* =========================================================================
   PLAYER CONTROLLER (execução do exame em tela cheia)
   ========================================================================= */
class PlayerController {
  static state = null;

  /* IA offline: monta um simulado dinâmico com as questões mais fracas/atrasadas. */
  static startSmartReview(limit=15){
    const weak = AITutor.pickWeak(limit);
    if(!weak.length){ Toast.show('Ainda não há questões suficientes. Faça um simulado primeiro.', 'warn'); return; }
    const tempExam = new Exam({
      id: Util.uid('exam_smart'),
      title: 'Revisão inteligente (IA)',
      description: 'Questões priorizadas pelo seu histórico de acertos e repetição espaçada.',
      category: 'Revisão', timeMinutes: Math.max(5, Math.round(weak.length*1.2)),
      passScore: 70, questionIds: weak.map(q=>q.id)
    });
    StorageManager.upsertExam(tempExam);
    this.start(tempExam.id);
  }

  static start(examId, resumeSession=null){
    const exam = StorageManager.getExam(examId);
    if(!exam){ Toast.show('Exame não encontrado.', 'error'); return; }
    // IMPORTANTE: converter para instâncias de Question, pois vêm do storage como objetos simples (JSON).
    // Sem isso, métodos como q.isCorrect() não existem e quebram Finalizar/feedback/olho.
    let questions = StorageManager.getQuestions()
      .filter(q=>exam.questionIds.includes(q.id))
      .map(q=>new Question(q));
    if(!questions.length){ Toast.show('Este exame não possui questões vinculadas.', 'error'); return; }

    const settings = StorageManager.getSettings();

    // --- Retomar sessão salva ---
    if(resumeSession && resumeSession.order && resumeSession.order.length){
      const byId = new Map(questions.map(q=>[q.id,q]));
      const ordered = resumeSession.order.map(id=>byId.get(id)).filter(Boolean);
      if(ordered.length) questions = ordered;
    } else {
      if(settings.randomOrder) questions = Util.shuffle(questions);
      if(settings.randomAlternatives){
        questions = questions.map(q=>{
          if(['single','multi','image'].includes(q.type)){
            const clone = new Question(q);
            clone.options = Util.shuffle(q.options);
            return clone;
          }
          return q;
        });
      }
    }

    const elapsedBefore = resumeSession?.elapsedSeconds || 0;
    this.state = {
      exam, questions,
      answers: resumeSession?.answers || {}, // qid -> answer
      marked: new Set(resumeSession?.marked || []),
      revealed: new Set(),
      currentIndex: resumeSession?.currentIndex || 0,
      startedAt: Date.now() - elapsedBefore*1000,
      timer: null,
      streak: 0,
      lastMilestone: 0,
      showAnswerAfterSelect: !!settings.showAnswerAfterSelect,
      allowRevealAnswer: settings.allowRevealAnswer !== false,
      allowFinishAnytime: settings.allowFinishAnytime !== false
    };

    this._mountShell();
    this._renderNav();
    this._renderQuestion();

    const totalSeconds = exam.timeMinutes * 60;
    this.state.timer = new ExamTimer({
      totalSeconds: Math.max(1, totalSeconds - elapsedBefore),
      onTick: (remaining) => { this._updateTimerDisplay(remaining); this._persistSession(); },
      onWarn: (mins) => {
        SoundFx.beep(mins<=1?1100:660, 200);
        Toast.show(`Atenção: restam ${mins} minuto(s)!`, 'warn', 4000);
      },
      onEnd: () => { Toast.show('Tempo esgotado! Enviando exame automaticamente.', 'warn'); this.finish(true); }
    });
    this.state.timer.start();
    this._persistSession();

    document.getElementById('player-view').classList.add('show');
    if(document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  }

  static _persistSession(){
    if(!this.state) return;
    try{
      StorageManager.saveSession({
        examId: this.state.exam.id,
        order: this.state.questions.map(q=>q.id),
        answers: this.state.answers,
        marked: [...this.state.marked],
        currentIndex: this.state.currentIndex,
        elapsedSeconds: Math.round((Date.now()-this.state.startedAt)/1000),
        savedAt: new Date().toISOString()
      });
    }catch(e){}
  }

  static _mountShell(){
    const root = document.getElementById('player-view');
    root.innerHTML = `
      <div class="player-top">
        <button class="btn btn-icon btn-ghost" id="p-exit" title="Sair">✕</button>
        <button class="btn btn-icon btn-ghost" id="p-toggle-nav" title="Mostrar/ocultar questões">☰</button>
        <div class="player-progress-wrap"><div class="player-progress-bar" id="p-progress" style="width:0%"></div></div>
        ${this.state.allowRevealAnswer ? `<button class="btn btn-icon btn-ghost" id="p-reveal" title="Revelar resposta correta">👁️</button>` : ''}
        <div class="timer-pill" id="p-timer">--:--</div>
      </div>
      <div class="player-body">
        <div class="player-nav-list" id="p-nav" role="navigation" aria-label="Navegação entre questões"></div>
        <div class="player-question-area" id="p-question"></div>
      </div>
      <div id="p-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <div class="player-footer">
        <div class="grp">
          <button class="btn" id="p-prev">← Anterior</button>
          <button class="btn" id="p-skip">Pular</button>
        </div>
        <div class="grp">
          <button class="btn" id="p-mark">☆ Marcar</button>
          <button class="btn btn-primary" id="p-next">Próxima →</button>
          <button class="btn btn-danger" id="p-finish">Finalizar</button>
        </div>
      </div>
    `;
    root.querySelector('#p-exit').addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Sair do exame', message:'Seu progresso será perdido. Deseja realmente sair?', confirmLabel:'Sair', danger:true});
      if(ok) this._exitWithoutSaving();
    });
    root.querySelector('#p-prev').addEventListener('click', ()=>this._move(-1));
    root.querySelector('#p-next').addEventListener('click', ()=>this._move(1));
    root.querySelector('#p-skip').addEventListener('click', ()=>this._move(1));
    root.querySelector('#p-mark').addEventListener('click', ()=>this._toggleMark());
    root.querySelector('#p-finish').addEventListener('click', ()=>this._confirmFinish());
    root.querySelector('#p-toggle-nav').addEventListener('click', ()=>{
      root.querySelector('#p-nav').classList.toggle('collapsed');
    });
    root.querySelector('#p-reveal')?.addEventListener('click', ()=>this._toggleReveal());

    // Navegação por teclado (acessibilidade / eficiência no desktop)
    this._keyHandler = (e)=>{
      if(!document.getElementById('player-view').classList.contains('show')) return;
      const tag = (e.target.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea' || tag==='select') return;
      if(e.defaultPrevented) return;
      const q = this.state.questions[this.state.currentIndex];
      if(e.key==='ArrowRight'){ e.preventDefault(); this._move(1); }
      else if(e.key==='ArrowLeft'){ e.preventDefault(); this._move(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); this._move(1); }
      else if(/^[1-9]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = Number(e.key)-1;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(/^[a-hA-H]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = e.key.toLowerCase().charCodeAt(0)-97;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(e.key.toLowerCase()==='m'){ e.preventDefault(); this._toggleMark(); }
    };
    document.addEventListener('keydown', this._keyHandler);
    // Swipe horizontal entre questões (padrão mobile, uso com o polegar)
    const area = root.querySelector('#p-question');
    let tsx=0, tsy=0, tst=0;
    area.addEventListener('touchstart', (e)=>{
      const t = e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; tst=Date.now();
    }, {passive:true});
    area.addEventListener('touchend', (e)=>{
      const t = e.changedTouches[0];
      const dx = t.clientX - tsx, dy = t.clientY - tsy, dt = Date.now()-tst;
      // gesto válido: horizontal, rápido, e não sobre uma seleção de texto
      if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.8 && dt < 600){
        if(dx < 0) this._move(1); else this._move(-1);
      }
    }, {passive:true});
  }

  static _announce(msg){
    const live = document.getElementById('p-live');
    if(live) live.textContent = msg;
  }
  static _selectByIndex(idx){
    const q = this.state.questions[this.state.currentIndex];
    const opt = q.options[idx];
    if(!opt) return;
    if(q.type==='multi'){
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      cur.has(opt.id) ? cur.delete(opt.id) : cur.add(opt.id);
      this.state.answers[q.id] = [...cur];
    } else {
      this.state.answers[q.id] = opt.id;
      this._trackStreak(q);
    }
    this._afterAnswer();
  }
  static _afterAnswer(){
    this._persistSession();
    this._renderQuestion();
    this._renderNav();
  }
  static _trackStreak(q){
    // Atualiza streak apenas para tipos objetivos com resposta imediata
    if(!this.state.showAnswerAfterSelect) return;
    const correct = q.isCorrect(this.state.answers[q.id]);
    if(correct){
      this.state.streak++;
      Gamification.noteStreak(this.state.streak);
      if(this.state.streak>0 && this.state.streak%5===0){
        RewardPop.show('🔥', `${this.state.streak} seguidas!`, 'Continue assim!', 1400);
        this._announce(`Sequência de ${this.state.streak} acertos.`);
      }
    } else {
      this.state.streak = 0;
    }
  }

  static _toggleReveal(){
    const q = this.state.questions[this.state.currentIndex];
    this.state.revealed.has(q.id) ? this.state.revealed.delete(q.id) : this.state.revealed.add(q.id);
    this._renderQuestion();
  }

  static _feedbackBox(q, userAnswer, answered){
    const correctAns = this._fmtCorrect(q);
    // Reveladа sem ter respondido: caixa neutra mostrando só a resposta correta
    if(!answered){
      return `<div class="feedback-box correct">
        <div class="fb-head" style="color:var(--accent)">👁️ Resposta correta revelada</div>
        <div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>
        ${q.explanation?`<div class="fb-explain">💡 ${Util.escapeHtml(q.explanation)}</div>`:''}
      </div>`;
    }
    const correct = q.isCorrect(userAnswer);
    const yourAns = this._fmtAnswer(q, userAnswer) || '(sem resposta)';
    return `<div class="feedback-box ${correct?'correct':'incorrect'}">
      <div class="fb-head">${correct?'✓ Você acertou':'✕ Você errou'}</div>
      <div class="fb-line">Sua resposta: <strong>${Util.escapeHtml(yourAns)}</strong></div>
      ${!correct?`<div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>`:''}
      ${q.explanation?`<div class="fb-explain">💡 ${Util.escapeHtml(q.explanation)}</div>`:''}
    </div>`;
  }
  static _fmtAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': { const o=q.options.find(o=>o.id===ans); return o?o.text:''; }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  static _fmtCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return (q.correctShort||[]).join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }

  static _cleanup(){
    this.state?.timer?.stop();
    if(this._keyHandler){ document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
    document.getElementById('player-view').classList.remove('show');
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  }
  static _exitWithoutSaving(){
    StorageManager.clearSession();
    this._cleanup();
    App.instance.router.go('dashboard');
  }

  static _updateTimerDisplay(remaining){
    const pill = document.getElementById('p-timer');
    if(!pill) return;
    pill.textContent = Util.formatTime(remaining);
    pill.classList.remove('warn-30','warn-10','warn-1');
    const mins = remaining/60;
    if(mins<=1) pill.classList.add('warn-1');
    else if(mins<=10) pill.classList.add('warn-10');
    else if(mins<=30) pill.classList.add('warn-30');
  }

  static _renderNav(){
    const nav = document.getElementById('p-nav');
    const {questions, answers, marked, currentIndex} = this.state;
    const legend = `<div class="nav-legend" aria-hidden="true">
      <span class="lg"><span class="dot current"></span>Atual</span>
      <span class="lg"><span class="dot answered"></span>Respondida</span>
      <span class="lg"><span class="dot marked"></span>Marcada</span>
    </div>`;
    nav.innerHTML = legend + questions.map((q,i)=>{
      const classes = ['qnum'];
      if(i===currentIndex) classes.push('current');
      if(answers[q.id]!==undefined) classes.push('answered');
      if(marked.has(q.id)) classes.push('marked');
      const state = [];
      if(answers[q.id]!==undefined) state.push('respondida');
      if(marked.has(q.id)) state.push('marcada');
      const aria = `Questão ${i+1}${state.length?' ('+state.join(', ')+')':''}`;
      return `<button class="${classes.join(' ')}" data-goto="${i}" aria-label="${aria}" ${i===currentIndex?'aria-current="true"':''}>${i+1}</button>`;
    }).join('');
    nav.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{
      this.state.currentIndex = Number(b.dataset.goto);
      this._renderQuestion(); this._renderNav();
    }));
  }

  static _renderQuestion(){
    const {questions, currentIndex, answers} = this.state;
    const q = questions[currentIndex];
    const area = document.getElementById('p-question');
    const userAnswer = answers[q.id];
    document.getElementById('p-progress').style.width = `${Math.round(((currentIndex+1)/questions.length)*100)}%`;

    // determina se devemos mostrar a correção (após seleção) ou revelar a resposta
    const answered = userAnswer !== undefined && userAnswer !== null &&
      (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
    const revealed = this.state.revealed.has(q.id);
    const showFeedback = revealed || (this.state.showAnswerAfterSelect && answered);

    let bodyHtml = '';
    if(['single','boolean','image'].includes(q.type)){
      bodyHtml = q.options.map((o,i)=>{
        const isSel = userAnswer===o.id;
        let cls = 'q-option radio-type' + (isSel?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(isSel){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-single="${o.id}" role="radio" tabindex="0" aria-checked="${isSel}">
          <div class="marker"></div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(o.text)}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='multi'){
      bodyHtml = q.options.map((o,i)=>{
        const selected = Array.isArray(userAnswer) && userAnswer.includes(o.id);
        let cls = 'q-option' + (selected?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(selected){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-multi="${o.id}" role="checkbox" tabindex="0" aria-checked="${selected}">
          <div class="marker">${selected?'✓':''}</div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(o.text)}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='short'){
      bodyHtml = `<input class="input" id="p-short-answer" placeholder="Digite sua resposta..." value="${Util.escapeHtml(userAnswer||'')}">`;
    } else if(q.type==='matching'){
      const rightOptions = Util.shuffle(q.matchPairs.map(p=>p.right));
      bodyHtml = q.matchPairs.map((p,i)=>`
        <div class="row" style="margin-bottom:10px">
          <span style="min-width:160px;font-size:13.5px">${Util.escapeHtml(p.left)}</span>
          <select class="select" data-match-idx="${i}">
            <option value="">Selecione...</option>
            ${rightOptions.map(r=>`<option value="${Util.escapeHtml(r)}" ${userAnswer && userAnswer[i]===r?'selected':''}>${Util.escapeHtml(r)}</option>`).join('')}
          </select>
        </div>`).join('');
    } else if(q.type==='sequence'){
      const order = userAnswer || Util.shuffle(q.sequenceItems.map(s=>s.text));
      bodyHtml = `<div id="seq-sortable">${order.map((text,i)=>`
        <div class="q-option" draggable="true" data-seq-text="${Util.escapeHtml(text)}" style="cursor:grab">
          <span class="letter">${i+1}.</span><span>${Util.escapeHtml(text)}</span>
        </div>`).join('')}</div>
        <p class="hint">Arraste os itens para reordenar (ou use os botões ↑/↓).</p>`;
    }

    area.innerHTML = `
      <div class="q-index">Questão ${currentIndex+1} de ${questions.length} · ${QUESTION_TYPES[q.type]?.label||q.type}</div>
      ${q.image ? `<img class="q-image" src="${q.image}">` : ''}
      <div class="q-text">${Util.escapeHtml(q.text)}</div>
      <div id="q-options" ${q.type==='multi'?'role="group"':(['single','boolean','image'].includes(q.type)?'role="radiogroup"':'')} aria-label="Alternativas">${bodyHtml}</div>
      ${showFeedback ? this._feedbackBox(q, userAnswer, answered) : ''}
    `;

    // anúncio para leitores de tela ao renderizar feedback
    if(showFeedback && answered){
      this._announce(q.isCorrect(userAnswer) ? 'Resposta correta.' : `Resposta incorreta. Correta: ${this._fmtCorrect(q)}`);
    }

    // bind interactions
    const selectSingle = (el)=>{
      this.state.answers[q.id] = el.dataset.selectSingle;
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-single]').forEach(el=>{
      el.addEventListener('click', ()=>selectSingle(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectSingle(el); } });
    });
    const selectMulti = (el)=>{
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      const id = el.dataset.selectMulti;
      cur.has(id) ? cur.delete(id) : cur.add(id);
      this.state.answers[q.id] = [...cur];
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-multi]').forEach(el=>{
      el.addEventListener('click', ()=>selectMulti(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectMulti(el); } });
    });
    area.querySelector('#p-short-answer')?.addEventListener('input', (e)=>{
      this.state.answers[q.id] = e.target.value;
      this._persistSession();
      this._renderNav();
    });
    area.querySelectorAll('[data-match-idx]').forEach(sel=>sel.addEventListener('change', ()=>{
      const ans = this.state.answers[q.id] || {};
      ans[Number(sel.dataset.matchIdx)] = sel.value;
      this.state.answers[q.id] = ans;
      this._persistSession();
      this._renderNav();
    }));
    if(q.type==='sequence'){
      this._bindSequenceDrag(area, q);
      if(!this.state.answers[q.id]){
        this.state.answers[q.id] = [...area.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
      }
    }
    this._updateMarkButton();
  }

  static _bindSequenceDrag(area, q){
    const wrap = area.querySelector('#seq-sortable');
    let dragEl = null;
    wrap.querySelectorAll('[draggable]').forEach(item=>{
      item.addEventListener('dragstart', ()=>{ dragEl = item; item.style.opacity='.4'; });
      item.addEventListener('dragend', ()=>{ item.style.opacity='1'; this._syncSeqAnswer(wrap, q); });
      item.addEventListener('dragover', (e)=>{
        e.preventDefault();
        const after = this._getDragAfter(wrap, e.clientY);
        if(after==null) wrap.appendChild(dragEl); else wrap.insertBefore(dragEl, after);
      });
    });
  }
  static _getDragAfter(wrap, y){
    const els = [...wrap.querySelectorAll('[draggable]:not([style*="opacity: 0.4"])')];
    return els.reduce((closest, child)=>{
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height/2;
      if(offset < 0 && offset > closest.offset) return {offset, element: child};
      return closest;
    }, {offset:-Infinity}).element;
  }
  static _syncSeqAnswer(wrap, q){
    this.state.answers[q.id] = [...wrap.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
    this._renderNav();
  }

  static _move(delta){
    const {questions, currentIndex} = this.state;
    const next = Util.clamp(currentIndex+delta, 0, questions.length-1);
    this.state.currentIndex = next;
    this._checkMilestone();
    this._persistSession();
    this._renderQuestion(); this._renderNav();
  }
  static _checkMilestone(){
    const total = this.state.questions.length;
    const reached = this.state.currentIndex + 1;
    // marco de "metade do caminho"
    if(total>=6 && this.state.lastMilestone<1 && reached>=Math.ceil(total/2)){
      this.state.lastMilestone = 1;
      RewardPop.show('🚀', 'Metade concluída!', 'Você está indo muito bem!', 1500);
      this._announce('Você chegou à metade do exame.');
    }
  }
  static _toggleMark(){
    const q = this.state.questions[this.state.currentIndex];
    this.state.marked.has(q.id) ? this.state.marked.delete(q.id) : this.state.marked.add(q.id);
    this._persistSession();
    this._renderNav();
    this._updateMarkButton();
  }
  static _updateMarkButton(){
    const btn = document.getElementById('p-mark');
    if(!btn) return;
    const q = this.state.questions[this.state.currentIndex];
    const isMarked = this.state.marked.has(q.id);
    btn.textContent = isMarked ? '★ Marcada' : '☆ Marcar';
    btn.classList.toggle('btn-primary', isMarked);
    btn.setAttribute('aria-pressed', String(isMarked));
  }

  static async _confirmFinish(){
    const total = this.state.questions.length;
    const answeredCount = this.state.questions.filter(q=>{
      const a = this.state.answers[q.id];
      return a !== undefined && a !== null && (!Array.isArray(a) ? String(a).length>0 : a.length>0);
    }).length;
    const unanswered = total - answeredCount;
    let msg;
    if(unanswered>0){
      msg = `Você respondeu ${answeredCount} de ${total} questão(ões) (${unanswered} em branco). ` +
            `Você pode finalizar mesmo assim — o seu score será calculado sobre o total de ${total} questão(ões). Deseja finalizar agora?`;
    } else {
      msg = 'Deseja finalizar o exame e ver o seu score agora?';
    }
    const ok = await Modal.confirm({title:'Finalizar exame', message:msg, confirmLabel:'Finalizar e ver score'});
    if(ok) this.finish(false);
  }

  static finish(auto=false){
    const {exam, questions, answers, marked, startedAt, timer} = this.state;
    timer?.stop();
    const timeSpentSeconds = Math.round((Date.now()-startedAt)/1000);
    let correctCount = 0;
    const detail = questions.map(q=>{
      const userAnswer = answers[q.id];
      const correct = q.isCorrect(userAnswer);
      if(correct) correctCount++;
      // IA offline: registra desempenho por questão (repetição espaçada)
      const answered = userAnswer !== undefined && userAnswer !== null &&
        (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
      if(answered) AITutor.record(q.id, correct);
      return {questionId:q.id, question:q, userAnswer, correct, marked: marked.has(q.id)};
    });
    const percentage = Math.round((correctCount/questions.length)*100);
    const historyEntry = {
      id: Util.uid('hist'),
      examId: exam.id,
      examTitle: exam.title,
      date: new Date().toISOString(),
      correctCount, totalCount: questions.length, percentage,
      timeSpentSeconds,
      passed: percentage >= exam.passScore,
      markedCount: marked.size,
      detail: detail.map(d=>({questionId:d.questionId, userAnswer:d.userAnswer, correct:d.correct, marked:d.marked}))
    };
    StorageManager.addHistory(historyEntry);
    StorageManager.clearSession();

    // Gamificação: XP, nível e conquistas
    const gameResult = Gamification.registerExam({correctCount, totalCount: questions.length, percentage});

    this._cleanup();
    ResultController.show({exam, detail, historyEntry, gameResult});
  }
}

    const tempExam = new Exam({...exam, id:Util.uid('exam_retry'), title: exam.title + ' (revisão)', questionIds: subset.map(d=>d.questionId)});
    StorageManager.upsertExam(tempExam);
    PlayerController.start(tempExam.id);
  }
}

class ReviewView {
  get title(){ return 'Revisão'; }
  get crumb(){ return ''; }
  render(el, params){
    const {detail, exam} = params;
    el.innerHTML = `
      <div class="row between" style="margin-bottom:16px">
        <span style="font-size:13px;color:var(--text-1)">${Util.escapeHtml(exam.title||'')} — revisão detalhada</span>
        <button class="btn btn-ghost" id="rv-back">Voltar</button>
      </div>
      ${detail.map((d,i)=>this._item(d,i)).join('')}
    `;
    el.querySelector('#rv-back').addEventListener('click', ()=> App.instance.router.go('dashboard'));
  }
  _item(d,i){
    const q = d.question;
    const userAnswerText = this._formatAnswer(q, d.userAnswer);
    const correctAnswerText = this._formatCorrect(q);
    return `<div class="review-item ${d.correct?'correct':'incorrect'}">
      <div class="row between">
        <strong style="font-size:13.5px">${i+1}. ${Util.escapeHtml(q.text)}</strong>
        <span class="badge" style="background:${d.correct?'var(--good-soft)':'var(--bad-soft)'};color:${d.correct?'var(--good)':'var(--bad)'}">${d.correct?'Correta':'Incorreta'}</span>
      </div>
      <div class="review-answer ${d.correct?'correct':'incorrect'}">Sua resposta: ${Util.escapeHtml(userAnswerText||'(sem resposta)')}</div>
      ${!d.correct ? `<div class="review-answer correct">Resposta correta: ${Util.escapeHtml(correctAnswerText)}</div>` : ''}
      ${q.explanation ? `<div class="review-explain">💡 ${Util.escapeHtml(q.explanation)}</div>` : ''}
    </div>`;
  }
  _formatAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': {
        const o = q.options.find(o=>o.id===ans); return o?o.text:'';
      }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  _formatCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return q.correctShort.join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }
}

class App {
  static instance = null;
  constructor(){
    App.instance = this;
    SampleDataSeeder.seed();
    this.router = new Router(this);
    this._registerRoutes();
    this._buildRail();
    this._bindTopbar();
    this.applySettings(StorageManager.getSettings());
    this.router.go('dashboard');
    this._setupPWA();
    this._maybeOnboard();
  }
  _registerRoutes(){
    this.router.register('dashboard', new DashboardView());
    this.router.register('builder', new BuilderView());
    this.router.register('bank', new QuestionBankView());
    this.router.register('history', new HistoryView());
    this.router.register('profile', new ProfileView());
    this.router.register('settings', new SettingsView());
    this.router.register('result', new ResultView());
    this.router.register('review', new ReviewView());
  }
  _buildRail(){
    const rail = document.getElementById('rail');
    const logo = document.createElement('div');
    logo.className = 'rail-logo';
    logo.textContent = 'EF';
    rail.appendChild(logo);
    const items = [
      {route:'dashboard', icon:Icons.dashboard, tip:'Dashboard', label:'Início'},
      {route:'builder', icon:Icons.builder, tip:'Criador de Exames', label:'Criar'},
      {route:'bank', icon:Icons.bank, tip:'Banco de Questões', label:'Banco'},
      {route:'history', icon:Icons.history, tip:'Histórico', label:'Histórico'},
      {route:'profile', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 0 1-10 0Z"/><path d="M5 9a2 2 0 0 1-2-2V5h4"/><path d="M19 9a2 2 0 0 0 2-2V5h-4"/></svg>', tip:'Perfil & Conquistas', label:'Perfil'},
    ];
    items.forEach(it=>{
      const btn = document.createElement('button');
      btn.className = 'rail-btn';
      btn.dataset.route = it.route;
      btn.dataset.tip = it.tip;
      btn.setAttribute('aria-label', it.tip);
      btn.innerHTML = `${it.icon}<span class="rail-label">${it.label}</span>`;
      btn.addEventListener('click', ()=>this.router.go(it.route));
      rail.appendChild(btn);
    });
    const spacer = document.createElement('div');
    spacer.className = 'rail-spacer';
    rail.appendChild(spacer);
    const settingsBtn = document.createElement('button');
    settingsBtn.className = 'rail-btn';
    settingsBtn.dataset.route = 'settings';
    settingsBtn.dataset.tip = 'Configurações';
    settingsBtn.setAttribute('aria-label', 'Configurações');
    settingsBtn.innerHTML = `${Icons.settings}<span class="rail-label">Ajustes</span>`;
    settingsBtn.addEventListener('click', ()=>this.router.go('settings'));
    rail.appendChild(settingsBtn);
  }
  _bindTopbar(){
    document.getElementById('quick-new-btn').addEventListener('click', ()=>this.router.go('builder', {}));
    const moreBtn = document.getElementById('topbar-more-btn');
    const moreMenu = document.getElementById('topbar-more-menu');
    moreBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      moreMenu.classList.toggle('show');
    });
    document.addEventListener('click', ()=> moreMenu.classList.remove('show'));
    document.getElementById('menu-import-btn').addEventListener('click', ()=>{ moreMenu.classList.remove('show'); ImportController.openModal(); });
    document.getElementById('menu-install-btn').addEventListener('click', ()=>{ moreMenu.classList.remove('show'); this._promptInstall(); });
  }
  applySettings(s){
    document.body.classList.toggle('light', !s.darkMode);
    document.documentElement.style.setProperty('--font-scale', s.fontSize || 1);
    document.body.style.fontFamily = s.font==='mono' ? 'var(--mono)' : 'var(--sans)';
  }

  /* ---------- PWA: manifest dinâmico + service worker + botão instalar ---------- */
  _setupPWA(){
    try{
      // Manifest injetado via Blob (funciona quando servido por http/https)
      const icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='108' fill='%234f8cff'/%3E%3Ctext x='256' y='340' font-family='Arial' font-size='240' font-weight='bold' fill='white' text-anchor='middle'%3EEF%3C/text%3E%3C/svg%3E";
      const manifest = {
        name:'ExamForge — Simulador de Exames', short_name:'ExamForge',
        start_url:'.', display:'standalone', background_color:'#0d1117', theme_color:'#0d1117',
        description:'Simulador de exames offline, acessível e gamificado.',
        icons:[
          {src:icon, sizes:'192x192', type:'image/svg+xml', purpose:'any maskable'},
          {src:icon, sizes:'512x512', type:'image/svg+xml', purpose:'any maskable'}
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);

      // Service worker (só registra em contexto seguro http/https; ignora em file://)
      if('serviceWorker' in navigator && location.protocol.startsWith('http')){
        const swCode = `
          const CACHE='examforge-v1';
          self.addEventListener('install',e=>{self.skipWaiting()});
          self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
          self.addEventListener('fetch',e=>{
            if(e.request.method!=='GET')return;
            e.respondWith(
              caches.open(CACHE).then(c=>c.match(e.request).then(r=>{
                const net=fetch(e.request).then(resp=>{try{c.put(e.request,resp.clone())}catch(_){}; return resp}).catch(()=>r);
                return r||net;
              }))
            );
          });`;
        const swUrl = URL.createObjectURL(new Blob([swCode], {type:'text/javascript'}));
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      }

      // Instalar (disponível a qualquer momento via menu ⋯)
      window.addEventListener('beforeinstallprompt', (e)=>{
        e.preventDefault();
        this._deferredInstall = e;
      });
    }catch(err){ /* PWA opcional; não bloqueia o app */ }
  }

  async _promptInstall(){
    if(this._deferredInstall){
      this._deferredInstall.prompt();
      await this._deferredInstall.userChoice.catch(()=>{});
      this._deferredInstall = null;
    } else {
      Modal.open({
        title:'Instalar o ExamForge',
        bodyHtml:`<p style="font-size:13.5px;color:var(--text-1);line-height:1.7">
          Para instalar no seu dispositivo:<br><br>
          <strong>Android/Chrome:</strong> menu ⋮ → "Adicionar à tela inicial".<br>
          <strong>iPhone/Safari:</strong> botão Compartilhar → "Adicionar à Tela de Início".<br>
          <strong>Desktop:</strong> ícone de instalar na barra de endereço.<br><br>
          <em>Obs.: a instalação como app requer que a página seja aberta por um servidor (http/https). Aberto como arquivo local, ele funciona 100% offline, mas sem instalação nativa.</em>
        </p>`
      });
    }
  }

  /* ---------- Onboarding (coach marks no primeiro uso) ---------- */
  _maybeOnboard(){
    if(StorageManager.isOnboarded()) return;
    const steps = [
      {t:'Bem-vindo ao ExamForge 👋', p:'Um simulador de exames offline, acessível e gamificado. Vamos dar uma volta rápida.'},
      {t:'Crie ou importe questões 📚', p:'Monte exames do zero no Criador, ou importe de arquivos JSON, CSV, TXT e HTML.'},
      {t:'Pratique e ganhe XP 🎯', p:'A cada questão você recebe feedback na hora, ganha XP, sobe de nível e desbloqueia conquistas.'},
      {t:'Retome quando quiser ⏸️', p:'Seu progresso é salvo automaticamente. Feche e continue depois de onde parou.'}
    ];
    let i = 0;
    const backdrop = document.createElement('div');
    backdrop.className = 'coach-backdrop';
    const render = ()=>{
      const s = steps[i];
      backdrop.innerHTML = `<div class="coach-card" role="dialog" aria-modal="true" aria-label="${Util.escapeHtml(s.t)}">
        <h3>${Util.escapeHtml(s.t)}</h3>
        <p>${Util.escapeHtml(s.p)}</p>
        <div class="coach-steps">${steps.map((_,k)=>`<span class="cs ${k<=i?'on':''}"></span>`).join('')}</div>
        <div class="row between">
          <button class="btn btn-ghost" data-skip>Pular</button>
          <button class="btn btn-primary" data-next>${i<steps.length-1?'Próximo':'Começar'}</button>
        </div>
      </div>`;
      backdrop.querySelector('[data-skip]').addEventListener('click', done);
      backdrop.querySelector('[data-next]').addEventListener('click', ()=>{ if(i<steps.length-1){ i++; render(); } else done(); });
    };
    function done(){ StorageManager.setOnboarded(); backdrop.remove(); }
    document.body.appendChild(backdrop);
    render();
  }
}

document.addEventListener('DOMContentLoaded', ()=>{
  try{
    new App();
  }catch(err){
    console.error('Erro ao iniciar ExamForge', err);
    document.body.innerHTML = `<div style="padding:40px;color:#f85149;font-family:sans-serif">Erro ao iniciar a aplicação: ${err.message}</div>`;
  }
});

function enhanceExamRows(el){safe(()=>{const rows=[...el.querySelectorAll('[data-play-exam]')].map(b=>b.closest('.list-row')).filter(Boolean);const f=favs(),a=arch();rows.forEach(row=>{const play=row.querySelector('[data-play-exam]');if(!play)return;const id=play.dataset.playExam;if(a.includes(id)){row.style.display='none';return}if(row.querySelector('.fav-star'))return;const star=document.createElement('button');star.className='btn btn-icon btn-ghost fav-star '+(f.includes(id)?'on':'');star.title='Favoritar';star.innerHTML='★';star.onclick=()=>{let ff=favs();ff=ff.includes(id)?ff.filter(x=>x!==id):[...ff,id];setFavs(ff);Toast.show(ff.includes(id)?'Exame favoritado.':'Favorito removido.','success');App.instance.router.go('dashboard')};row.insertBefore(star,row.querySelector('[data-edit-exam]')||play);});});}

function patchStorageVersions(){if(StorageManager._proVersioned)return;const orig=StorageManager.upsertExam.bind(StorageManager);StorageManager.upsertExam=function(exam){if(exam&&exam.id&&!String(exam.id).startsWith('exam_pro')&&!String(exam.id).startsWith('exam_smart')&&!String(exam.id).startsWith('exam_retry')){const old=StorageManager.getExam(exam.id);if(old&&JSON.stringify(old)!==JSON.stringify(exam)){const v=versions();v[exam.id]=v[exam.id]||[];v[exam.id].unshift({at:new Date().toISOString(),exam:old});v[exam.id]=v[exam.id].slice(0,20);setVersions(v)}}return orig(exam)};StorageManager._proVersioned=true;}

function augmentBuilderUI(view,el){const row=el.querySelector('#b-save')?.parentElement;if(row&&!row.querySelector('#pro-version-btn')){const ind=document.createElement('span');ind.className='save-indicator';ind.id='pro-save-indicator';ind.textContent='Autosave ativo';row.appendChild(ind);const wb=document.createElement('button');wb.className='btn';wb.id='pro-wizard-btn';wb.type='button';wb.textContent='✨ Modo assistido';wb.onclick=openWizard;row.appendChild(wb);const vb=document.createElement('button');vb.className='btn';vb.id='pro-version-btn';vb.type='button';vb.textContent='Histórico de versões';vb.onclick=()=>openVersions(view.exam.id);row.appendChild(vb);}let timer=null;el.querySelectorAll('input,textarea,select').forEach(inp=>{inp.addEventListener('input',()=>{const ind=el.querySelector('#pro-save-indicator');if(ind){ind.className='save-indicator warn';ind.textContent='Salvando...'}clearTimeout(timer);timer=setTimeout(()=>{try{const e=view.exam;if(!e.title&&el.querySelector('#f-title'))e.title=el.querySelector('#f-title').value.trim()||'Rascunho sem título';e.description=el.querySelector('#f-desc')?.value.trim()||e.description;e.category=el.querySelector('#f-category')?.value.trim()||e.category;e.code=el.querySelector('#f-code')?.value.trim()||e.code;e.language=el.querySelector('#f-language')?.value||e.language;e.timeMinutes=Number(el.querySelector('#f-time')?.value)||e.timeMinutes;e.passScore=Number(el.querySelector('#f-pass')?.value)||e.passScore;e.author=el.querySelector('#f-author')?.value.trim()||e.author;e.version=el.querySelector('#f-version')?.value.trim()||e.version;e.updatedAt=new Date().toISOString();if(e.title)StorageManager.upsertExam(e);if(ind){ind.className='save-indicator ok';ind.textContent='Salvo automaticamente '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}}catch(err){if(ind){ind.className='save-indicator warn';ind.textContent='Autosave pausado'}}},650);});});}
function openVersions(id){const v=versions()[id]||[];Modal.open({title:'Histórico de versões',wide:true,bodyHtml:v.length?v.map((x,i)=>`<div class="version-row"><div><strong>Versão salva em ${fmtDate(x.at)}</strong><br><small>${Util.escapeHtml(x.exam.title||'Sem título')} · ${x.exam.questionIds?.length||0} questões</small></div><button class="btn btn-primary" data-restore="${i}">Restaurar</button></div>`).join(''):'<div class="empty-state"><h3>Nenhuma versão anterior</h3><p>As versões serão criadas automaticamente sempre que um exame salvo for alterado.</p></div>',onMount:(m,close)=>{m.querySelectorAll('[data-restore]').forEach(b=>b.onclick=()=>{const item=v[Number(b.dataset.restore)];if(item){StorageManager.upsertExam({...item.exam,updatedAt:new Date().toISOString()});Toast.show('Versão restaurada.','success');close();App.instance.router.go('builder',{examId:id})}})}})}
function openWizard(){let step=0;const data={title:'',category:'',questionIds:[],timeMinutes:30,passScore:70};const qs=StorageManager.getQuestions();const render=(root)=>{const pct=((step+1)/4)*100;root.querySelector('.modal-body').innerHTML=`<div class="wizard-progress"><span style="width:${pct}%"></span></div>${step===0?`<div class="wizard-step-title">1. Nome do exame</div><div class="field"><label>Título</label><input class="input" id="w-title" value="${Util.escapeHtml(data.title)}" placeholder="Ex: Awareness Cyber - Módulo 1"></div><div class="field"><label>Categoria</label><input class="input" id="w-category" value="${Util.escapeHtml(data.category)}" placeholder="Cyber Security, Cloud, OT..."></div>`:step===1?`<div class="wizard-step-title">2. Escolha as questões</div><div class="chip-row"><button class="filter-chip active" data-pick="all">Todas</button><button class="filter-chip" data-pick="weak">Mais fracas</button><button class="filter-chip" data-pick="recent">Recentes</button></div><div style="max-height:320px;overflow:auto">${qs.map(q=>`<label class="list-row"><input type="checkbox" data-w-q="${q.id}" ${data.questionIds.includes(q.id)?'checked':''}> <div class="meta"><div class="title">${Util.escapeHtml(q.text.slice(0,95))}</div><div class="desc">${Util.escapeHtml(q.category||'sem categoria')}</div></div></label>`).join('')||DashboardView._empty('Banco vazio','Crie ou importe questões primeiro.')}</div>`:step===2?`<div class="wizard-step-title">3. Tempo e aprovação</div><div class="form-grid"><div class="field"><label>Tempo em minutos</label><input class="input" type="number" id="w-time" value="${data.timeMinutes}"></div><div class="field"><label>Nota mínima %</label><input class="input" type="number" id="w-pass" value="${data.passScore}"></div></div>`:`<div class="wizard-step-title">4. Revisão final</div><div class="card"><strong>${Util.escapeHtml(data.title||'Exame sem título')}</strong><p style="color:var(--text-2);font-size:13px;margin-top:4px">${Util.escapeHtml(data.category||'Sem categoria')} · ${data.questionIds.length} questões · ${data.timeMinutes} min · aprovação ${data.passScore}%</p></div>`}`;root.querySelector('.modal-footer').innerHTML=`<button class="btn btn-ghost" data-w-cancel>Cancelar</button><button class="btn" data-w-back ${step===0?'disabled':''}>Voltar</button><button class="btn btn-primary" data-w-next>${step<3?'Próximo':'Criar exame'}</button>`;bind(root)};const collect=(root)=>{if(step===0){data.title=root.querySelector('#w-title')?.value.trim()||data.title;data.category=root.querySelector('#w-category')?.value.trim()||data.category}else if(step===1){data.questionIds=[...root.querySelectorAll('[data-w-q]:checked')].map(x=>x.dataset.wQ)}else if(step===2){data.timeMinutes=Number(root.querySelector('#w-time')?.value)||30;data.passScore=Number(root.querySelector('#w-pass')?.value)||70}};const bind=(root)=>{root.querySelector('[data-w-cancel]').onclick=()=>root.remove();root.querySelector('[data-w-back]')?.addEventListener('click',()=>{collect(root);step=Math.max(0,step-1);render(root)});root.querySelector('[data-w-next]').onclick=()=>{collect(root);if(step<3){step++;render(root)}else{if(!data.title){Toast.show('Informe um título.','error');step=0;render(root);return}const ex=new Exam({...data,description:'Criado pelo wizard assistido do ExamForge Pro.',version:'1.0'});StorageManager.upsertExam(ex);Toast.show('Exame criado com sucesso.','success');root.remove();App.instance.router.go('builder',{examId:ex.id})}};root.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{root.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');let ids=[];if(b.dataset.pick==='weak')ids=AITutor.pickWeak(20).map(q=>q.id);else if(b.dataset.pick==='recent')ids=qs.slice(-20).map(q=>q.id);else ids=qs.map(q=>q.id);root.querySelectorAll('[data-w-q]').forEach(c=>c.checked=ids.includes(c.dataset.wQ));});};const modal=Modal.open({title:'Wizard de criação de exame',wide:true,bodyHtml:'',footerHtml:' ',onMount:(m)=>render(m)});}
function buildCommandItems(q=''){const term=q.toLowerCase();const items=[];StorageManager.getExams().filter(e=>!arch().includes(e.id)).forEach(e=>items.push({type:'Exame',icon:'📝',name:e.title||'Sem título',desc:(e.category||'geral')+' · '+(e.questionIds?.length||0)+' questões',run:()=>PlayerController.start(e.id)}));StorageManager.getQuestions().forEach(x=>items.push({type:'Questão',icon:'❔',name:x.text.slice(0,90),desc:x.category||'sem categoria',run:()=>App.instance.router.go('bank')}));[{name:'Criar novo exame',type:'Ação',icon:'➕',run:()=>App.instance.router.go('builder',{})},{name:'Importar questões',type:'Ação',icon:'📥',run:()=>ImportController.openModal()},{name:'Abrir configurações',type:'Ação',icon:'⚙️',run:()=>App.instance.router.go('settings')},{name:'Revisão inteligente',type:'Ação',icon:'🧠',run:()=>PlayerController.startSmartReview()},{name:'Perfil e conquistas',type:'Ação',icon:'🏆',run:()=>App.instance.router.go('profile')}].forEach(i=>items.push(i));return items.filter(i=>(i.name+' '+i.type+' '+(i.desc||'')).toLowerCase().includes(term)).slice(0,60)}
function openCommandPalette(){let active=0;let backdrop=document.getElementById('cmdk-backdrop');if(!backdrop){backdrop=document.createElement('div');backdrop.id='cmdk-backdrop';backdrop.className='cmdk-backdrop';backdrop.innerHTML='<div class="cmdk" role="dialog" aria-modal="true" aria-label="Pesquisa global"><div class="cmdk-head">⌘<input id="cmdk-input" placeholder="Buscar exames, questões, tags, ações..." autocomplete="off"><span class="kbd">Esc</span></div><div class="cmdk-body" id="cmdk-list"></div><div class="cmdk-foot"><span>Enter abre · ↑↓ navega</span><span>Command Palette</span></div></div>';document.body.appendChild(backdrop);backdrop.addEventListener('click',e=>{if(e.target===backdrop)close()});}
const input=backdrop.querySelector('#cmdk-input'),list=backdrop.querySelector('#cmdk-list');function close(){backdrop.classList.remove('show')}function render(){const items=buildCommandItems(input.value);active=Math.min(active,items.length-1);list.innerHTML=items.length?items.map((i,k)=>`<button class="cmdk-item ${k===active?'active':''}" data-cmd="${k}"><span style="font-size:20px">${i.icon}</span><span><span class="type">${i.type}</span><span class="name">${Util.escapeHtml(i.name)}</span><span style="display:block;color:var(--text-2);font-size:12px">${Util.escapeHtml(i.desc||'')}</span></span></button>`).join(''):'<div class="empty-state"><h3>Nada encontrado</h3><p>Tente procurar por exame, categoria, tag ou ação.</p></div>';list.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{items[Number(b.dataset.cmd)].run();close()});return items}input.oninput=()=>{active=0;render()};input.onkeydown=e=>{const items=buildCommandItems(input.value);if(e.key==='ArrowDown'){e.preventDefault();active=Math.min(active+1,items.length-1);render()}else if(e.key==='ArrowUp'){e.preventDefault();active=Math.max(active-1,0);render()}else if(e.key==='Enter'&&items[active]){e.preventDefault();items[active].run();close()}else if(e.key==='Escape'){close()}};backdrop.classList.add('show');input.value='';render();setTimeout(()=>input.focus(),20)}
function globalShortcuts(){document.addEventListener('keydown',e=>{const tag=(e.target.tagName||'').toLowerCase();if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommandPalette()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='b'&&!['input','textarea','select'].includes(tag)){e.preventDefault();const p=getPro();setPro({rail:p.rail==='expanded'?'compact':'expanded'})}if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.toLowerCase()==='n'&&!['input','textarea','select'].includes(tag)){e.preventDefault();App.instance.router.go('builder',{})}})}
function enhanceSettingsView(){if(!window.SettingsView||SettingsView.prototype._proPatched)return;const orig=SettingsView.prototype.render;SettingsView.prototype.render=function(el){orig.call(this,el);const p=getPro();const div=document.createElement('div');div.innerHTML=`<div class="section-title">Experiência Pro</div><div class="card" style="margin-bottom:12px"><div class="form-grid"><div class="field"><label>Densidade da interface</label><select class="select" id="pro-density"><option value="compact" ${p.density==='compact'?'selected':''}>Compacta</option><option value="normal" ${p.density==='normal'?'selected':''}>Normal</option><option value="comfortable" ${p.density==='comfortable'?'selected':''}>Confortável</option></select><div class="hint">Reduz zoom e melhora uso em celular/tablet.</div></div><div class="field"><label>Menu lateral</label><select class="select" id="pro-rail"><option value="expanded" ${p.rail==='expanded'?'selected':''}>Expandido</option><option value="compact" ${p.rail==='compact'?'selected':''}>Compacto</option></select><div class="hint">Use Ctrl+B para alternar rapidamente.</div></div></div></div>`;el.insertBefore(div,el.querySelector('#s-save'));el.querySelector('#pro-density').onchange=e=>setPro({density:e.target.value});el.querySelector('#pro-rail').onchange=e=>setPro({rail:e.target.value});};SettingsView.prototype._proPatched=true;}
function createContextMenus(){document.addEventListener('contextmenu',e=>{const row=e.target.closest('.list-row');if(!row)return;const play=row.querySelector('[data-play-exam]');if(!play)return;e.preventDefault();document.querySelectorAll('.ef-context').forEach(x=>x.remove());const id=play.dataset.playExam;const m=document.createElement('div');m.className='topbar-more-menu show ef-context';m.style.position='fixed';m.style.left=e.clientX+'px';m.style.top=e.clientY+'px';m.innerHTML='<button class="topbar-more-item" data-act="dup">Duplicar</button><button class="topbar-more-item" data-act="export">Exportar</button><button class="topbar-more-item" data-act="archive">Arquivar</button>';document.body.appendChild(m);m.querySelector('[data-act="dup"]').onclick=()=>{const ex=StorageManager.getExam(id);if(ex){const copy=new Exam({...ex,id:Util.uid('exam'),title:(ex.title||'Exame')+' (cópia)',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});StorageManager.upsertExam(copy);Toast.show('Exame duplicado.','success');App.instance.router.go('dashboard')}};m.querySelector('[data-act="export"]').onclick=()=>ExportController.openModal(id);m.querySelector('[data-act="archive"]').onclick=()=>{setArch([...new Set([...arch(),id])]);Toast.show('Exame arquivado.','success');App.instance.router.go('dashboard')};setTimeout(()=>document.addEventListener('click',()=>m.remove(),{once:true}),0);});}
function boot(){safe(patchStorageVersions);safe(patchDashboard);safe(patchBuilder);safe(enhanceSettingsView);safe(augmentSettings);safe(injectRailToggle);safe(globalShortcuts);safe(createContextMenus);safe(()=>{if(App.instance)App.instance.router.go(App.instance.router.current||'dashboard')});}

<script id="ef-final-sidebar-profile-js">
(function(){
'use strict';
function safe(fn){try{return fn()}catch(e){console.warn('[ExamForge Final Fix]', e)}}
function getProFinal(){try{return JSON.parse(localStorage.getItem('ef_pro_settings_v1')||'{}')}catch(e){return {}}}
function saveProFinal(next){try{localStorage.setItem('ef_pro_settings_v1',JSON.stringify(Object.assign({},getProFinal(),next)))}catch(e){}}
function applyRailModeFinal(){
  const p=getProFinal();
  const mode=p.rail||'expanded';
  document.body.classList.toggle('rail-expanded', mode==='expanded');
  document.body.classList.toggle('rail-compact', mode==='compact');
}
function ensureMenuButtonFinal(){
  const rail=document.getElementById('rail'); if(!rail) return;
  let btn=rail.querySelector('.rail-toggle');
  const logo=rail.querySelector('.rail-logo');
  const firstNav=rail.querySelector('.rail-btn[data-route="dashboard"]');
  if(!btn){
    btn=document.createElement('button');
    btn.className='rail-btn rail-toggle';
    btn.type='button';
    btn.setAttribute('aria-label','Alternar menu lateral');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h16"/></svg><span class="rail-label">Menu</span>';
    btn.addEventListener('click',function(){
      const current=document.body.classList.contains('rail-expanded')?'expanded':'compact';
      saveProFinal({rail: current==='expanded'?'compact':'expanded'});
      applyRailModeFinal();
    });
  }
  if(logo){
    if(logo.nextSibling!==btn) rail.insertBefore(btn,logo.nextSibling);
  }else if(firstNav && firstNav.previousSibling!==btn){
    rail.insertBefore(btn,firstNav);
  }else if(!btn.parentElement){
    rail.insertBefore(btn,rail.firstChild);
  }
}
function ensureRailOrderFinal(){
  const rail=document.getElementById('rail'); if(!rail) return;
  ensureMenuButtonFinal();
  const settings=rail.querySelector('.rail-btn[data-route="settings"]');
  const profile=rail.querySelector('.rail-btn[data-route="profile"]');
  if(settings && profile && settings.compareDocumentPosition(profile)&Node.DOCUMENT_POSITION_PRECEDING){
    rail.insertBefore(settings,profile);
  }else if(settings && profile && settings.nextSibling!==profile){
    rail.insertBefore(settings,profile);
  }
  rail.querySelectorAll('.rail-mode-label').forEach(function(x){x.remove()});
  const spacer=rail.querySelector('.rail-spacer'); if(spacer) spacer.remove();
  applyRailModeFinal();
}
function escFinal(s){return (typeof Util!=='undefined'&&Util.escapeHtml)?Util.escapeHtml(s||''):String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function categoryPerformanceFinal(){
  const qmap=new Map((StorageManager.getQuestions?StorageManager.getQuestions():[]).map(function(q){return [q.id,q]}));
  const cats={};
  (StorageManager.getHistory?StorageManager.getHistory():[]).forEach(function(h){
    (h.detail||[]).forEach(function(d){
      const q=qmap.get(d.questionId); const cat=(q&&q.category)||'Sem categoria';
      if(!cats[cat]) cats[cat]={cat:cat,total:0,correct:0};
      cats[cat].total++; if(d.correct) cats[cat].correct++;
    });
  });
  if(!Object.keys(cats).length){
    (StorageManager.getQuestions?StorageManager.getQuestions():[]).forEach(function(q){
      const cat=q.category||'Sem categoria'; if(!cats[cat]) cats[cat]={cat:cat,total:0,correct:0}; cats[cat].total++;
    });
  }
  return Object.values(cats).map(function(x){return Object.assign({},x,{pct:x.total?Math.round((x.correct/x.total)*100):0})}).sort(function(a,b){return b.total-a.total}).slice(0,7);
}
function profileScoreFinal(){
  const hist=StorageManager.getHistory?StorageManager.getHistory():[];
  const g=StorageManager.getGame?StorageManager.getGame():{};
  const avg=hist.length?Math.round(hist.reduce(function(s,h){return s+(h.percentage||0)},0)/hist.length):0;
  const due=(typeof AITutor!=='undefined'&&AITutor.dueCount)?AITutor.dueCount():0;
  const consistency=Math.min(20,hist.length*3);
  const review=Math.min(10,Math.max(0,20-due)/2);
  const level=Math.min(10,(g.level||1)*1.5);
  return Math.max(0,Math.min(100,Math.round(avg*.6+consistency+review+level)));
}
function stageFinal(score){return score>=95?'Elite':score>=80?'Especialista':score>=60?'Avançado':score>=40?'Evoluindo':'Iniciante'}
function gaugeFinal(score){
  const angle=-90+(score/100)*180;
  const rad=(angle-90)*Math.PI/180;
  const cx=170, cy=155, len=96;
  const x=cx+len*Math.cos(rad), y=cy+len*Math.sin(rad);
  return '<div class="gauge-wrap-final"><svg class="gauge-svg-final" viewBox="0 0 340 205" role="img" aria-label="Acelerômetro de preparação">'
    +'<path d="M40 155 A130 130 0 0 1 300 155" fill="none" stroke="var(--bg-3)" stroke-width="22" stroke-linecap="round"/>'
    +'<path d="M40 155 A130 130 0 0 1 300 155" fill="none" stroke="url(#gaugeGradFinal)" stroke-width="22" stroke-linecap="round" stroke-dasharray="'+Math.max(1,score*4.08)+' 408"/>'
    +'<defs><linearGradient id="gaugeGradFinal" x1="0" x2="1"><stop offset="0" stop-color="var(--bad)"/><stop offset=".5" stop-color="var(--warn)"/><stop offset="1" stop-color="var(--good)"/></linearGradient></defs>'
    +'<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="var(--text-0)" stroke-width="5" stroke-linecap="round"/>'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="10" fill="var(--accent)"/>'
    +'<text x="36" y="188" fill="var(--text-2)" font-size="12">0</text><text x="160" y="36" fill="var(--text-2)" font-size="12">50</text><text x="286" y="188" fill="var(--text-2)" font-size="12">100</text>'
    +'</svg><div class="gauge-label-final">'+score+'%</div><div class="gauge-stage-final">'+stageFinal(score)+'</div><div class="gauge-note-final">Indicador combinado de média, frequência de simulados, revisões pendentes e nível de XP.</div></div>';
}
function pieGradientFinal(items){
  const colors=['var(--accent)','var(--good)','var(--warn)','var(--purple)','var(--bad)','var(--text-2)'];
  const total=items.reduce(function(s,x){return s+x.total},0)||1; let acc=0;
