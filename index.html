          <label class="ec-radio-row">
            <input type="radio" name="ec-mode" value="incorrect">
            Questões erradas <input class="input ec-inline-input" id="ec-n-incorrect" type="number" min="0" value="0"> ou mais vezes
          </label>
          <div class="ec-mode-panel hidden" data-panel="incorrect"><span class="hint" id="ec-incorrect-hint"></span></div>
        </fieldset>
        <div class="ec-options">
          <label class="checkbox-row"><input type="checkbox" id="ec-training"> Modo treino</label>
          <div class="ec-timer-row">
            <label class="checkbox-row"><input type="checkbox" id="ec-timer-on" checked> Cronômetro ativo</label>
            <div class="field ec-timer-min"><label for="ec-time">Tempo limite (min)</label><input class="input" id="ec-time" type="number" min="1" max="600" value="${examTime}"></div>
          </div>
        </div>
      </div>`;
  }

  static _sectionTree(examId){
    const exam = StorageManager.getExam(examId);
    if(!exam) return {exam:null, groups:[], total:0, orderedIds:[]};
    const idSet = new Set(exam.questionIds);
    const qs = StorageManager.getQuestions().filter(q=>idSet.has(q.id));
    const groups = {};
    qs.forEach(q=>{
      const materia = q.materia || exam.category || 'Geral';
      const sub = q.submateria || q.category || 'Geral';
      if(!groups[materia]) groups[materia] = {};
      if(!groups[materia][sub]) groups[materia][sub] = [];
      groups[materia][sub].push(q.id);
    });
    const sorted = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'pt-BR')).map(materia=>({
      materia,
      subs: Object.keys(groups[materia]).sort((a,b)=>a.localeCompare(b,'pt-BR')).map(sub=>({
        submateria: sub,
        ids: groups[materia][sub],
        count: groups[materia][sub].length
      }))
    }));
    return {exam, groups:sorted, total:qs.length, orderedIds:exam.questionIds.filter(id=>idSet.has(id))};
  }

  static _sectionsHtml(tree){
    if(!tree.groups.length) return `<p class="hint">Nenhuma seção encontrada nesta prova.</p>`;
    return tree.groups.map(g=>`
      <div class="ec-materia-group">
        <div class="ec-materia-title">${Util.escapeHtml(g.materia)}</div>
        ${g.subs.map(s=>`
          <label class="ec-section-item">
            <input type="checkbox" class="ec-section-cb" data-ids="${s.ids.join(',')}" checked>
            <span>${Util.escapeHtml(s.submateria)}</span>
            <span class="ec-section-count">(${s.count})</span>
          </label>`).join('')}
      </div>`).join('');
  }

  static _examIdForMode(modalEl){
    return modalEl.querySelector('#ec-exam-global')?.value;
  }

  static _refreshHints(modalEl){
    const mode = modalEl.querySelector('[name="ec-mode"]:checked')?.value || 'full';
    const examId = this._examIdForMode(modalEl);
    const exam = StorageManager.getExam(examId);
    const total = exam?.questionIds?.length || 0;
    const countHint = modalEl.querySelector('#ec-count-hint');
    const rangeHint = modalEl.querySelector('#ec-range-hint');
    const incorrectHint = modalEl.querySelector('#ec-incorrect-hint');
    if(countHint) countHint.textContent = total ? `Prova com ${total} questão(ões).` : '';
    if(rangeHint) rangeHint.textContent = total ? `Intervalo válido: 1 a ${total}.` : '';
    if(incorrectHint && exam){
      const n = Math.max(0, parseInt(modalEl.querySelector('#ec-n-incorrect')?.value, 10) || 0);
      const match = (exam.questionIds||[]).filter(qid=>{
        const s = StorageManager.getStat(qid);
        return (s.seen - s.correct) >= n;
      }).length;
      incorrectHint.textContent = `${match} questão(ões) com ${n}+ erro(s) nesta prova.`;
    }
    const timeInput = modalEl.querySelector('#ec-time');
    const examSel = modalEl.querySelector('#ec-exam-global');
    if(timeInput && examSel && mode==='full' && !modalEl._timeEdited){
      const ex = StorageManager.getExam(examSel.value);
      if(ex) timeInput.value = ex.timeMinutes;
    }
  }

  static _bind(modalEl, closeFn){
    const syncExam = (examId)=>{
      modalEl.querySelector('#ec-exam-global').value = examId;
      modalEl.querySelector('#ec-sections').innerHTML = this._sectionsHtml(this._sectionTree(examId));
      const total = StorageManager.getExam(examId)?.questionIds?.length || 0;
      const nCount = modalEl.querySelector('#ec-n-count');
      const rFrom = modalEl.querySelector('#ec-range-from');
      const rTo = modalEl.querySelector('#ec-range-to');
      if(nCount && !modalEl._countEdited) nCount.value = Math.min(15, total || 15);
      if(rFrom && !modalEl._rangeEdited){ rFrom.value = 1; rTo.value = Math.min(15, total || 15); }
      this._refreshHints(modalEl);
    };

    modalEl.querySelectorAll('[name="ec-mode"]').forEach(r=>{
      r.addEventListener('change', ()=>{
        modalEl.querySelectorAll('.ec-mode-panel').forEach(p=>{
          if(p.dataset.panel === 'full') return;
          p.classList.add('hidden');
        });
        const panel = modalEl.querySelector(`[data-panel="${r.value}"]`);
        if(panel && r.value !== 'full') panel.classList.remove('hidden');
        this._refreshHints(modalEl);
      });
    });

    modalEl.querySelector('#ec-exam-global')?.addEventListener('change', e=> syncExam(e.target.value));
    modalEl.querySelector('#ec-n-count')?.addEventListener('input', ()=>{ modalEl._countEdited = true; this._refreshHints(modalEl); });
    modalEl.querySelector('#ec-range-from')?.addEventListener('input', ()=>{ modalEl._rangeEdited = true; this._refreshHints(modalEl); });
    modalEl.querySelector('#ec-range-to')?.addEventListener('input', ()=>{ modalEl._rangeEdited = true; this._refreshHints(modalEl); });
    modalEl.querySelector('#ec-n-incorrect')?.addEventListener('input', ()=> this._refreshHints(modalEl));

    modalEl.querySelectorAll('.ec-inline-input').forEach(inp=>{
      inp.addEventListener('click', e=> e.stopPropagation());
      inp.addEventListener('focus', ()=>{
        const radio = inp.closest('.ec-radio-row')?.querySelector('input[type=radio]');
        if(radio) radio.checked = true;
      });
    });

    modalEl.querySelector('[data-select-all]')?.addEventListener('click', ()=>{
      modalEl.querySelectorAll('.ec-section-cb').forEach(cb=>{ cb.checked = true; });
    });
    modalEl.querySelector('[data-deselect-all]')?.addEventListener('click', ()=>{
      modalEl.querySelectorAll('.ec-section-cb').forEach(cb=>{ cb.checked = false; });
    });

    const timerOn = modalEl.querySelector('#ec-timer-on');
    const timeInput = modalEl.querySelector('#ec-time');
    const toggleTimer = ()=>{ if(timeInput) timeInput.disabled = !timerOn.checked; };
    timerOn?.addEventListener('change', toggleTimer);
    timeInput?.addEventListener('input', ()=>{ modalEl._timeEdited = true; });
    toggleTimer();

    modalEl.querySelector('[data-cancel]')?.addEventListener('click', closeFn);
    modalEl.querySelector('[data-ok]')?.addEventListener('click', ()=>{
      const result = this._collectConfig(modalEl);
      if(!result.ok){ Toast.show(result.error, 'warn'); return; }
      try{ localStorage.setItem(this.CANDIDATE_KEY, result.config.candidateName || ''); }catch(e){}
      closeFn();
      PlayerController.start(result.config);
    });

    this._refreshHints(modalEl);
  }

  static _collectConfig(modalEl){
    const candidateName = modalEl.querySelector('#ec-candidate')?.value.trim() || '';
    const mode = modalEl.querySelector('[name="ec-mode"]:checked')?.value || 'full';
    const trainingMode = !!modalEl.querySelector('#ec-training')?.checked;
    const timerOn = !!modalEl.querySelector('#ec-timer-on')?.checked;
    const timeMinutes = Math.max(1, parseInt(modalEl.querySelector('#ec-time')?.value, 10) || 60);
    let examId, questionIds;

    switch(mode){
      case 'full':
        examId = modalEl.querySelector('#ec-exam-global').value;
        questionIds = [...(StorageManager.getExam(examId)?.questionIds || [])];
        break;
      case 'sections': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const tree = this._sectionTree(examId);
        const checked = [...modalEl.querySelectorAll('.ec-section-cb:checked')];
        if(!checked.length) return {ok:false, error:'Selecione ao menos uma seção.'};
        const idSet = new Set();
        checked.forEach(cb=> cb.dataset.ids.split(',').filter(Boolean).forEach(id=>idSet.add(id)));
        questionIds = tree.orderedIds.filter(id=>idSet.has(id));
        break;
      }
      case 'count': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        const n = parseInt(modalEl.querySelector('#ec-n-count').value, 10);
        if(!n || n < 1) return {ok:false, error:'Informe uma quantidade válida (N ≥ 1).'};
        if(n > pool.length) return {ok:false, error:`A prova tem apenas ${pool.length} questão(ões).`};
        questionIds = Util.shuffle([...pool]).slice(0, n);
        break;
      }
      case 'range': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        const x = parseInt(modalEl.querySelector('#ec-range-from').value, 10);
        const y = parseInt(modalEl.querySelector('#ec-range-to').value, 10);
        if(!x || !y || x < 1 || y < x) return {ok:false, error:'Intervalo inválido. Use X ≤ Y, a partir de 1.'};
        if(y > pool.length) return {ok:false, error:`A prova tem apenas ${pool.length} questão(ões).`};
        questionIds = pool.slice(x - 1, y);
        break;
      }
      case 'incorrect': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const n = parseInt(modalEl.querySelector('#ec-n-incorrect').value, 10);
        if(n == null || n < 0 || isNaN(n)) return {ok:false, error:'Informe N ≥ 0.'};
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        questionIds = pool.filter(qid=>{
          const s = StorageManager.getStat(qid);
          return (s.seen - s.correct) >= n;
        });
        if(!questionIds.length) return {ok:false, error:`Nenhuma questão com ${n}+ erro(s) nesta prova.`};
        break;
      }
      default:
        return {ok:false, error:'Modo de seleção inválido.'};
    }

    if(!questionIds.length) return {ok:false, error:'Nenhuma questão selecionada.'};
    return {ok:true, config:{examId, candidateName, questionIds, trainingMode, timerOn, timeMinutes, configMode:mode}};
  }
}

/* =========================================================================
   PLAYER CONTROLLER (execução do exame em tela cheia)
   ========================================================================= */
class PlayerController {
  static state = null;

  /* IA offline: monta um simulado dinâmico com as questões mais fracas/atrasadas. */
  static startSmartReview(limit=15){
    const weak = AITutor.pickWeak(limit);
    if(!weak.length){ Toast.show('Ainda não há questões suficientes. Faça um simulado primeiro.', 'warn'); return; }
    const tempExam = new Exam({
      id: Util.uid('exam_smart'),
      title: 'Revisão inteligente (IA)',
      description: 'Questões priorizadas pelo seu histórico de acertos e repetição espaçada.',
      category: 'Revisão', timeMinutes: Math.max(5, Math.round(weak.length*1.2)),
      passScore: 70, questionIds: weak.map(q=>q.id)
    });
    StorageManager.upsertExam(tempExam);
    ExamConfigModal.open(tempExam.id);
  }

  static start(configOrExamId, resumeSession=null){
    const config = typeof configOrExamId === 'string'
      ? {examId: configOrExamId}
      : (configOrExamId || {});
    const examId = config.examId;
    if(!examId){ Toast.show('Exame não informado.', 'error'); return; }

    const baseExam = StorageManager.getExam(examId);
    if(!baseExam){ Toast.show('Exame não encontrado.', 'error'); return; }

    const questionIdPool = (config.questionIds && config.questionIds.length)
      ? config.questionIds
      : baseExam.questionIds;
    const byId = new Map(StorageManager.getQuestions().map(q=>[q.id, new Question(q)]));
    let questions = questionIdPool.map(id=>byId.get(id)).filter(Boolean);
    if(!questions.length){ Toast.show('Este exame não possui questões vinculadas.', 'error'); return; }

    const settings = StorageManager.getSettings();
    const examData = {...baseExam};
    if(config.questionIds && config.questionIds.length !== baseExam.questionIds.length){
      examData.title = `${baseExam.title} (${config.questionIds.length} questões)`;
    }
    if(config.timeMinutes != null) examData.timeMinutes = config.timeMinutes;
    const exam = new Exam(examData);

    // --- Retomar sessão salva ---
    if(resumeSession && resumeSession.order && resumeSession.order.length){
      const resumeMap = new Map(questions.map(q=>[q.id,q]));
      const ordered = resumeSession.order.map(id=>resumeMap.get(id)).filter(Boolean);
      if(ordered.length) questions = ordered;
    } else if(!config.questionIds || config.questionIds.length === baseExam.questionIds.length){
      if(settings.randomOrder) questions = Util.shuffle(questions);
      if(settings.randomAlternatives){
        questions = questions.map(q=>{
          if(['single','multi','image'].includes(q.type)){
            const clone = new Question(q);
            clone.options = Util.shuffle(q.options);
            return clone;
          }
          return q;
        });
      }
    }

    const trainingMode = !!config.trainingMode;
    const timerOn = resumeSession ? true : (config.timerOn !== false);
    const elapsedBefore = resumeSession?.elapsedSeconds || 0;
    this.state = {
      exam, questions,
      answers: resumeSession?.answers || {},
      marked: new Set(resumeSession?.marked || []),
      revealed: new Set(resumeSession?.revealed || []),
      revealPersistent: !!resumeSession?.revealPersistent,
      currentIndex: resumeSession?.currentIndex || 0,
      startedAt: Date.now() - elapsedBefore*1000,
      timer: null,
      streak: 0,
      lastMilestone: 0,
      candidateName: config.candidateName || resumeSession?.candidateName || '',
      trainingMode,
      timerOn,
      showAnswerAfterSelect: trainingMode ? true : !!settings.showAnswerAfterSelect,
      allowRevealAnswer: trainingMode ? true : (settings.allowRevealAnswer !== false),
      allowFinishAnytime: settings.allowFinishAnytime !== false
    };

    this._mountShell();
    this._renderNav();
    this._renderQuestion();

    if(timerOn){
      const totalSeconds = exam.timeMinutes * 60;
      this.state.timer = new ExamTimer({
        totalSeconds: Math.max(1, totalSeconds - elapsedBefore),
        onTick: (remaining) => { this._updateTimerDisplay(remaining); this._persistSession(); },
        onWarn: (mins) => {
          SoundFx.beep(mins<=1?1100:660, 200);
          Toast.show(`Atenção: restam ${mins} minuto(s)!`, 'warn', 4000);
        },
        onEnd: () => { Toast.show('Tempo esgotado! Enviando exame automaticamente.', 'warn'); this.finish(true); }
      });
      this.state.timer.start();
    } else {
      this._updateTimerDisplay(null);
    }
    this._persistSession();

    document.getElementById('player-view').classList.add('show');
    document.body.classList.add('player-open');
    if(document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  }

  static _persistSession(){
    if(!this.state) return;
    try{
      StorageManager.saveSession({
        examId: this.state.exam.id,
        order: this.state.questions.map(q=>q.id),
        answers: this.state.answers,
        marked: [...this.state.marked],
        revealed: [...this.state.revealed],
        revealPersistent: !!this.state.revealPersistent,
        currentIndex: this.state.currentIndex,
        elapsedSeconds: Math.round((Date.now()-this.state.startedAt)/1000),
        candidateName: this.state.candidateName || '',
        trainingMode: !!this.state.trainingMode,
        savedAt: new Date().toISOString()
      });
    }catch(e){}
  }

  static _mountShell(){
    const root = document.getElementById('player-view');
    const cand = this.state.candidateName ? `<span class="player-candidate" title="${Util.escapeHtml(this.state.candidateName)}">${Util.escapeHtml(this.state.candidateName)}</span>` : '';
    const train = this.state.trainingMode ? `<span class="player-training-badge">Treino</span>` : '';
    root.innerHTML = `
      <div class="player-top">
        <button class="btn btn-icon btn-ghost" id="p-exit" title="Sair" aria-label="Sair">${Icons.close}</button>
        <button class="btn btn-icon btn-ghost" id="p-toggle-nav" title="Mostrar/ocultar questões" aria-label="Mostrar ou ocultar questões">${Icons.menu}</button>
        ${cand}${train}
        <div class="player-progress-wrap"><div class="player-progress-bar" id="p-progress" style="width:0%"></div></div>
        ${this.state.allowRevealAnswer ? `<div class="player-reveal-grp" id="p-reveal-grp">
          <button class="btn btn-sm" id="p-reveal-q" type="button" title="Mostrar resposta da questão atual">${Icons.eye} Revelar questão</button>
          <button class="btn btn-sm" id="p-reveal-all" type="button" title="Revelar respostas em todas as questões">Modo revisão</button>
        </div>` : ''}
        <div class="timer-pill" id="p-timer">--:--</div>
      </div>
      <div class="player-body">
        <div class="player-nav-list" id="p-nav" role="navigation" aria-label="Navegação entre questões"></div>
        <div class="player-question-area" id="p-question"></div>
      </div>
      <div id="p-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <div class="player-footer">
        <div class="grp">
          <button class="btn" id="p-prev">← Anterior</button>
          <button class="btn" id="p-skip">Pular</button>
        </div>
        <div class="grp">
          <button class="btn" id="p-mark" type="button">${Icons.star} Marcar</button>
          <button class="btn btn-primary" id="p-next">Próxima →</button>
          <button class="btn btn-danger" id="p-finish">Finalizar</button>
        </div>
      </div>
    `;
    root.querySelector('#p-exit').addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Sair do exame', message:'Seu progresso será perdido. Deseja realmente sair?', confirmLabel:'Sair', danger:true});
      if(ok) this._exitWithoutSaving();
    });
    root.querySelector('#p-prev').addEventListener('click', ()=>this._move(-1));
    root.querySelector('#p-next').addEventListener('click', ()=>this._move(1));
    root.querySelector('#p-skip').addEventListener('click', ()=>this._move(1));
    root.querySelector('#p-mark').addEventListener('click', ()=>this._toggleMark());
    root.querySelector('#p-finish').addEventListener('click', ()=>this._confirmFinish());
    root.querySelector('#p-toggle-nav').addEventListener('click', ()=>{
      root.querySelector('#p-nav').classList.toggle('collapsed');
    });
    root.querySelector('#p-reveal-q')?.addEventListener('click', ()=> this._toggleRevealCurrent());
    root.querySelector('#p-reveal-all')?.addEventListener('click', ()=> this._toggleRevealAll());

    // Navegação por teclado (acessibilidade / eficiência no desktop)
    this._keyHandler = (e)=>{
      if(!document.getElementById('player-view').classList.contains('show')) return;
      const tag = (e.target.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea' || tag==='select') return;
      if(e.defaultPrevented) return;
      const q = this.state.questions[this.state.currentIndex];
      if(e.key==='ArrowRight'){ e.preventDefault(); this._move(1); }
      else if(e.key==='ArrowLeft'){ e.preventDefault(); this._move(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); this._move(1); }
      else if(/^[1-9]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = Number(e.key)-1;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(/^[a-hA-H]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = e.key.toLowerCase().charCodeAt(0)-97;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(e.key.toLowerCase()==='m'){ e.preventDefault(); this._toggleMark(); }
    };
    document.addEventListener('keydown', this._keyHandler);
    // Swipe horizontal entre questões (padrão mobile, uso com o polegar)
    const area = root.querySelector('#p-question');
    let tsx=0, tsy=0, tst=0;
    area.addEventListener('touchstart', (e)=>{
      const t = e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; tst=Date.now();
    }, {passive:true});
    area.addEventListener('touchend', (e)=>{
      const t = e.changedTouches[0];
      const dx = t.clientX - tsx, dy = t.clientY - tsy, dt = Date.now()-tst;
      // gesto válido: horizontal, rápido, e não sobre uma seleção de texto
      if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.8 && dt < 600){
        if(dx < 0) this._move(1); else this._move(-1);
      }
    }, {passive:true});
  }

  static _announce(msg){
    const live = document.getElementById('p-live');
    if(live) live.textContent = msg;
  }
  static _selectByIndex(idx){
    const q = this.state.questions[this.state.currentIndex];
    const opt = q.options[idx];
    if(!opt) return;
    if(q.type==='multi'){
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      cur.has(opt.id) ? cur.delete(opt.id) : cur.add(opt.id);
      this.state.answers[q.id] = [...cur];
    } else {
      this.state.answers[q.id] = opt.id;
      this._trackStreak(q);
    }
    this._afterAnswer();
  }
  static _afterAnswer(){
    this._persistSession();
    this._renderQuestion();
    this._renderNav();
  }
  static _trackStreak(q){
    // Atualiza streak apenas para tipos objetivos com resposta imediata
    if(!this.state.showAnswerAfterSelect) return;
    const correct = q.isCorrect(this.state.answers[q.id]);
    if(correct){
      this.state.streak++;
      Gamification.noteStreak(this.state.streak);
      if(this.state.streak>0 && this.state.streak%5===0){
        RewardPop.show(String(this.state.streak), `${this.state.streak} seguidas!`, 'Continue assim!', 1400);
        this._announce(`Sequência de ${this.state.streak} acertos.`);
      }
    } else {
      this.state.streak = 0;
    }
  }

  static _toggleRevealCurrent(){
    if(this.state.revealPersistent) return;
    const q = this.state.questions[this.state.currentIndex];
    this.state.revealed.has(q.id) ? this.state.revealed.delete(q.id) : this.state.revealed.add(q.id);
    this._updateRevealControls();
    this._renderQuestion();
    this._persistSession();
  }

  static _toggleRevealAll(){
    this.state.revealPersistent = !this.state.revealPersistent;
    if(!this.state.revealPersistent) this.state.revealed.clear();
    this._updateRevealControls();
    this._renderQuestion();
    this._persistSession();
  }

  static _updateRevealControls(){
    const btnQ = document.getElementById('p-reveal-q');
    const btnAll = document.getElementById('p-reveal-all');
    if(!this.state || (!btnQ && !btnAll)) return;
    const q = this.state.questions[this.state.currentIndex];
    const curRevealed = this.state.revealPersistent || this.state.revealed.has(q.id);
    if(btnQ){
      btnQ.classList.toggle('active', curRevealed);
      btnQ.setAttribute('aria-pressed', String(curRevealed));
      btnQ.disabled = this.state.revealPersistent;
      btnQ.title = this.state.revealPersistent
        ? 'Modo revisão ativo — todas as respostas visíveis'
        : (this.state.revealed.has(q.id) ? 'Ocultar resposta desta questão' : 'Mostrar resposta da questão atual');
    }
    if(btnAll){
      btnAll.classList.toggle('active', this.state.revealPersistent);
      btnAll.setAttribute('aria-pressed', String(this.state.revealPersistent));
      btnAll.title = this.state.revealPersistent
        ? 'Desativar modo revisão (ocultar respostas reveladas)'
        : 'Revelar respostas em todas as questões';
    }
  }

  static _feedbackBox(q, userAnswer, answered){
    const correctAns = this._fmtCorrect(q);
    // Reveladа sem ter respondido: caixa neutra mostrando só a resposta correta
    if(!answered){
      return `<div class="feedback-box correct">
        <div class="fb-head" style="color:var(--accent)">Resposta correta revelada</div>
        <div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>
        ${q.explanation?`<div class="fb-explain">${Util.escapeHtml(q.explanation)}</div>`:''}
      </div>`;
    }
    const correct = q.isCorrect(userAnswer);
    const yourAns = this._fmtAnswer(q, userAnswer) || '(sem resposta)';
    return `<div class="feedback-box ${correct?'correct':'incorrect'}">
      <div class="fb-head">${correct?'Correto':'Incorreto'}</div>
      <div class="fb-line">Sua resposta: <strong>${Util.escapeHtml(yourAns)}</strong></div>
      ${!correct?`<div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>`:''}
      ${q.explanation?`<div class="fb-explain">${Util.escapeHtml(q.explanation)}</div>`:''}
    </div>`;
  }
  static _fmtAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': { const o=q.options.find(o=>o.id===ans); return o?o.text:''; }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  static _fmtCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return (q.correctShort||[]).join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }

  static _cleanup(){
    this.state?.timer?.stop();
    if(this._keyHandler){ document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
    document.getElementById('player-view').classList.remove('show');
    document.body.classList.remove('player-open');
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  }
  static _exitWithoutSaving(){
    StorageManager.clearSession();
    this._cleanup();
    App.instance.router.go('home');
  }

  static _updateTimerDisplay(remaining){
    const pill = document.getElementById('p-timer');
    if(!pill) return;
    if(remaining == null || !this.state?.timerOn){
      pill.textContent = '∞';
      pill.classList.remove('warn-30','warn-10','warn-1');
      return;
    }
    pill.textContent = Util.formatTime(remaining);
    pill.classList.remove('warn-30','warn-10','warn-1');
    const mins = remaining/60;
    if(mins<=1) pill.classList.add('warn-1');
    else if(mins<=10) pill.classList.add('warn-10');
    else if(mins<=30) pill.classList.add('warn-30');
  }

  static _renderNav(){
    const nav = document.getElementById('p-nav');
    const meta = document.getElementById('p-nav-meta');
    const {questions, answers, marked, currentIndex} = this.state;
    if(meta) meta.textContent = `Questão ${currentIndex+1} de ${questions.length} — deslize para ver todas`;
    nav.innerHTML = questions.map((q,i)=>{
      const classes = ['qnum'];
      if(i===currentIndex) classes.push('current');
      if(answers[q.id]!==undefined) classes.push('answered');
      if(marked.has(q.id)) classes.push('marked');
      const state = [];
      if(answers[q.id]!==undefined) state.push('respondida');
      if(marked.has(q.id)) state.push('marcada');
      const aria = `Questão ${i+1}${state.length?' ('+state.join(', ')+')':''}`;
      return `<button class="${classes.join(' ')}" data-goto="${i}" aria-label="${aria}" ${i===currentIndex?'aria-current="true"':''}>${i+1}</button>`;
    }).join('');
    nav.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{
      this.state.currentIndex = Number(b.dataset.goto);
      this._renderQuestion(); this._renderNav();
    }));
    nav.querySelector(`[data-goto="${currentIndex}"]`)?.scrollIntoView({inline:'nearest', block:'nearest', behavior:'smooth'});
  }

  static _renderQuestion(){
    const {questions, currentIndex, answers} = this.state;
    const q = questions[currentIndex];
    const area = document.getElementById('p-question');
    const userAnswer = answers[q.id];
    document.getElementById('p-progress').style.width = `${Math.round(((currentIndex+1)/questions.length)*100)}%`;

    // determina se devemos mostrar a correção (após seleção) ou revelar a resposta
    const answered = userAnswer !== undefined && userAnswer !== null &&
      (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
    const revealed = this.state.revealPersistent || this.state.revealed.has(q.id);
    const showFeedback = revealed || (this.state.showAnswerAfterSelect && answered);

    let bodyHtml = '';
    if(['single','boolean','image'].includes(q.type)){
      bodyHtml = q.options.map((o,i)=>{
        const isSel = userAnswer===o.id;
        let cls = 'q-option radio-type' + (isSel?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(isSel){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-single="${o.id}" role="radio" tabindex="0" aria-checked="${isSel}">
          <div class="marker"></div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(o.text)}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='multi'){
      bodyHtml = q.options.map((o,i)=>{
        const selected = Array.isArray(userAnswer) && userAnswer.includes(o.id);
        let cls = 'q-option' + (selected?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(selected){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-multi="${o.id}" role="checkbox" tabindex="0" aria-checked="${selected}">
          <div class="marker">${selected?'✓':''}</div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(o.text)}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='short'){
      bodyHtml = `<input class="input" id="p-short-answer" placeholder="Digite sua resposta..." value="${Util.escapeHtml(userAnswer||'')}">`;
    } else if(q.type==='matching'){
      const rightOptions = Util.shuffle(q.matchPairs.map(p=>p.right));
      bodyHtml = q.matchPairs.map((p,i)=>`
        <div class="row" style="margin-bottom:10px">
          <span style="min-width:160px;font-size:13.5px">${Util.escapeHtml(p.left)}</span>
          <select class="select" data-match-idx="${i}">
            <option value="">Selecione...</option>
            ${rightOptions.map(r=>`<option value="${Util.escapeHtml(r)}" ${userAnswer && userAnswer[i]===r?'selected':''}>${Util.escapeHtml(r)}</option>`).join('')}
          </select>
        </div>`).join('');
    } else if(q.type==='sequence'){
      const order = userAnswer || Util.shuffle(q.sequenceItems.map(s=>s.text));
      bodyHtml = `<div id="seq-sortable">${order.map((text,i)=>`
        <div class="q-option" draggable="true" data-seq-text="${Util.escapeHtml(text)}" style="cursor:grab">
          <span class="letter">${i+1}.</span><span>${Util.escapeHtml(text)}</span>
        </div>`).join('')}</div>
        <p class="hint">Arraste os itens para reordenar (ou use os botões ↑/↓).</p>`;
    }

    area.innerHTML = `
      <div class="q-index">Questão ${currentIndex+1} de ${questions.length} · ${QUESTION_TYPES[q.type]?.label||q.type}</div>
      ${q.image ? `<img class="q-image" src="${q.image}">` : ''}
      <div class="q-text">${Util.escapeHtml(q.text)}</div>
      <div id="q-options" ${q.type==='multi'?'role="group"':(['single','boolean','image'].includes(q.type)?'role="radiogroup"':'')} aria-label="Alternativas">${bodyHtml}</div>
      ${showFeedback ? this._feedbackBox(q, userAnswer, answered) : ''}
    `;

    // anúncio para leitores de tela ao renderizar feedback
    if(showFeedback && answered){
      this._announce(q.isCorrect(userAnswer) ? 'Resposta correta.' : `Resposta incorreta. Correta: ${this._fmtCorrect(q)}`);
    }

    // bind interactions
    const selectSingle = (el)=>{
      this.state.answers[q.id] = el.dataset.selectSingle;
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-single]').forEach(el=>{
      el.addEventListener('click', ()=>selectSingle(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectSingle(el); } });
    });
    const selectMulti = (el)=>{
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      const id = el.dataset.selectMulti;
      cur.has(id) ? cur.delete(id) : cur.add(id);
      this.state.answers[q.id] = [...cur];
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-multi]').forEach(el=>{
      el.addEventListener('click', ()=>selectMulti(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectMulti(el); } });
    });
    area.querySelector('#p-short-answer')?.addEventListener('input', (e)=>{
      this.state.answers[q.id] = e.target.value;
      this._persistSession();
      this._renderNav();
    });
    area.querySelectorAll('[data-match-idx]').forEach(sel=>sel.addEventListener('change', ()=>{
      const ans = this.state.answers[q.id] || {};
      ans[Number(sel.dataset.matchIdx)] = sel.value;
      this.state.answers[q.id] = ans;
      this._persistSession();
      this._renderNav();
    }));
    if(q.type==='sequence'){
      this._bindSequenceDrag(area, q);
      if(!this.state.answers[q.id]){
        this.state.answers[q.id] = [...area.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
      }
    }
    this._updateMarkButton();
    this._updateRevealControls();
  }

  static _bindSequenceDrag(area, q){
    const wrap = area.querySelector('#seq-sortable');
    let dragEl = null;
    wrap.querySelectorAll('[draggable]').forEach(item=>{
      item.addEventListener('dragstart', ()=>{ dragEl = item; item.style.opacity='.4'; });
      item.addEventListener('dragend', ()=>{ item.style.opacity='1'; this._syncSeqAnswer(wrap, q); });
      item.addEventListener('dragover', (e)=>{
        e.preventDefault();
        const after = this._getDragAfter(wrap, e.clientY);
        if(after==null) wrap.appendChild(dragEl); else wrap.insertBefore(dragEl, after);
      });
    });
  }
  static _getDragAfter(wrap, y){
    const els = [...wrap.querySelectorAll('[draggable]:not([style*="opacity: 0.4"])')];
    return els.reduce((closest, child)=>{
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height/2;
      if(offset < 0 && offset > closest.offset) return {offset, element: child};
      return closest;
    }, {offset:-Infinity}).element;
  }
  static _syncSeqAnswer(wrap, q){
    this.state.answers[q.id] = [...wrap.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
    this._renderNav();
  }

  static _move(delta){
    const {questions, currentIndex} = this.state;
    const next = Util.clamp(currentIndex+delta, 0, questions.length-1);
    this.state.currentIndex = next;
    this._checkMilestone();
    this._persistSession();
    this._renderQuestion(); this._renderNav();
  }
  static _checkMilestone(){
    const total = this.state.questions.length;
    const reached = this.state.currentIndex + 1;
    // marco de "metade do caminho"
    if(total>=6 && this.state.lastMilestone<1 && reached>=Math.ceil(total/2)){
      this.state.lastMilestone = 1;
      RewardPop.show('50%', 'Metade concluída!', 'Você está indo muito bem!', 1500);
      this._announce('Você chegou à metade do exame.');
    }
  }
  static _toggleMark(){
    const q = this.state.questions[this.state.currentIndex];
    this.state.marked.has(q.id) ? this.state.marked.delete(q.id) : this.state.marked.add(q.id);
    this._persistSession();
    this._renderNav();
    this._updateMarkButton();
  }
  static _updateMarkButton(){
    const btn = document.getElementById('p-mark');
    if(!btn) return;
    const q = this.state.questions[this.state.currentIndex];
    const isMarked = this.state.marked.has(q.id);
    btn.innerHTML = isMarked ? `${Icons.starFilled} Marcada` : `${Icons.star} Marcar`;
    btn.classList.toggle('btn-primary', isMarked);
    btn.setAttribute('aria-pressed', String(isMarked));
  }

  static async _confirmFinish(){
    const total = this.state.questions.length;
    const answeredCount = this.state.questions.filter(q=>{
      const a = this.state.answers[q.id];
      return a !== undefined && a !== null && (!Array.isArray(a) ? String(a).length>0 : a.length>0);
    }).length;
    const unanswered = total - answeredCount;
    let msg;
    if(unanswered>0){
      msg = `Você respondeu ${answeredCount} de ${total} questão(ões) (${unanswered} em branco). ` +
            `Você pode finalizar mesmo assim — o seu score será calculado sobre o total de ${total} questão(ões). Deseja finalizar agora?`;
    } else {
      msg = 'Deseja finalizar o exame e ver o seu score agora?';
    }
    const ok = await Modal.confirm({title:'Finalizar exame', message:msg, confirmLabel:'Finalizar e ver score'});
    if(ok) this.finish(false);
  }

  static finish(auto=false){
    const {exam, questions, answers, marked, startedAt, timer} = this.state;
    timer?.stop();
    const timeSpentSeconds = Math.round((Date.now()-startedAt)/1000);
    let correctCount = 0;
    const detail = questions.map(q=>{
      const userAnswer = answers[q.id];
      const correct = q.isCorrect(userAnswer);
      if(correct) correctCount++;
      // IA offline: registra desempenho por questão (repetição espaçada)
      const answered = userAnswer !== undefined && userAnswer !== null &&
        (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
      if(answered) AITutor.record(q.id, correct);
      return {questionId:q.id, question:q, userAnswer, correct, marked: marked.has(q.id)};
    });
    const percentage = Math.round((correctCount/questions.length)*100);
    const historyEntry = {
      id: Util.uid('hist'),
      examId: exam.id,
      examTitle: exam.title,
      date: new Date().toISOString(),
      correctCount, totalCount: questions.length, percentage,
      timeSpentSeconds,
      passed: percentage >= exam.passScore,
      markedCount: marked.size,
      detail: detail.map(d=>({questionId:d.questionId, userAnswer:d.userAnswer, correct:d.correct, marked:d.marked}))
    };
    StorageManager.addHistory(historyEntry);
    StorageManager.clearSession();

    // Gamificação: XP, nível e conquistas
    const gameResult = Gamification.registerExam({correctCount, totalCount: questions.length, percentage});

    this._cleanup();
    ResultController.show({exam, detail, historyEntry, gameResult});
  }
}

class ResultController {

}
class ResultView {
  get title(){ return 'Resultado'; }
  get crumb(){ return ''; }
  render(el, params){
    const {exam, detail, historyEntry} = params;
    this._data = params;
    const pct = historyEntry.percentage;
    const color = pct>=exam.passScore ? 'var(--good)' : 'var(--bad)';
    const circumference = 2*Math.PI*62;
    const dash = circumference*(pct/100);
    el.innerHTML = `
      <div class="score-hero">
        <div class="score-ring">
          <svg width="150" height="150">
            <circle cx="75" cy="75" r="62" stroke="var(--bg-3)" stroke-width="12" fill="none"/>
            <circle cx="75" cy="75" r="62" stroke="${color}" stroke-width="12" fill="none"
              stroke-dasharray="${dash} ${circumference}" stroke-linecap="round"/>
          </svg>
          <div class="pct" style="color:${color}">${pct}%</div>
        </div>
        <h2 style="font-size:20px;margin-bottom:4px">${historyEntry.passed?'Aprovado 🎉':'Não atingiu a nota mínima'}</h2>
        <p style="color:var(--text-2);font-size:13px">${Util.escapeHtml(exam.title)} · nota mínima ${exam.passScore}%</p>
      </div>
      ${this._xpBanner(params.gameResult)}
      ${this._gapsBanner(detail)}
      <div class="result-grid">
        <div class="card stat-card"><span class="label">Acertos</span><span class="value" style="color:var(--good)">${historyEntry.correctCount}</span></div>
        <div class="card stat-card"><span class="label">Erros</span><span class="value" style="color:var(--bad)">${historyEntry.totalCount-historyEntry.correctCount}</span></div>
        <div class="card stat-card"><span class="label">Tempo gasto</span><span class="value">${Util.formatDuration(historyEntry.timeSpentSeconds)}</span></div>
        <div class="card stat-card"><span class="label">Marcadas</span><span class="value" style="color:var(--warn)">${historyEntry.markedCount}</span></div>
      </div>
      <div class="row" style="gap:10px;margin-top:10px">
        <button class="btn btn-primary" id="r-review">Revisar respostas</button>
        <button class="btn" id="r-smart">Revisão inteligente</button>
        <button class="btn" id="r-retry-wrong">Refazer apenas erradas</button>
        <button class="btn" id="r-retry-marked">Refazer apenas marcadas</button>
        <button class="btn btn-ghost" id="r-dashboard">Voltar ao Início</button>
      </div>
    `;
    el.querySelector('#r-review').addEventListener('click', ()=> ReviewController.show(detail, exam));
    el.querySelector('#r-dashboard').addEventListener('click', ()=> App.instance.router.go('home'));
    el.querySelector('#r-retry-wrong').addEventListener('click', ()=> this._retry(detail.filter(d=>!d.correct), exam));
    el.querySelector('#r-retry-marked').addEventListener('click', ()=> this._retry(detail.filter(d=>d.marked), exam));
    el.querySelector('#r-smart').addEventListener('click', ()=> PlayerController.startSmartReview());
  }
  _gapsBanner(detail){
    const gaps = AITutor.gapsFromDetail(detail).filter(g=>g.acc<100);
    if(!gaps.length) return '';
    const weak = gaps.slice(0,4);
    return `<div class="card" style="margin:8px 0 4px;border-color:var(--warn)">
      <div style="font-weight:600;font-size:13.5px;margin-bottom:8px">Análise de lacunas</div>
      ${weak.map(g=>`<div class="gap-row">
        <span class="gap-cat">${Util.escapeHtml(g.cat)}</span>
        <div class="gap-bar"><span style="width:${g.acc}%;background:${g.acc>=70?'var(--good)':g.acc>=50?'var(--warn)':'var(--bad)'}"></span></div>
        <span class="gap-pct">${g.correct}/${g.total} · ${g.acc}%</span>
      </div>`).join('')}
    </div>`;
  }
  _xpBanner(gameResult){
    const p = Gamification.progress();
    const gained = gameResult?.gained || 0;
    const leveled = gameResult?.leveledUp;
    return `<div class="card" style="margin:8px 0 4px">
      <div class="row between" style="margin-bottom:8px">
        <span class="xp-badge">Nível ${p.level}</span>
        <span style="font-size:12.5px;color:var(--good);font-weight:700">+${gained} XP</span>
      </div>
      <div class="xp-wrap"><div class="xp-bar"><span style="width:${p.pct}%"></span></div><span>${p.pct}%</span></div>
      ${leveled?`<div style="margin-top:8px;font-size:12.5px;color:var(--accent);font-weight:700">🎉 Você subiu para o nível ${gameResult.newLevel}!</div>`:''}
    </div>`;
  }
  _retry(subset, exam){
    if(!subset.length){ Toast.show('Nenhuma questão nesse critério.', 'warn'); return; }
    const tempExam = new Exam({...exam, id:Util.uid('exam_retry'), title: exam.title + ' (revisão)', questionIds: subset.map(d=>d.questionId)});
    StorageManager.upsertExam(tempExam);
    PlayerController.start(tempExam.id);
  }
}

/* ---------- Review Controller ---------- */
class ReviewController {
  static show(detail, exam){
    App.instance.router.go('review', {detail, exam});
  }
  static showFromHistory(historyEntry){
    const questions = StorageManager.getQuestions().map(q=>new Question(q));
    const detail = historyEntry.detail.map(d=>({
      ...d,
      question: questions.find(q=>q.id===d.questionId) || new Question({text:'(Questão removida do banco)'})
    }));
    App.instance.router.go('review', {detail, exam:{title:historyEntry.examTitle, passScore:70}});
  }
}
class ReviewView {
  get title(){ return 'Revisão'; }
  get crumb(){ return ''; }
  render(el, params){
    const {detail, exam} = params;
    el.innerHTML = `
      <div class="row between" style="margin-bottom:16px">
        <span style="font-size:13px;color:var(--text-1)">${Util.escapeHtml(exam.title||'')} — revisão detalhada</span>
        <button class="btn btn-ghost" id="rv-back">Voltar</button>
      </div>
      ${detail.map((d,i)=>this._item(d,i)).join('')}
    `;
    el.querySelector('#rv-back').addEventListener('click', ()=> App.instance.router.go('home'));
  }
  _item(d,i){
    const q = d.question;
    const userAnswerText = this._formatAnswer(q, d.userAnswer);
    const correctAnswerText = this._formatCorrect(q);
    return `<div class="review-item ${d.correct?'correct':'incorrect'}">
      <div class="row between">
        <strong style="font-size:13.5px">${i+1}. ${Util.escapeHtml(q.text)}</strong>
        <span class="badge" style="background:${d.correct?'var(--good-soft)':'var(--bad-soft)'};color:${d.correct?'var(--good)':'var(--bad)'}">${d.correct?'Correta':'Incorreta'}</span>
      </div>
      <div class="review-answer ${d.correct?'correct':'incorrect'}">Sua resposta: ${Util.escapeHtml(userAnswerText||'(sem resposta)')}</div>
      ${!d.correct ? `<div class="review-answer correct">Resposta correta: ${Util.escapeHtml(correctAnswerText)}</div>` : ''}
      ${q.explanation ? `<div class="review-explain">${Util.escapeHtml(q.explanation)}</div>` : ''}
    </div>`;
  }
  _formatAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': {
        const o = q.options.find(o=>o.id===ans); return o?o.text:'';
      }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  _formatCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return q.correctShort.join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }
}

class DataCleanup {
  static FLAG = 'ef_cleanup_em2_v2';
  static run(){
    if(localStorage.getItem(this.FLAG)) return;
    const cyber = /ciber|cyber|seguran[cç]a da informa|CYBER-/i;
    const legacyExam = e => /^(CYBER-|HIST-RF-50)/.test(e.code||'') || cyber.test([e.category,e.title,e.code,...(e.tags||[])].join(' '));
    const qs = StorageManager.getQuestions().filter(q=>{
      const blob = [q.category,q.materia,q.submateria,...(q.tags||[]),q.text].join(' ');
      return !cyber.test(blob);
    });
    StorageManager.saveQuestions(qs);
    const kept = new Set(qs.map(q=>q.id));

    localStorage.setItem(this.FLAG,'1');
  }
}

class BankHierarchy {
  static groupByExam(){
    const exams = StorageManager.getExams().filter(e=>e.questionIds?.length);
    const qmap = Object.fromEntries(StorageManager.getQuestions().map(q=>[q.id,q]));
    const used = new Set();
    const tree = exams.map(ex=>{
      const qs = ex.questionIds.map(id=>qmap[id]).filter(Boolean);
      qs.forEach(q=>used.add(q.id));
      return {exam:ex, materias:this._byMateria(qs)};
    });
    const orphan = StorageManager.getQuestions().filter(q=>!used.has(q.id));
    if(orphan.length) tree.push({exam:{id:'_orphan',title:'Sem prova vinculada',questionIds:[]}, materias:this._byMateria(orphan)});
    return tree;
  }
  static _byMateria(qs){
    const map = {};
    qs.forEach(q=>{
      const m = q.materia || 'Sem matéria';
      map[m] = map[m] || {};
      const s = q.submateria || q.category || 'Geral';
      map[m][s] = map[m][s] || [];
      map[m][s].push(q);
    });
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR')).map(([materia,subs])=>({
      materia,
      submaterias:Object.entries(subs).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR')).map(([submateria,questions])=>({submateria,questions}))
    }));
  }
  static count(qs){ return qs.length; }
}

  static subjects(){
    return this.SUBJECT_DATA;

  static seed(){
    if(localStorage.getItem(this.FLAG_KEY)) return;
    DataCleanup.run();
    this.subjects().forEach(sub=>{
      const qs = [];
      Object.entries(sub.submaterias).forEach(([submateria, items])=>{
        items.forEach(d=>{
          const raw = typeof d === 'object' && d.text ? d : BankHelpers.q(d[0], BankHelpers.mkOpts(d[1], d[2]), d[2], d[3], submateria, d[4]||'medio');
          qs.push(new Question({
            ...raw,
            materia: sub.materia,
            submateria,
            category: submateria,
            tags: [sub.materia, submateria, this.SERIE]
          }));
        });
      });
      qs.forEach(q => StorageManager.upsertQuestion(q));
      const exam = new Exam({
        title: sub.title,
        description: sub.description,
        category: this.SERIE,
        materia: sub.materia,
        serie: this.SERIE,
        code: sub.code,
        language: 'pt-BR',
        timeMinutes: sub.timeMinutes,
        passScore: 70,
        author: 'ExamForge',
        version: '1.0',
        tags: [this.SERIE, sub.materia, 'simulado'],
        questionIds: qs.map(q => q.id)
      });
      StorageManager.upsertExam(exam);
    });
    localStorage.setItem(this.FLAG_KEY, '1');
  }

const FSRS_KEY = 'ef_fsrs_cards_v2';
const FSRS = {
  all(){ try{ return JSON.parse(localStorage.getItem(FSRS_KEY)||'{}'); }catch(e){ return {}; } },
  save(v){ try{ localStorage.setItem(FSRS_KEY, JSON.stringify(v)); }catch(e){} },
  card(q){ const all = this.all(); return all[q.id]||{due:0,stability:0,difficulty:5,reps:0,lapses:0,state:'new',last:null}; },
  stats(){
    const qs = FSRS.questions(); const now = Date.now();
    let due=0,newc=0,learning=0,review=0,totalCorrect=0,totalReps=0;
    qs.forEach(q=>{ const c=this.card(q); if(!c.reps)newc++; if(c.due<=now)due++; if(c.state==='learning')learning++; if(c.state==='review')review++; totalCorrect+=(c.correct||0); totalReps+=(c.reps||0); });
    return {total:qs.length,due,newc,learning,review,retention:totalReps?Math.round(totalCorrect/totalReps*100):0};
  },
  priority(q){ const c=this.card(q),now=Date.now(); const overdue=Math.max(0,(now-(c.due||0))/86400000); const base=(typeof AITutor!=='undefined'&&AITutor.priority)?AITutor.priority(q.id):40; return (c.state==='new'?30:0)+overdue*12+(c.difficulty||5)*6+base/2-(c.stability||0); },
  schedule(q,rating){
    const all=this.all(); const c=all[q.id]||this.card(q); const now=Date.now();
    c.reps=(c.reps||0)+1; c.last=now; c.correct=(c.correct||0)+(rating==='again'?0:1); let minutes=10;
    if(rating==='again'){ c.lapses=(c.lapses||0)+1; c.state='learning'; c.difficulty=Math.min(10,(c.difficulty||5)+1.2); c.stability=Math.max(.1,(c.stability||1)*.45); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,false); }
    else if(rating==='hard'){ c.state='review'; c.difficulty=Math.min(10,(c.difficulty||5)+.35); c.stability=Math.max(1,(c.stability||1)*1.35); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    else if(rating==='good'){ c.state='review'; c.difficulty=Math.max(1,(c.difficulty||5)-.15); c.stability=Math.max(2,(c.stability||1)*2.2); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    else{ c.state='review'; c.difficulty=Math.max(1,(c.difficulty||5)-.55); c.stability=Math.max(4,(c.stability||1)*3.6); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    c.due=now+minutes*60000; all[q.id]=c; this.save(all);
  },
  questions(){ return (StorageManager.getQuestions?StorageManager.getQuestions():[]).map(q=>new Question(q)); },
  uniq(arr){ return [...new Set(arr.filter(Boolean).map(x=>String(x).trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR')); },
  temas(q){ return this.uniq([q.tema,q.topic,...(q.tags||[])]); },
  backText(q){
    let ans='';
    if(['single','boolean','image'].includes(q.type)) ans=(q.options||[]).find(o=>o.correct)?.text||'';
    else if(q.type==='multi') ans=(q.options||[]).filter(o=>o.correct).map(o=>o.text).join(', ');
    else if(q.type==='short') ans=(q.correctShort||[]).join(' / ');
    else if(q.type==='matching') ans=(q.matchPairs||[]).map(p=>p.left+' → '+p.right).join('\n');
    else if(q.type==='sequence') ans=(q.sequenceItems||[]).map(s=>s.text).join(' → ');
    return 'Resposta: '+(ans||'Não cadastrada.')+(q.explanation?'\n\nExplicação: '+q.explanation:'');
  },
  makeExam(title,qs){ if(!qs.length){Toast.show('Nenhuma questão encontrada.','warn');return;} const ex=new Exam({id:Util.uid('exam_filter'),title,description:'Prova gerada por filtro.',category:'Revisão',timeMinutes:Math.max(5,Math.round(qs.length*1.2)),passScore:70,questionIds:qs.map(q=>q.id)}); StorageManager.upsertExam(ex); ExamConfigModal.open(ex.id); }
};

class StudyHubView {
  get title(){ return 'Estudar'; }
  get crumb(){ return ''; }
  render(el){
    el.innerHTML = '<div id="hub-panel"></div>';
    this._simulado(el.querySelector('#hub-panel'));
  }
  _simulado(panel){
    const exams=StorageManager.getExams().filter(e=>e.questionIds?.length);
    const groups = {};
    exams.forEach(e=>{
      const key = e.serie || e.category || 'Outros';
      groups[key] = groups[key] || [];
      groups[key].push(e);
    });
    const sortedKeys = Object.keys(groups).sort((a,b)=>{
      if(a.includes('2º')) return -1;
      if(b.includes('2º')) return 1;
      return a.localeCompare(b,'pt-BR');
    });
    const body = sortedKeys.map(k=>{
      const list = groups[k].sort((a,b)=>(a.materia||a.title||'').localeCompare(b.materia||b.title||'','pt-BR'));
      return `<div class="study-group"><div class="study-group-title">${Util.escapeHtml(k)}</div>${list.map(e=>DashboardView._examRow(e,{compact:true})).join('')}</div>`;
    }).join('');
    panel.innerHTML=`<div>${body||DashboardView._empty('Nenhum simulado','Crie em Biblioteca → Exames.')}</div><div class="hub-footer"><button class="btn btn-ghost btn-sm" id="sh-smart">Revisão inteligente</button></div>`;
    panel.querySelector('#sh-smart')?.addEventListener('click',()=>PlayerController.startSmartReview());
    panel.querySelectorAll('[data-play-exam]').forEach(b=>b.addEventListener('click',()=>ExamConfigModal.open(b.dataset.playExam)));
    panel.querySelectorAll('[data-edit-exam]').forEach(b=>b.addEventListener('click',()=>App.instance.router.go('builder',{examId:b.dataset.editExam})));
  }
}

class ContentHubView {
  constructor(){
    this.bank = new QuestionBankView();
    this._selectMode = false;
    this._selected = new Set();
    this._panelEl = null;
  }
  get title(){ return 'Biblioteca'; }
  get crumb(){ return ''; }
  render(el, params={}){
    const tab = params.tab || 'exames';
    const tabs = [{id:'exames', label:'Exames'}, {id:'questoes', label:'Questões'}];
    el.innerHTML = HubHelpers.tabs(tabs, tab) + '<div id="hub-panel"></div>';
    HubHelpers.bindTabs(el, 'content');
    this._panelEl = el.querySelector('#hub-panel');
    if(tab === 'questoes') this.bank.render(this._panelEl);
    else this._renderExames();
  }
  _libraryRow(e){
    if(this._selectMode){
      const on = this._selected.has(e.id);
      const title = e.title || '(sem título)';
      const meta = [e.materia||e.serie, e.questionIds?.length+' questões', e.timeMinutes+' min'].filter(Boolean).join(' · ');
      return `<label class="list-row list-row-compact list-row-select ${on?'checked':''}">
        <input type="checkbox" data-exam-cb="${e.id}" ${on?'checked':''}>
        <div class="meta">
          <div class="title">${Util.escapeHtml(title)}</div>
          <div class="desc">${Util.escapeHtml(meta)}</div>
        </div>
      </label>`;
    }
    return DashboardView._examRow(e);
  }
  _renderExames(){
    const panel = this._panelEl;
    if(!panel) return;
    const exams = StorageManager.getExams();
    const groups = {};
    exams.forEach(e=>{ const key = e.serie || e.category || 'Outros'; groups[key]=groups[key]||[]; groups[key].push(e); });
    const sortedKeys = Object.keys(groups).sort((a,b)=>{ if(a.includes('2º')) return -1; if(b.includes('2º')) return 1; return a.localeCompare(b,'pt-BR'); });
    const body = sortedKeys.map(k=>`<div class="study-group"><div class="study-group-title">${Util.escapeHtml(k)}</div>${groups[k].sort((a,b)=>(a.materia||a.title||'').localeCompare(b.materia||b.title||'','pt-BR')).map(e=>this._libraryRow(e)).join('')}</div>`).join('');
    const selCount = this._selected.size;
    const toolbar = this._selectMode ? `
      <div class="hub-actions-bar">
        <span class="hub-stat" style="margin:0">${selCount} selecionado(s)</span>
        <span class="spacer"></span>
        <button class="btn btn-sm btn-danger" id="ch-delete" type="button" ${selCount?'':'disabled'}>${Icons.trash} Excluir</button>
        <button class="btn btn-sm btn-ghost" id="ch-cancel-sel" type="button">Cancelar</button>
      </div>` : `
      <div class="hub-actions-bar">
        <button class="btn btn-sm" id="ch-new" type="button">${Icons.plus} Novo exame</button>
        <button class="btn btn-sm" id="ch-import" type="button">${Icons.upload} Importar</button>
        <span class="spacer"></span>
        <button class="btn btn-sm btn-ghost" id="ch-select" type="button">Selecionar</button>
      </div>`;
    panel.innerHTML = `${toolbar}<div id="ch-list">${exams.length ? body : DashboardView._empty('Nenhum exame','Crie ou importe um exame.')}</div>`;
    panel.querySelector('#ch-new')?.addEventListener('click', ()=> App.instance.router.go('builder', {}));
    panel.querySelector('#ch-import')?.addEventListener('click', ()=> ImportController.openModal());
    panel.querySelector('#ch-select')?.addEventListener('click', ()=>{ this._selectMode = true; this._selected.clear(); this._renderExames(); });
    panel.querySelector('#ch-cancel-sel')?.addEventListener('click', ()=>{ this._selectMode = false; this._selected.clear(); this._renderExames(); });
    panel.querySelector('#ch-delete')?.addEventListener('click', ()=> this._deleteSelected());
    panel.querySelectorAll('[data-exam-cb]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const id = cb.dataset.examCb;
        if(cb.checked) this._selected.add(id); else this._selected.delete(id);
        this._renderExames();
      });
    });
    if(!this._selectMode){
      panel.querySelectorAll('[data-play-exam]').forEach(b=> b.addEventListener('click', ()=> ExamConfigModal.open(b.dataset.playExam)));
      panel.querySelectorAll('[data-edit-exam]').forEach(b=> b.addEventListener('click', ()=> App.instance.router.go('builder', {examId:b.dataset.editExam})));
    }
  }
  async _deleteSelected(){
    const ids = [...this._selected];
    if(!ids.length) return;
    const ok = await Modal.doubleConfirm({
      title:'Excluir',
      message:`Excluir ${ids.length} exame(s)?`,
      sureMessage:'Você tem certeza?',
      danger:true
    });
    if(!ok) return;
    StorageManager.deleteExams(ids);
    this._selectMode = false;
    this._selected.clear();
    Toast.show(`${ids.length} exame(s) excluído(s).`, 'success');
    this._renderExames();
  }
}

function ludicAnalogy(q){ const text=(q?.text||'').toLowerCase(),cat=(q?.category||'').toLowerCase(),tags=(q?.tags||[]).join(' ').toLowerCase(); const base=text+' '+cat+' '+tags; if(/senha|password|mfa|autentica|login|credencial/.test(base))return 'Correlação lúdica: pense nisso como a chave da sua casa — MFA exige provar que é você.'; if(/phishing|email|link|anexo|malware/.test(base))return 'Correlação lúdica: mensagem suspeita — confira quem enviou antes de clicar.'; if(/rede|network|firewall|dns|ip|vpn/.test(base))return 'Correlação lúdica: IP é endereço, DNS agenda, firewall portaria, VPN túnel seguro.'; if(/cloud|azure|aws|storage/.test(base))return 'Correlação lúdica: armário compartilhado — quem tem a chave e o que pode alterar.'; if(/ingl[eê]s|english|vocab|grammar/.test(base))return 'Correlação lúdica: frases úteis numa viagem, não só palavras soltas.'; if(/certifica|exam|sc-|az-|defender|sentinel/.test(base))return 'Correlação lúdica: simulado do dia da prova — elimine alternativas improváveis.'; return 'Correlação lúdica: explique para alguém no café — comparação simples = entendimento.'; }
function setupLudicComments(){ if(typeof QuestionEditorController==='undefined'||QuestionEditorController._ludicPatched)return; const orig=QuestionEditorController.openModal.bind(QuestionEditorController); QuestionEditorController.openModal=function(q,onSaved){ const result=orig(q,onSaved); setTimeout(()=>{ const ta=document.querySelector('#qe-comments'); const modal=ta?.closest('.modal'); const save=modal?.querySelector('[data-save]'); if(save&&!save._ludicCapture){ save._ludicCapture=true; save.addEventListener('click',()=>{ if(!ta)return; const current={text:modal.querySelector('#qe-text')?.value||'',category:modal.querySelector('#qe-category')?.value||'',tags:(modal.querySelector('#qe-tags')?.value||'').split(',').map(x=>x.trim()).filter(Boolean)}; const a=ludicAnalogy(current); if(!ta.value.includes('Correlação lúdica:'))ta.value=a+(ta.value?'\n\n'+ta.value:''); },true); } },80); return result; }; QuestionEditorController._ludicPatched=true; }
function parseAppHash(){ const parts=(location.hash||'').replace(/^#/,'').split('/').filter(Boolean); return {route:parts[0]||'home',tab:parts[1]||null}; }

/* =========================================================================
   APP BOOTSTRAP
   ========================================================================= */
class App {
  static instance = null;
  constructor(){
    App.instance = this;
    DataCleanup.run();
    EnsinoMedio2Seeder.seed();
    this.router = new Router(this);
    this._registerRoutes();
    this._buildTabbar();
    this._bindTopbar();
    this.applySettings(StorageManager.getSettings());
    setupLudicComments();
    const hash = parseAppHash();
    const valid = ['home','study','content','progress','builder','settings','result','review'];
    const route = valid.includes(hash.route) ? hash.route : 'home';
    const params = hash.tab && hash.tab !== 'cards' ? {tab: hash.tab} : {};
    this.router.go(route, params);
    this._setupPWA();
  }
  _registerRoutes(){
    this.router.register('home', new DashboardView());
    this.router.register('study', new StudyHubView());
    this.router.register('content', new ContentHubView());
    this.router.register('progress', new ProgressHubView());
    this.router.register('builder', new BuilderView());
    this.router.register('settings', new SettingsView());
    this.router.register('result', new ResultView());
    this.router.register('review', new ReviewView());
  }
  _buildTabbar(){
    const bar = document.getElementById('tabbar');
    if(!bar) return;
    const items = [
      {route:'home', icon:Icons.dashboard, label:'Início'},
      {route:'study', icon:Icons.study, label:'Estudar'},
      {route:'content', icon:Icons.content, label:'Biblioteca'},
      {route:'progress', icon:Icons.progress, label:'Progresso'},
    ];
    items.forEach(it=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tabbar-btn';
      btn.dataset.route = it.route;
      btn.setAttribute('aria-label', it.label);
      btn.innerHTML = `${it.icon}<span>${it.label}</span>`;
      btn.addEventListener('click', ()=>this.router.go(it.route));
      bar.appendChild(btn);
    });
  }
  _bindTopbar(){
    const btn = document.getElementById('topbar-settings-btn');
    if(btn){ btn.innerHTML = Icons.settings; btn.addEventListener('click', ()=>this.router.go('settings')); }
  }
  applySettings(s){
    document.body.classList.toggle('light', !s.darkMode);
    document.documentElement.style.setProperty('--font-scale', s.fontSize || 1);
    document.body.style.fontFamily = s.font==='mono' ? 'var(--mono)' : 'var(--sans)';
  }

  /* ---------- PWA: manifest dinâmico + service worker + botão instalar ---------- */
  _setupPWA(){
    try{
      // Manifest injetado via Blob (funciona quando servido por http/https)
      const icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='108' fill='%23c17f59'/%3E%3Ctext x='256' y='340' font-family='Arial' font-size='240' font-weight='bold' fill='white' text-anchor='middle'%3EEF%3C/text%3E%3C/svg%3E";
      const manifest = {
        name:'ExamForge — Simulador de Exames', short_name:'ExamForge',
        start_url:'.', display:'standalone', background_color:'#141210', theme_color:'#141210',
        description:'Simulador de exames offline, acessível e gamificado.',
        icons:[
          {src:icon, sizes:'192x192', type:'image/svg+xml', purpose:'any maskable'},
          {src:icon, sizes:'512x512', type:'image/svg+xml', purpose:'any maskable'}
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);

      // Service worker (só registra em contexto seguro http/https; ignora em file://)
      if('serviceWorker' in navigator && location.protocol.startsWith('http')){
        const swCode = `
          const CACHE='examforge-v1';
          self.addEventListener('install',e=>{self.skipWaiting()});
          self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
          self.addEventListener('fetch',e=>{
            if(e.request.method!=='GET')return;
            e.respondWith(
              caches.open(CACHE).then(c=>c.match(e.request).then(r=>{
                const net=fetch(e.request).then(resp=>{try{c.put(e.request,resp.clone())}catch(_){}; return resp}).catch(()=>r);
                return r||net;
              }))
            );
          });`;
        const swUrl = URL.createObjectURL(new Blob([swCode], {type:'text/javascript'}));
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      }

      // Instalar (disponível a qualquer momento via menu ⋯)
      window.addEventListener('beforeinstallprompt', (e)=>{
        e.preventDefault();
        this._deferredInstall = e;
      });
    }catch(err){ /* PWA opcional; não bloqueia o app */ }
  }

  async _promptInstall(){
    if(this._deferredInstall){
      this._deferredInstall.prompt();
      await this._deferredInstall.userChoice.catch(()=>{});
      this._deferredInstall = null;
    } else {
      Modal.open({
        title:'Instalar o ExamForge',
        bodyHtml:`<p style="font-size:13.5px;color:var(--text-1);line-height:1.7">
          Para instalar no seu dispositivo:<br><br>
          <strong>Android/Chrome:</strong> menu ⋮ → "Adicionar à tela inicial".<br>
          <strong>iPhone/Safari:</strong> botão Compartilhar → "Adicionar à Tela de Início".<br>
          <strong>Desktop:</strong> ícone de instalar na barra de endereço.<br><br>
          <em>Obs.: a instalação como app requer que a página seja aberta por um servidor (http/https). Aberto como arquivo local, ele funciona 100% offline, mas sem instalação nativa.</em>
        </p>`
      });
    }
  }

}
