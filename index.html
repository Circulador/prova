class BankHierarchy {
  static groupByExam(){
    const exams = StorageManager.getExams().filter(e=>e.questionIds?.length);
    const qmap = Object.fromEntries(StorageManager.getQuestions().map(q=>[q.id,q]));
    const used = new Set();
    const byTrilha = {};
    exams.forEach(ex=>{
      const qs = ex.questionIds.map(id=>qmap[id]).filter(Boolean);
      qs.forEach(q=>used.add(q.id));
      const trilha = ex.trilha || ex.serie || ex.category || 'Outros';
      byTrilha[trilha] = byTrilha[trilha] || [];
      byTrilha[trilha].push({exam:ex, submaterias:this._bySubmateria(qs)});
    });
    const tree = Object.entries(byTrilha).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR')).map(([trilha,certs])=>({trilha,certs}));
    const orphan = StorageManager.getQuestions().filter(q=>!used.has(q.id));
    if(orphan.length) tree.push({trilha:'Sem trilha', certs:[{exam:{id:'_orphan',title:'Sem prova vinculada',questionIds:[]}, submaterias:this._bySubmateria(orphan)}]});
    return tree;
  }
  static _bySubmateria(qs){
    const map = {};
    qs.forEach(q=>{
      const s = q.submateria || q.category || 'Geral';
      map[s] = map[s] || [];
      map[s].push(q);
    });
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR')).map(([submateria,questions])=>({submateria,questions}));
  }
  static count(qs){ return qs.length; }
}

class KnowledgeOSSeeder {
  static FLAG_KEY = 'ef_knowledge_os_seeded_v3';
  static get BANK(){ return typeof KNOWLEDGE_OS_BANK !== 'undefined' ? KNOWLEDGE_OS_BANK : null; }
  static get TRACKS(){
    const bank = this.BANK;
    if(bank?.tracks?.length) return bank.tracks;
    try{ return JSON.parse(localStorage.getItem('ef_knowledge_os_tracks_v1')||'[]'); }catch(e){ return []; }
  }
  static TRILHA_DESC = "Velora Knowledge OS — Privacy, Data Protection, Information Security & Security Management.";
  static NODE_META_SCALAR_KEYS = [
    'primaryLaw', 'secondaryLaw', 'bloomLevel', 'estimatedMinutes', 'cognitiveLevel',
    'examObjective', 'officialReference', 'officialReferences', 'knowledgeArea', 'country', 'continent',
    'story', 'analogy', 'feynman', 'mnemonic', 'visualAssociation', 'learningViews',
    'revisionHistory', 'language', 'nodeId', 'knowledgeNode', 'domain', 'subdomain',
    'nistMappings', 'certifications', 'learningObjective', 'description', 'concepts',
    'bestPractices', 'commonErrors', 'risks', 'controls', 'flashcards', 'uncertainty'
  ];

  static _nodeMap(){
    const bank = this.BANK;
    if(!bank) return {};
    if(!bank._nodeMapCache){
      bank._nodeMapCache = Object.fromEntries((bank.knowledgeNodes || []).map(n=>[n.id, n]));
    }
    return bank._nodeMapCache;
  }

  static _enrichFromKnowledgeNode(raw, meta){
    const nid = raw.knowledgeNode || raw.nodeId || meta.knowledgeNode;
    const node = nid ? this._nodeMap()[nid] : null;
    if(!node) return meta;
    meta.knowledgeNode = nid;
    meta.nodeId = nid;
    meta.learningObjective = meta.learningObjective || node.learningObjective;
    meta.description = meta.description || node.description;
    meta.concepts = meta.concepts || node.concepts;
    meta.bestPractices = meta.bestPractices || node.bestPractices;
    meta.commonErrors = meta.commonErrors || node.commonErrors;
    meta.risks = meta.risks || node.risks;
    meta.controls = meta.controls || node.controls;
    meta.nistMappings = meta.nistMappings || node.nistMappings;
    meta.certifications = meta.certifications || node.certificationMappings;
    meta.officialReferences = meta.officialReferences || node.officialReferences;
    meta.uncertainty = meta.uncertainty || node.uncertainty;
    meta.flashcards = meta.flashcards || node.flashcards;
    if(node.analogies?.[0] && !meta.analogy) meta.analogy = node.analogies[0];
    if(node.scenarios?.[0] && !meta.story) meta.story = node.scenarios[0];
    if(!meta.learningViews){
      meta.learningViews = {};
      const textView = (body)=>({ viewId: Util.uid('lv'), locale: 'pt-BR', body });
      if(node.analogies?.[0]) meta.learningViews.analogy = textView(node.analogies[0]);
      if(node.scenarios?.[0]) meta.learningViews.story = textView(node.scenarios[0]);
    }
    return meta;
  }

  static _buildNodeMeta(raw, cert, submateria){
    const meta = {};
    this.NODE_META_SCALAR_KEYS.forEach(k=>{
      if(raw[k] != null && raw[k] !== '') meta[k] = raw[k];
    });
    meta.certification = meta.certification || {
      code: cert.code,
      org: cert.org || '',
      name: cert.title || cert.materia,
      stub: !!cert.stub
    };
    meta.region = meta.region || cert.region || cert.trackId || 'global';
    meta.knowledgeArea = meta.knowledgeArea || raw.domain || submateria;
    meta.knowledgeNode = meta.knowledgeNode || raw.knowledgeNode || raw.nodeId || null;
    meta.nodeId = meta.nodeId || raw.nodeId || raw.id || null;
    meta.difficulty = meta.difficulty || raw.level || 'medio';
    if(raw.nistMappings?.length) meta.nistMappings = raw.nistMappings;
    if(raw.certifications?.length) meta.certifications = raw.certifications;
    if(raw.officialReferences?.length) meta.officialReferences = raw.officialReferences;
    if(!meta.learningViews && (raw.story || raw.analogy || raw.feynman || raw.mnemonic || raw.visualAssociation)){
      meta.learningViews = Object.assign({}, meta.learningViews || {});
      const textView = (body)=>({ viewId: Util.uid('lv'), locale: meta.language || 'pt-BR', body });
      if(raw.story) meta.learningViews.story = typeof raw.story === 'string' ? textView(raw.story) : raw.story;
      if(raw.analogy) meta.learningViews.analogy = typeof raw.analogy === 'string' ? textView(raw.analogy) : raw.analogy;
      if(raw.feynman) meta.learningViews.feynman = typeof raw.feynman === 'string' ? textView(raw.feynman) : raw.feynman;
      if(raw.mnemonic) meta.learningViews.mnemonic = typeof raw.mnemonic === 'string' ? textView(raw.mnemonic) : raw.mnemonic;
      if(raw.visualAssociation){
        meta.learningViews.visual = {
          viewId: Util.uid('lv'),
          locale: meta.language || 'pt-BR',
          suggestions: Array.isArray(raw.visualAssociation) ? raw.visualAssociation : [raw.visualAssociation]
        };
      }
    }
    return this._enrichFromKnowledgeNode(raw, meta);
  }

  static trilhaLabel(cert){
    const track = this.TRACKS.find(t=>t.id===cert.trackId || t.region===cert.region);
    return track ? track.name : (cert.trackId || 'Knowledge OS');
  }

  static _normalizeOpts(raw){
    if(raw.options?.length) return raw.options.map(o=>({
      id: Util.uid('opt'),
      text: o.text || o.textPt || o.textEn || '',
      textEn: o.textEn || (raw.optionsEn && raw.optionsEn.find(x=>x.text===o.text)?.text) || o.text,
      textPt: o.textPt || o.text,
      correct: !!o.correct
    }));
    const en = raw.optionsEn || [];
    const pt = raw.optionsPt || en;
    const correctIdx = en.findIndex(o=>o.correct);
    return BankHelpers.mkOpts(en.map(o=>o.text), correctIdx >= 0 ? correctIdx : 0, pt.map(o=>o.text));
  }

  static _normalizeQuestion(raw, cert, submateria){
    const stemEn = raw.stemEn || raw.text || '';
    const stemPt = raw.stemPt || raw.text || stemEn;
    const baseTags = [this.trilhaLabel(cert), cert.materia, cert.code, submateria, cert.region || 'global'];
    const extraTags = Array.isArray(raw.tags) ? raw.tags : [];
    const nodeMeta = this._buildNodeMeta(raw, cert, submateria);
    return {
      id: raw.id || raw.nodeId || undefined,
      type: raw.type || 'single',
      text: stemPt || stemEn,
      stemEn, stemPt,
      options: this._normalizeOpts(raw),
      explanation: raw.explanationPt || raw.explanation || raw.explanationEn || '',
      explanationEn: raw.explanationEn || raw.explanation || '',
      explanationPt: raw.explanationPt || raw.explanation || '',
      level: raw.level || 'medio',
      materia: cert.materia,
      submateria,
      category: submateria,
      tags: [...new Set([...baseTags, ...extraTags])],
      nodeMeta
    };
  }

  static seed(){
    if(localStorage.getItem(this.FLAG_KEY)) return;
    const bank = this.BANK;
    if(!bank?.certifications?.length){
      console.warn('[KnowledgeOSSeeder] KNOWLEDGE_OS_BANK not loaded');
      return;
    }
    DataCleanup.run();
    const allQuestions = [];
    const allExams = [];
    bank.certifications.forEach(cert=>{
      const domains = cert.domains || cert.submaterias || {};
      const qs = [];
      Object.entries(domains).forEach(([submateria, items])=>{
        (items || []).forEach(raw=>{
          qs.push(new Question(this._normalizeQuestion(raw, cert, submateria)));
        });
      });
      allQuestions.push(...qs);
      const trilha = this.trilhaLabel(cert);
      allExams.push(new Exam({
        title: cert.title,
        description: cert.description || '',
        category: trilha,
        trilha,
        region: cert.region || 'global',
        trackId: cert.trackId || cert.region || 'global',
        materia: cert.materia,
        serie: trilha,
        code: cert.code,
        org: cert.org || '',
        language: 'dual',
        timeMinutes: cert.timeMinutes || 60,
        passScore: 70,
        author: 'Velora',
        version: bank.version || '3.0',
        tags: [trilha, cert.materia, 'certificação', cert.org || '', cert.trackId || 'global'],
        questionIds: [...new Set(qs.map(q => q.id))],
        stub: !!cert.stub
      }));
    });
    StorageManager.saveQuestions(allQuestions);
    StorageManager.saveExams(allExams);
    try{ localStorage.setItem('ef_knowledge_os_tracks_v1', JSON.stringify(this.TRACKS)); }catch(e){}
    localStorage.setItem(this.FLAG_KEY, '1');
  }

  /** Dev helper: localStorage.removeItem('ef_knowledge_os_seeded_v3') then reload */
  static resetFlag(){ localStorage.removeItem(this.FLAG_KEY); }
}

const FSRS_KEY = 'ef_fsrs_cards_v2';
const FSRS = {
  all(){ try{ return JSON.parse(localStorage.getItem(FSRS_KEY)||'{}'); }catch(e){ return {}; } },
  save(v){ try{ localStorage.setItem(FSRS_KEY, JSON.stringify(v)); }catch(e){} },
  card(q){ const all = this.all(); return all[q.id]||{due:0,stability:0,difficulty:5,reps:0,lapses:0,state:'new',last:null}; },
  stats(){
    const qs = FSRS.questions(); const now = Date.now();
    let due=0,newc=0,learning=0,review=0,totalCorrect=0,totalReps=0;
    qs.forEach(q=>{ const c=this.card(q); if(!c.reps)newc++; if(c.due<=now)due++; if(c.state==='learning')learning++; if(c.state==='review')review++; totalCorrect+=(c.correct||0); totalReps+=(c.reps||0); });
    return {total:qs.length,due,newc,learning,review,retention:totalReps?Math.round(totalCorrect/totalReps*100):0};
  },
  priority(q){ const c=this.card(q),now=Date.now(); const overdue=Math.max(0,(now-(c.due||0))/86400000); const base=(typeof AITutor!=='undefined'&&AITutor.priority)?AITutor.priority(q.id):40; return (c.state==='new'?30:0)+overdue*12+(c.difficulty||5)*6+base/2-(c.stability||0); },
  schedule(q,rating){
    const all=this.all(); const c=all[q.id]||this.card(q); const now=Date.now();
    c.reps=(c.reps||0)+1; c.last=now; c.correct=(c.correct||0)+(rating==='again'?0:1); let minutes=10;
    if(rating==='again'){ c.lapses=(c.lapses||0)+1; c.state='learning'; c.difficulty=Math.min(10,(c.difficulty||5)+1.2); c.stability=Math.max(.1,(c.stability||1)*.45); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,false); }
    else if(rating==='hard'){ c.state='review'; c.difficulty=Math.min(10,(c.difficulty||5)+.35); c.stability=Math.max(1,(c.stability||1)*1.35); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    else if(rating==='good'){ c.state='review'; c.difficulty=Math.max(1,(c.difficulty||5)-.15); c.stability=Math.max(2,(c.stability||1)*2.2); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    else{ c.state='review'; c.difficulty=Math.max(1,(c.difficulty||5)-.55); c.stability=Math.max(4,(c.stability||1)*3.6); minutes=Math.round(c.stability*24*60); if(typeof AITutor!=='undefined'&&AITutor.record)AITutor.record(q.id,true); }
    c.due=now+minutes*60000; all[q.id]=c; this.save(all);
  },
  questions(){ return (StorageManager.getQuestions?StorageManager.getQuestions():[]).map(q=>new Question(q)); },
  uniq(arr){ return [...new Set(arr.filter(Boolean).map(x=>String(x).trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR')); },
  temas(q){ return this.uniq([q.tema,q.topic,...(q.tags||[])]); },
  backText(q){
    let ans='';
    if(['single','boolean','image'].includes(q.type)) ans=(q.options||[]).find(o=>o.correct)?.text||'';
    else if(q.type==='multi') ans=(q.options||[]).filter(o=>o.correct).map(o=>o.text).join(', ');
    else if(q.type==='short') ans=(q.correctShort||[]).join(' / ');
    else if(q.type==='matching') ans=(q.matchPairs||[]).map(p=>p.left+' → '+p.right).join('\n');
    else if(q.type==='sequence') ans=(q.sequenceItems||[]).map(s=>s.text).join(' → ');
    return 'Resposta: '+(ans||'Não cadastrada.')+(q.explanation?'\n\nExplicação: '+q.explanation:'');
  },
  makeExam(title,qs){ if(!qs.length){Toast.show('Nenhuma questão encontrada.','warn');return;} const ex=new Exam({id:Util.uid('exam_filter'),title,description:'Prova gerada por filtro.',category:'Revisão',timeMinutes:Math.max(5,Math.round(qs.length*1.2)),passScore:70,questionIds:qs.map(q=>q.id)}); StorageManager.upsertExam(ex); ExamConfigModal.open(ex.id); }
};

class FlashcardController {
  static _queue = [];
  static _idx = 0;
  static _revealed = false;
  static _revealAll = false;
  static _close = null;
  static _MARKED_KEY = 'ef_fc_marked_v1';
  static _REVEAL_ALL_KEY = 'ef_fc_reveal_all_v1';
  static _FILTERS_KEY = 'ef_fc_filters_v1';

  static _loadMarked(){
    try{ return new Set(JSON.parse(localStorage.getItem(this._MARKED_KEY)||'[]')); }catch(e){ return new Set(); }
  }
  static _saveMarked(set){
    try{ localStorage.setItem(this._MARKED_KEY, JSON.stringify([...set])); }catch(e){}
  }
  static _loadSavedFilters(){
    try{ return JSON.parse(localStorage.getItem(this._FILTERS_KEY)||'null') || {}; }catch(e){ return {}; }
  }
  static _saveFilters(f){
    try{ localStorage.setItem(this._FILTERS_KEY, JSON.stringify(f)); }catch(e){}
  }
  static _showBack(){ return this._revealAll || this._revealed; }

  static filterMeta(){
    const qs = FSRS.questions();
    const exams = StorageManager.getExams();
    const trilhas = FSRS.uniq(exams.map(e=>e.trilha || e.serie || e.category || 'Outros'));
    return {
      trilhas,
      materias: FSRS.uniq(qs.map(q=>q.materia)),
      categories: FSRS.uniq(qs.map(q=>q.category || (I18n.isEn() ? 'Uncategorized' : 'Sem categoria'))),
      tags: FSRS.uniq(qs.flatMap(q=>FSRS.temas(q))),
      total: qs.length
    };
  }
  static _idsForTrilhas(trilhas){
    const ids = new Set();
    StorageManager.getExams().forEach(e=>{
      const key = e.trilha || e.serie || e.category || 'Outros';
      if(!trilhas.includes(key)) return;
      (e.questionIds||[]).forEach(id=>ids.add(id));
    });
    return ids;
  }
  static _basePool(opts={}){
    let qs = FSRS.questions();
    if(opts.examId){
      const ids = new Set(StorageManager.getExam(opts.examId)?.questionIds || []);
      qs = qs.filter(q=>ids.has(q.id));
    }
    if(opts.questionIds?.length){
      const ids = new Set(opts.questionIds);
      qs = qs.filter(q=>ids.has(q.id));
    }
    if(opts.trilhas?.length){
      const ids = this._idsForTrilhas(opts.trilhas);
      qs = qs.filter(q=>ids.has(q.id));
    }
    if(opts.materias?.length) qs = qs.filter(q=>opts.materias.includes(q.materia || ''));
    if(opts.categories?.length){
      qs = qs.filter(q=>opts.categories.includes(q.category || (I18n.isEn() ? 'Uncategorized' : 'Sem categoria')));
    }
    if(opts.tags?.length){
      qs = qs.filter(q=>opts.tags.some(t=>FSRS.temas(q).includes(t)));
    }
    return qs;
  }
  static _applyScope(pool, scope='due'){
    const now = Date.now();
    const marked = this._loadMarked();
    if(scope === 'marked') return pool.filter(q=>marked.has(q.id));
    if(scope === 'new') return pool.filter(q=>{ const c = FSRS.card(q); return !c.reps || c.state === 'new'; });
    if(scope === 'all') return pool.slice();
    const due = pool.filter(q=>{ const c = FSRS.card(q); return !c.reps || c.due <= now || c.state === 'new'; });
    return due.length ? due : pool.slice();
  }
  static countMatching(opts={}){
    const scope = opts.scope || 'due';
    return this._applyScope(this._basePool(opts), scope).length;
  }
  static _buildQueue(limit=20, opts={}){
    const scope = opts.scope || 'due';
    let pool = this._applyScope(this._basePool(opts), scope);
    pool = pool
      .map(q=>({ q, p: FSRS.priority(q), c: FSRS.card(q) }))
      .sort((a,b)=>b.p-a.p)
      .map(x=>x.q);
    if(!pool.length) pool = this._basePool(opts).slice(0, Math.min(limit, 999));
    return pool.slice(0, Math.min(limit, pool.length));
  }

  static _dueDeck(limit=20){
    return this._buildQueue(limit, { scope:'due' });
  }
  static _dueDeckForExam(examId, limit=20){
    return this._buildQueue(limit, { examId, scope:'due' });
  }
  static start(limit=20, opts={}){
    const filters = { ...opts };
    if(!filters.examId && !filters.scope) filters.scope = 'due';
    this._queue = this._buildQueue(limit, filters);
    if(!this._queue.length){
      Toast.show(I18n.isEn() ? 'No flashcards match these filters.' : 'Nenhum flashcard com esses filtros.', 'warn');
      return;
    }
    if(!filters.examId) this._saveFilters({ scope:filters.scope||'due', trilhas:filters.trilhas||[], materias:filters.materias||[], categories:filters.categories||[], tags:filters.tags||[], limit });
    this._idx = 0;
    this._revealed = false;
    try{ this._revealAll = localStorage.getItem(this._REVEAL_ALL_KEY) === '1'; }catch(e){ this._revealAll = false; }
    this._render();
  }
  static _render(){
    if(this._idx >= this._queue.length){
      Toast.show('Sessão de flashcards concluída.', 'success');
      this._close?.();
      return;
    }
    const q = this._queue[this._idx];
    const card = FSRS.card(q);
    const back = FSRS.backText(q);
    const cat = [q.materia, q.submateria||q.category].filter(Boolean).join(' · ') || 'Geral';
    const marked = this._loadMarked();
    const isMarked = marked.has(q.id);
    const showBack = this._showBack();
    const body = `
      <div class="anki-compact">
        <div class="fc-toolbar">
          <span class="fc-toolbar-count">${this._idx+1} / ${this._queue.length}</span>
          <div class="fc-toolbar-actions">
            <button type="button" class="btn btn-sm btn-ghost btn-icon${this._revealAll?' active':''}" id="fc-reveal-all" aria-pressed="${this._revealAll}" title="${I18n.t('fc.revealAll')}">${this._revealAll ? Icons.eye : Icons.eyeOff}</button>
            <button type="button" class="btn btn-sm btn-ghost btn-icon${isMarked?' active':''}" id="fc-star" aria-pressed="${isMarked}" title="${I18n.t('fc.markCard')}">${isMarked ? Icons.starFilled : Icons.star}</button>
          </div>
        </div>
        <div class="anki-card card card-compact" id="fc-card" style="cursor:${showBack?'default':'pointer'};min-height:160px">
          <div style="font-size:11px;color:var(--text-2);margin-bottom:8px">${Util.escapeHtml(cat)}</div>
          <div class="anki-front">${Util.escapeHtml(q.text)}</div>
          ${showBack ? `<div class="anki-back">${Util.escapeHtml(back)}</div>` : `<div style="font-size:12px;color:var(--text-2);margin-top:12px">${I18n.isEn() ? 'Tap card to reveal' : 'Toque no card para revelar'}</div>`}
        </div>
        <div class="anki-meta">
          <span class="anki-meta-count">${card.state||'new'}${isMarked ? ' · ★' : ''}</span>
        </div>
        ${showBack ? `<div class="anki-ratings">
          <button type="button" class="anki-rate anki-rate-again" data-rate="again">${I18n.isEn() ? 'Again' : 'De novo'}</button>
          <button type="button" class="anki-rate anki-rate-hard" data-rate="hard">${I18n.isEn() ? 'Hard' : 'Difícil'}</button>
          <button type="button" class="anki-rate anki-rate-good" data-rate="good">${I18n.isEn() ? 'Good' : 'Bom'}</button>
          <button type="button" class="anki-rate anki-rate-easy" data-rate="easy">${I18n.isEn() ? 'Easy' : 'Fácil'}</button>
        </div>` : ''}
      </div>`;
    if(this._close){
      this._close();
      this._close = null;
    }
    const {close, el} = Modal.open({
      title: I18n.isEn() ? 'Flashcards' : 'Flashcards',
      wide: true,
      modalClass: 'anki-modal',
      bodyHtml: body,
      onMount: (backdrop, closeFn)=>{
        this._close = closeFn;
        backdrop.querySelector('#fc-reveal-all')?.addEventListener('click', (e)=>{
          e.stopPropagation();
          this._revealAll = !this._revealAll;
          try{ localStorage.setItem(this._REVEAL_ALL_KEY, this._revealAll ? '1' : '0'); }catch(err){}
          if(this._revealAll) this._revealed = true;
          this._render();
        });
        backdrop.querySelector('#fc-star')?.addEventListener('click', (e)=>{
          e.stopPropagation();
          const m = this._loadMarked();
          m.has(q.id) ? m.delete(q.id) : m.add(q.id);
          this._saveMarked(m);
          this._render();
        });
        backdrop.querySelector('#fc-card')?.addEventListener('click', ()=>{
          if(!this._showBack()){ this._revealed = true; this._render(); }
        });
        backdrop.querySelectorAll('[data-rate]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            FSRS.schedule(q, btn.dataset.rate);
            AITutor.record(q.id, btn.dataset.rate !== 'again');
            this._idx++;
            this._revealed = false;
            this._render();
          });
        });
      }
    });
    this._close = close;
  }
}

    });
    update();
  }
}

class StudyFilterView {

class ContentHubView {
  constructor(){
    this.bank = new QuestionBankView();
    this.flashcards = new FlashcardsHubView();
    this._selectMode = false;
    this._selected = new Set();
    this._panelEl = null;
  }
  get title(){ return I18n.t('nav.library'); }
  get crumb(){ return ''; }
  _normTab(tab){
    if(tab === 'exames') return 'certificacoes';
    if(tab === 'cards') return 'flashcards';
    return tab || 'certificacoes';
  }
  render(el, params={}){
    const tab = this._normTab(params.tab);
    const tabs = [
      {id:'certificacoes', label:I18n.t('lib.certs')},
      {id:'questoes', label:I18n.t('lib.questions')},
      {id:'flashcards', label:I18n.t('lib.flashcards')}
    ];
    el.innerHTML = HubHelpers.tabs(tabs, tab) + '<div id="hub-panel"></div>';
    HubHelpers.bindTabs(el, 'content');
    this._panelEl = el.querySelector('#hub-panel');
    if(tab === 'questoes') this.bank.render(this._panelEl);
    else if(tab === 'flashcards') this.flashcards.render(this._panelEl);
    else this._renderCertificacoes();
  }
  _studyGroups(exams){
    const groups = {};
    exams.filter(e=>e.questionIds?.length).forEach(e=>{
      const key = e.trilha || e.serie || e.category || 'Outros';
      groups[key] = groups[key] || [];
      groups[key].push(e);
    });
    return Object.keys(groups).sort((a,b)=>a.localeCompare(b,'pt-BR')).map(k=>({
      trilha: k,
      exams: groups[k].sort((a,b)=>(a.code||a.materia||'').localeCompare(b.code||b.materia||'','pt-BR'))
    }));
  }
  _buildExamTree(exams){
    const tree = {};
    exams.forEach(e=>{
      const trilha = e.trilha || e.serie || e.category || 'Outros';
      if(!tree[trilha]) tree[trilha] = [];
      tree[trilha].push(e);
    });
    return Object.keys(tree).sort((a,b)=>a.localeCompare(b,'pt-BR')).map(trilha=>{
      const items = tree[trilha].sort((a,b)=>(a.code||a.materia||'').localeCompare(b.code||b.materia||'','pt-BR'));
      return { trilha, exams: items, ids: items.map(x=>x.id) };
    });
  }
  _chkState(ids){
    const total = ids.length;
    if(!total) return {all:false, some:false, none:true};
    const n = ids.filter(id=>this._selected.has(id)).length;
    return {all:n===total, some:n>0&&n<total, none:n===0};
  }
  _grpCheckbox(ids){
    const st = this._chkState(ids);
    return `<input type="checkbox" class="lib-grp-cb" data-grp-ids="${ids.join(',')}" ${st.all?'checked':''} aria-label="Selecionar grupo">`;
  }
  _libraryRow(e){
    if(!this._selectMode) return DashboardView._examRow(e);
    const on = this._selected.has(e.id);
    const title = e.title || e.materia || '(sem título)';
    const meta = `${e.questionIds?.length||0} questões · ${e.timeMinutes||0} min`;
    return `<label class="list-row list-row-compact list-row-select ${on?'checked':''}">
      <input type="checkbox" data-exam-cb="${e.id}" ${on?'checked':''}>
      <div class="meta">
        <div class="title">${Util.escapeHtml(title)}</div>
        <div class="desc">${Util.escapeHtml(meta)}</div>
      </div>
    </label>`;
  }
  _renderTree(tree){
    if(!tree.length) return '';
    return `<div class="lib-tree">${tree.map(s=>`
      <details class="lib-serie" open>
        <summary>
          <div class="lib-grp-head">
            ${this._selectMode ? this._grpCheckbox(s.ids) : ''}
            <span class="lib-grp-title">${Util.escapeHtml(s.trilha)}</span>
            <span class="bank-count">${s.ids.length} certificação(ões)</span>
          </div>
        </summary>
        <div class="lib-leaves">${s.exams.map(e=>this._libraryRow(e)).join('')}</div>
      </details>`).join('')}</div>`;
  }
  _renderCertificacoes(){
    const panel = this._panelEl;
    if(!panel) return;
    const exams = StorageManager.getExams();
    const studyExams = exams.filter(e=>e.questionIds?.length);
    const tree = this._buildExamTree(exams);
    const body = this._selectMode
      ? this._renderTree(tree)
      : this._studyGroups(studyExams).map(g=>`
          <div class="study-group">
            <div class="study-group-title">${Util.escapeHtml(g.trilha)}</div>
            ${g.exams.map(e=>DashboardView._examRow(e,{compact:true})).join('')}
          </div>`).join('');
    const selCount = this._selected.size;
    const toolbar = this._selectMode ? `
      <div class="hub-actions-bar">
        <div class="hub-select-tools">
          <button class="btn btn-sm btn-ghost" id="ch-sel-all" type="button">Selecionar tudo</button>
          <button class="btn btn-sm btn-ghost" id="ch-desel-all" type="button">Desmarcar tudo</button>
        </div>
        <span class="hub-stat" style="margin:0">${selCount} selecionado(s)</span>
        <span class="spacer"></span>
        <button class="btn btn-sm btn-danger" id="ch-delete" type="button" ${selCount?'':'disabled'}>${Icons.trash} Excluir</button>
        <button class="btn btn-sm btn-ghost" id="ch-cancel-sel" type="button">Cancelar</button>
      </div>` : `
      <div class="hub-actions-bar">
        <button class="btn btn-sm" id="ch-forge" type="button">${Icons.sparkles} ${I18n.t('lib.forge')}</button>
        <button class="btn btn-sm" id="ch-new" type="button">${Icons.plus} ${I18n.t('lib.newExam')}</button>
        <button class="btn btn-sm" id="ch-import" type="button">${Icons.upload} ${I18n.t('lib.import')}</button>
        <span class="spacer"></span>
        <button class="btn btn-sm btn-ghost" id="ch-select" type="button">${I18n.t('lib.select')}</button>
      </div>`;
    const activeExam = IncrementalLearningController.getActiveExamId();
    const activeStrip = activeExam && StorageManager.getExam(activeExam)
      ? IncrementalLearningController.renderStrip(activeExam)
      : '';
    const footer = this._selectMode ? '' : `<div class="hub-footer"><button class="btn btn-ghost btn-sm" id="ch-smart" type="button">${I18n.t('lib.smartReview')}</button></div>`;
    panel.innerHTML = `${activeStrip}${toolbar}<div id="ch-list">${studyExams.length || this._selectMode ? body : DashboardView._empty('Nenhuma trilha','Recarregue a página para carregar o conteúdo inicial.')}</div>${footer}`;
    panel.querySelector('#ch-forge')?.addEventListener('click', ()=> LibraryForge.open(LibraryForge.trackParams()));
    panel.querySelector('#ch-new')?.addEventListener('click', ()=> App.instance.router.go('builder', {}));
    panel.querySelector('#ch-import')?.addEventListener('click', ()=> ImportController.openModal());
    panel.querySelector('#ch-select')?.addEventListener('click', ()=>{ this._selectMode = true; this._selected.clear(); this._renderCertificacoes(); });
    panel.querySelector('#ch-cancel-sel')?.addEventListener('click', ()=>{ this._selectMode = false; this._selected.clear(); this._renderCertificacoes(); });
    panel.querySelector('#ch-sel-all')?.addEventListener('click', ()=>{
      exams.forEach(e=> this._selected.add(e.id));
      this._renderCertificacoes();
    });
    panel.querySelector('#ch-desel-all')?.addEventListener('click', ()=>{
      this._selected.clear();
      this._renderCertificacoes();
    });
    panel.querySelector('#ch-delete')?.addEventListener('click', ()=> this._deleteSelected());
    panel.querySelector('#ch-smart')?.addEventListener('click', ()=> PlayerController.startSmartReview());
    panel.querySelectorAll('.lib-grp-cb').forEach(cb=>{
      cb.addEventListener('click', e=> e.stopPropagation());
      cb.addEventListener('change', ()=>{
        const ids = (cb.dataset.grpIds||'').split(',').filter(Boolean);
        ids.forEach(id=>{ if(cb.checked) this._selected.add(id); else this._selected.delete(id); });
        this._renderCertificacoes();
      });
      const ids = (cb.dataset.grpIds||'').split(',').filter(Boolean);
      const st = this._chkState(ids);
      cb.indeterminate = st.some;
    });
    panel.querySelectorAll('[data-exam-cb]').forEach(cb=>{
      cb.addEventListener('click', e=> e.stopPropagation());
      cb.addEventListener('change', ()=>{
        const id = cb.dataset.examCb;
        if(cb.checked) this._selected.add(id); else this._selected.delete(id);
        this._renderCertificacoes();
      });
    });
    if(!this._selectMode){
      panel.querySelectorAll('[data-play-exam]').forEach(b=> b.addEventListener('click', ()=> ExamConfigModal.open(b.dataset.playExam)));
      panel.querySelectorAll('[data-inc-start]').forEach(b=> b.addEventListener('click', ()=> IncrementalLearningController.openConfig(b.dataset.incStart)));
      IncrementalLearningController.bindStrip(panel);
    }
  }
  async _deleteSelected(){
    const ids = [...this._selected];
    if(!ids.length) return;
    const ok = await Modal.doubleConfirm({
      title:'Excluir',
      message:`Excluir ${ids.length} exame(s)?`,
      sureMessage:'Você tem certeza?',
      danger:true
    });
    if(!ok) return;
    StorageManager.deleteExams(ids);
    this._selectMode = false;
    this._selected.clear();
    Toast.show(`${ids.length} exame(s) excluído(s).`, 'success');
    this._renderCertificacoes();
  }
}

    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && window.matchMedia('(max-width: 1023px)').matches);
  }

  _applyForgePlatformRules(el, cfg){
    const mobile = ForgeView._isMobileForge();
    const sel = el.querySelector('#forge-provider');
    const optOllama = sel?.querySelector('option[value="ollama"]');
    const notice = el.querySelector('#forge-platform-notice');
    if(notice) notice.innerHTML = mobile ? I18n.t('forge.platformMobile') : I18n.t('forge.platformDesktop');
    if(optOllama){
      optOllama.textContent = mobile ? I18n.t('forge.providerOllamaMobile') : I18n.t('forge.providerOllama');
      if(mobile){
        optOllama.disabled = true;
        if(sel.value === 'ollama'){

          Toast.show(I18n.isEn() ? 'Ollama is desktop-only. Using local library.' : 'Ollama é só no PC. Usando biblioteca local.', 'warn');

      } else {
        optOllama.disabled = false;
      }
    }
  }

  _applyLaunchParams(el, params={}){
    if(!params || !Object.keys(params).length) return;
    if(params.type) el.querySelector('#forge-type').value = params.type;
    if(params.quantity) el.querySelector('#forge-qty').value = params.quantity;
    if(params.cmd) el.querySelector('#forge-cmd').value = params.cmd;
    if(params.language) el.querySelector('#forge-lang').value = params.language;
    if(params.difficulty) el.querySelector('#forge-diff').value = params.difficulty;
    if(params.source){
      const src = el.querySelector('#forge-source');
      if(src) src.value = params.source;
    }
    const ctxEl = el.querySelector('#forge-library-ctx');
    if(ctxEl && params.returnTab){
      const tabLbl = { certificacoes: I18n.t('lib.certs'), questoes: I18n.t('lib.questions'), flashcards: I18n.t('lib.flashcards') }[params.returnTab] || params.returnTab;

    }
  }

  _readFilters(el){
    if(!el) return {};
    const v = id=> el.querySelector(id)?.value;
    return {
      type: v('#forge-type') || undefined,
      quantity: v('#forge-qty') ? parseInt(v('#forge-qty'),10) : undefined,
      language: v('#forge-lang') || undefined,
      difficulty: v('#forge-diff') || undefined,
      source: v('#forge-source') || undefined,
      cmd: v('#forge-cmd') || ''
    };
  }

  _filtersFromEl(el){
    const f = this._readFilters(el);
    ['type','language','difficulty','source'].forEach(k=>{ if(!f[k]) delete f[k]; });
    if(!f.quantity || Number.isNaN(f.quantity)) delete f.quantity;
    delete f.cmd;
    return f;
  }

  _bind(el){
    const cmd = el.querySelector('#forge-cmd');
    const status = el.querySelector('#forge-status');
    el.querySelector('#forge-run')?.addEventListener('click', ()=> this._run(el));
    el.querySelector('#forge-save')?.addEventListener('click', ()=> this._save(el));
    el.querySelector('#forge-save-cfg')?.addEventListener('click', ()=>{
      const c = ForgeStorage.getConfig();
      c.provider = el.querySelector('#forge-provider')?.value || 'local';
      c.apiKey = el.querySelector('#forge-api-key')?.value?.trim() || '';
      c.apiUrl = el.querySelector('#forge-api-url')?.value?.trim() || c.apiUrl;
      c.model = el.querySelector('#forge-model')?.value?.trim() || c.model;
      ForgeStorage.saveConfig(c);
      Toast.show(I18n.isEn()?'AI settings saved.':'Configurações da IA salvas.', 'success');
    });
    el.querySelector('#forge-provider')?.addEventListener('change', ()=>{
      const p = el.querySelector('#forge-provider')?.value;
      if(ForgeView._isMobileForge() && p === 'ollama'){
        el.querySelector('#forge-provider').value = 'local';
        Toast.show(I18n.isEn() ? 'Ollama requires a desktop with Ollama installed.' : 'Ollama exige um PC com o app instalado.', 'warn');
        return;
      }
      const url = el.querySelector('#forge-api-url');
      const model = el.querySelector('#forge-model');
      if(p === 'ollama'){
        if(url && (!url.value || url.value.includes('openai.com'))) url.value = 'http://localhost:11434/api/chat';
        if(model && model.value === 'gpt-4o-mini') model.value = 'llama3.2';
      } else if(p === 'openai'){
        if(url && url.value.includes('11434')) url.value = 'https://api.openai.com/v1/chat/completions';
        if(model && model.value === 'llama3.2') model.value = 'gpt-4o-mini';
      }
    });
    el.querySelector('#forge-voice')?.addEventListener('click', ()=> this._startVoice(cmd, status));
    el.querySelector('#forge-file')?.addEventListener('change', e=> this._ingestFile(e.target.files?.[0]));
    el.querySelectorAll('[data-forge-ex]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const ex = ForgeView._examples()[parseInt(btn.dataset.forgeEx,10)];
        if(ex){ cmd.value = ex; cmd.focus(); }
      });
    });
    cmd?.addEventListener('keydown', e=>{
      if((e.ctrlKey||e.metaKey) && e.key==='Enter'){ e.preventDefault(); this._run(el); }
    });
  }

  _startVoice(cmdEl, statusEl){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ Toast.show(I18n.isEn()?'Speech not supported in this browser.':'Voz não suportada neste navegador.', 'warn'); return; }
    if(this._recognition){ try{ this._recognition.stop(); }catch(_){ } this._recognition = null; }
    const rec = new SR();
    rec.lang = I18n.locale() === 'en-US' ? 'en-US' : 'pt-BR';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    this._recognition = rec;
    statusEl.textContent = I18n.isEn()?'Listening…':'Ouvindo…';
    rec.onresult = (ev)=>{
      const text = ev.results?.[0]?.[0]?.transcript || '';
      cmdEl.value = (cmdEl.value ? cmdEl.value + ' ' : '') + text.trim();
      statusEl.textContent = '';
    };
    rec.onerror = ()=>{ statusEl.textContent = ''; Toast.show(I18n.isEn()?'Voice error.':'Erro na transcrição.', 'warn'); };
    rec.onend = ()=>{ statusEl.textContent = ''; this._recognition = null; };
    rec.start();
  }

  async _ingestFile(file){
    if(!file) return;
    try{
      const text = await file.text();
      const doc = ForgeRAG.ingestTextFile(file.name, text);
      Toast.show(I18n.isEn()?`Document "${doc.name}" indexed.`:`Documento "${doc.name}" indexado.`, 'success');
      const src = document.getElementById('forge-source');
      if(src) src.value = 'document';
    }catch(e){
      Toast.show(I18n.isEn()?'Could not read file.':'Não foi possível ler o arquivo.', 'warn');
    }
  }

  async _run(el){
    if(this._busy) return;
    const command = el.querySelector('#forge-cmd')?.value?.trim();
    if(!command){ Toast.show(I18n.isEn()?'Enter a command.':'Digite um comando.', 'warn'); return; }
    const filters = this._filtersFromEl(el);
    const status = el.querySelector('#forge-status');
    const preview = el.querySelector('#forge-preview');
    const saveBtn = el.querySelector('#forge-save');
    this._busy = true;
    status.textContent = I18n.isEn()?'Generating…':'Gerando…';
    saveBtn.disabled = true;
    try{
      const result = await ForgeOrchestrator.run(command, filters, (phase, attempt)=>{
        if(phase==='rag') status.textContent = I18n.isEn()?'Retrieving library…':'Recuperando biblioteca…';
        else status.textContent = I18n.isEn()?`Generating (attempt ${attempt})…`:`Gerando (tentativa ${attempt})…`;
      });
      this._entry = result.entry;
      preview.classList.remove('hidden');
      this._renderPreview(el, result);
      saveBtn.disabled = false;
      status.textContent = I18n.isEn()?'Preview ready — confirm to save.':'Prévia pronta — confirme para salvar.';
      this._renderHistory(el);
    }catch(e){
      status.textContent = '';
      Toast.show(e.message || 'Erro', 'warn');
    }finally{
      this._busy = false;
    }
  }

  _renderPreview(el, result){
    const {intent, data, entry} = result;
    const pills = el.querySelector('#forge-pills');
    const typeLbl = ForgeSchemas.types[intent.type]?.label;
    const typeName = typeLbl ? (I18n.isEn() ? typeLbl.en : typeLbl.pt) : intent.type;
    pills.innerHTML = [
      typeName, intent.topic, `${intent.quantity} ${I18n.isEn()?'items':'itens'}`,
      intent.language, intent.difficulty, intent.source, entry.provider
    ].map(x=>`<span class="forge-pill">${Util.escapeHtml(String(x))}</span>`).join('');
    el.querySelector('#forge-json').textContent = JSON.stringify(data, null, 2);
  }

  _save(el){
    if(!this._entry){ return; }
    try{
      const result = ForgeOrchestrator.persist(this._entry);
      Toast.show(result.label || (I18n.isEn()?'Saved.':'Salvo.'), 'success');
      el.querySelector('#forge-save').disabled = true;
      el.querySelector('#forge-status').textContent = I18n.isEn()?'Persisted in platform.':'Persistido na plataforma.';
      this._renderHistory(el);
      const back = this._launchParams?.returnTab;
      if(back){
        if(typeof ForgeEngines !== 'undefined') ForgeEngines.popReturnContext();
        setTimeout(()=> App.instance.router.go('content', {tab: back}), 600);
      }
    }catch(e){
      Toast.show(e.message || 'Erro', 'warn');
    }
  }

  _renderHistory(el){
    const box = el.querySelector('#forge-history-list');
    if(!box) return;
    const hist = ForgeStorage.getHistory().slice(0, 20);
    if(!hist.length){
      box.innerHTML = `<div class="chart-empty">${I18n.isEn()?'No generations yet.':'Nenhuma geração ainda.'}</div>`;
      return;
    }
    box.innerHTML = hist.map(h=>{
      const lbl = ForgeSchemas.types[h.intent?.type]?.label;
      const typeName = lbl ? (I18n.isEn()?lbl.en:lbl.pt) : h.intent?.type;
      const st = h.status === 'saved' ? (I18n.isEn()?'saved':'salvo') : (I18n.isEn()?'preview':'prévia');
      return `<div class="forge-history-item" data-hist="${h.id}">
        <div><strong>${Util.escapeHtml(typeName||'?')}</strong> · ${Util.escapeHtml(h.intent?.topic||'')}</div>
        <div class="meta">${Util.formatDate(h.createdAt)} · ${st}${h.persisted?.label?' · '+Util.escapeHtml(h.persisted.label):''}</div>
        <div class="hub-actions-bar" style="margin-top:8px;padding:0">
          <button class="btn btn-sm btn-ghost" data-h-act="dup" type="button">${I18n.t('forge.duplicate')}</button>
          <button class="btn btn-sm btn-ghost" data-h-act="regen" type="button">${I18n.t('forge.regenerate')}</button>
          <button class="btn btn-sm btn-ghost" data-h-act="export" type="button">${I18n.t('forge.export')}</button>
          <button class="btn btn-sm btn-ghost" data-h-act="tpl" type="button">${I18n.t('forge.template')}</button>
        </div>
      </div>`;
    }).join('');
    box.querySelectorAll('[data-h-act]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const item = btn.closest('[data-hist]');
        const id = item?.dataset.hist;
        const entry = ForgeStorage.getHistory().find(x=>x.id===id);
        if(!entry) return;
        const act = btn.dataset.hAct;
        if(act==='dup'){
          el.querySelector('#forge-cmd').value = entry.command;
          el.scrollIntoView({behavior:'smooth',block:'start'});
        } else if(act==='regen'){
          el.querySelector('#forge-cmd').value = entry.command;
          this._run(el);
        } else if(act==='export'){
          const blob = new Blob([JSON.stringify({command:entry.command,intent:entry.intent,data:entry.data},null,2)], {type:'application/json'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `forge-${entry.id}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        } else if(act==='tpl'){
          ForgeStorage.saveTemplate({
            id: Util.uid('ftpl'),
            name: entry.intent?.topic || entry.command.slice(0,40),
            command: entry.command,
            filters: entry.intent,
            createdAt: new Date().toISOString()
          });
          Toast.show(I18n.isEn()?'Template saved.':'Modelo salvo.', 'success');
        }
      });
    });
  }

  onLeave(){
    if(this._recognition){ try{ this._recognition.stop(); }catch(_){ } this._recognition = null; }
    const el = document.getElementById('view-forge');
    if(el) el.classList.remove('view-forge');
  }
}

function ludicAnalogy(q){ const text=(q?.text||'').toLowerCase(),cat=(q?.category||'').toLowerCase(),tags=(q?.tags||[]).join(' ').toLowerCase(); const base=text+' '+cat+' '+tags; if(/senha|password|mfa|autentica|login|credencial/.test(base))return 'Correlação lúdica: pense nisso como a chave da sua casa — MFA exige provar que é você.'; if(/phishing|email|link|anexo|malware/.test(base))return 'Correlação lúdica: mensagem suspeita — confira quem enviou antes de clicar.'; if(/rede|network|firewall|dns|ip|vpn/.test(base))return 'Correlação lúdica: IP é endereço, DNS agenda, firewall portaria, VPN túnel seguro.'; if(/cloud|azure|aws|storage/.test(base))return 'Correlação lúdica: armário compartilhado — quem tem a chave e o que pode alterar.'; if(/ingl[eê]s|english|vocab|grammar/.test(base))return 'Correlação lúdica: frases úteis numa viagem, não só palavras soltas.'; if(/certifica|exam|sc-|az-|defender|sentinel/.test(base))return 'Correlação lúdica: simulado do dia da prova — elimine alternativas improváveis.'; return 'Correlação lúdica: explique para alguém no café — comparação simples = entendimento.'; }
function setupLudicComments(){ if(typeof QuestionEditorController==='undefined'||QuestionEditorController._ludicPatched)return; const orig=QuestionEditorController.openModal.bind(QuestionEditorController); QuestionEditorController.openModal=function(q,onSaved){ const result=orig(q,onSaved); setTimeout(()=>{ const ta=document.querySelector('#qe-comments'); const modal=ta?.closest('.modal'); const save=modal?.querySelector('[data-save]'); if(save&&!save._ludicCapture){ save._ludicCapture=true; save.addEventListener('click',()=>{ if(!ta)return; const current={text:modal.querySelector('#qe-text')?.value||'',category:modal.querySelector('#qe-category')?.value||'',tags:(modal.querySelector('#qe-tags')?.value||'').split(',').map(x=>x.trim()).filter(Boolean)}; const a=ludicAnalogy(current); if(!ta.value.includes('Correlação lúdica:'))ta.value=a+(ta.value?'\n\n'+ta.value:''); },true); } },80); return result; }; QuestionEditorController._ludicPatched=true; }
function parseAppHash(){ const parts=(location.hash||'').replace(/^#/,'').split('/').filter(Boolean); return {route:parts[0]||'home',tab:parts[1]||null}; }

/* =========================================================================
   APP BOOTSTRAP
   ========================================================================= */
function loadScriptOnce(src){
  if(document.querySelector(`script[data-velora-src="${src}"]`)) return Promise.resolve();
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = src;
    s.dataset.veloraSrc = src;
    s.onload = ()=> resolve();
    s.onerror = ()=> reject(new Error('Falha ao carregar ' + src));
    document.head.appendChild(s);
  });
}
async function loadKnowledgeBankIfNeeded(){
  if(localStorage.getItem('ef_knowledge_os_seeded_v3')) return;
  await loadScriptOnce('data/knowledge-os-bank.js');
}
async function bootstrapVelora(){
  try{
    if(typeof ForgeEngines !== 'undefined') await ForgeEngines.handleOAuthCallback();
    Loading.show(I18n?.t?.('common.loading') || 'Carregando conteúdo…');
    await loadKnowledgeBankIfNeeded();
    Loading.show('Inicializando…');
    if(typeof ChartHelpers === 'undefined' || typeof App === 'undefined'){
      throw new Error('Script principal incompleto — recarregue com Ctrl+Shift+R');
    }
    new App();
    Loading.hide();
  }catch(err){
    Loading.hide();
    console.error('Erro ao iniciar Velora', err);
    document.body.innerHTML = `<div style="padding:40px;color:#f85149;font-family:sans-serif">Erro ao iniciar a aplicação: ${String(err.message || err)}</div>`;
  }
}

class App {
  static instance = null;
  constructor(){
    App.instance = this;
    DataCleanup.run();
    KnowledgeOSSeeder.seed();
    if(KnowledgeRepository._debugEnabled()) KnowledgeRepository.validatePhase1();
    this.router = new Router(this);
    this._registerRoutes();
    this._buildTabbar();
    this._bindTopbar();
    this.applySettings(StorageManager.getSettings());
    setupLudicComments();
    const hash = parseAppHash();
    const valid = ['home','content','progress','builder','settings','result','review','help','forge'];
    let route = valid.includes(hash.route) ? hash.route : 'home';
    if(hash.route === 'study') route = 'content';
    const params = hash.tab
      ? {tab: hash.tab === 'exames' ? 'certificacoes' : (hash.tab === 'cards' ? 'flashcards' : hash.tab)}
      : (hash.route === 'study' ? {tab:'certificacoes'} : {});
    this.router.go(route, params);
    this._setupPWA();
  }
  _setupNetworkStatus(){
    const pill = document.getElementById('network-pill');
    const apply = ()=>{
      const offline = !navigator.onLine;
      document.body.dataset.network = offline ? 'offline' : 'online';
      if(!pill) return;
      pill.hidden = !offline;
      pill.textContent = offline ? 'Offline' : '';
      pill.classList.toggle('is-offline', offline);
      pill.classList.toggle('is-online', !offline);
    };
    apply();
    window.addEventListener('online', apply);
    window.addEventListener('offline', apply);
  }
  _registerRoutes(){
    this.router.register('home', new DashboardView());
    this.router.register('content', new ContentHubView());
    this.router.register('progress', new ProgressHubView());
    this.router.register('builder', new BuilderView());
    this.router.register('settings', new SettingsView());
    this.router.register('help', new HelpView());
    this.router.register('forge', new ForgeView());
    this.router.register('result', new ResultView());
    this.router.register('review', new ReviewView());
  }
  _buildTabbar(){
    const bar = document.getElementById('tabbar');
    if(!bar) return;
    bar.innerHTML = '';
    const logo = document.createElement('div');
    logo.className = 'tabbar-logo-wrap';
    logo.innerHTML = '<img src="branding/logo/symbol-white.svg" width="32" height="32" alt=""><span>Velora</span>';
    bar.appendChild(logo);
    const items = [
      {route:'home', icon:Icons.dashboard, labelKey:'nav.home', titleKey:'nav.homeTitle'},
      {route:'content', icon:Icons.content, labelKey:'nav.library', titleKey:'nav.libraryTitle'},
      {route:'progress', icon:Icons.progress, labelKey:'nav.progress', titleKey:'nav.progressTitle'},
    ];
    items.forEach(it=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tabbar-btn';
      btn.dataset.route = it.route;
      const label = I18n.t(it.labelKey);
      const title = I18n.t(it.titleKey);
      btn.setAttribute('aria-label', title);
      btn.title = title;
      btn.innerHTML = `${it.icon}<span data-i18n="${it.labelKey}">${label}</span>`;
      btn.addEventListener('click', ()=>this.router.go(it.route));
      bar.appendChild(btn);
    });
  }
  _refreshChrome(){
    this._buildTabbar();
    if(this.router.current){
      const v = this.router.routes[this.router.current];
      if(v) document.getElementById('topbar-title').textContent = v.title || this.router.current;
    }
    const settingsBtn = document.getElementById('topbar-settings-btn');
    if(settingsBtn) settingsBtn.setAttribute('aria-label', I18n.t('nav.settings'));
  }
  _bindTopbar(){
    const btn = document.getElementById('topbar-settings-btn');
    if(btn){ btn.innerHTML = Icons.settings; btn.setAttribute('aria-label', I18n.t('nav.settings')); btn.addEventListener('click', ()=>this.router.go('settings')); }
  }
  applySettings(s){
    I18n.initFromSettings(s);
    document.body.classList.toggle('light', !s.darkMode);
    document.documentElement.lang = I18n.locale() === 'en-US' ? 'en' : 'pt-BR';
    document.documentElement.style.colorScheme = s.darkMode ? 'dark' : 'light';
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta) meta.content = s.darkMode ? '#0A0A0E' : '#faf8f5';
    const scale = Number(s.fontSize) || 1;
    document.documentElement.style.setProperty('--font-scale', scale);
    [[12,'xs'],[13,'sm'],[15,'md'],[18,'lg'],[22,'xl']].forEach(([base, key])=>{
      document.documentElement.style.setProperty(`--text-${key}`, (base * scale) + 'px');
    });
    document.body.style.fontSize = (14 * scale) + 'px';
    document.body.classList.toggle('font-mono', s.font === 'mono');
    document.body.classList.toggle('font-sans', s.font !== 'mono');
    this._refreshChrome();
    if(this.router.current && !['builder','result','review'].includes(this.router.current)){
      this.router.go(this.router.current, this.router._lastParams || {});
    }
  }

  /* ---------- PWA: manifest estático + service worker + instalação ---------- */
  _setupPWA(){
    this._setupNetworkStatus();
    try{
      window.addEventListener('beforeinstallprompt', (e)=>{
        e.preventDefault();
        this._deferredInstall = e;
      });

      if(!('serviceWorker' in navigator) || !location.protocol.startsWith('http')) return;

      navigator.serviceWorker.register('./sw.js', { scope: './' }).then((reg)=>{
        reg.addEventListener('updatefound', ()=>{
          const nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', ()=>{
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              Toast.show('Nova versão disponível. Atualize quando terminar o simulado.', 'warn');
            }
          });
        });
      }).catch(()=>{});
    }catch(err){ /* PWA opcional; não bloqueia o app */ }
  }

  _isAppInstalled(){
    return window.matchMedia('(display-mode: standalone)').matches
      || window.matchMedia('(display-mode: fullscreen)').matches
      || window.navigator.standalone === true;
  }
  _getInstallState(){
    if(this._isAppInstalled()) return 'installed';
    if(this._deferredInstall) return 'prompt';
    return 'manual';
  }
  _renderInstallCard(){
    const state = this._getInstallState();
    const badges = {
      installed: [I18n.t('settings.installDone'), 'badge-good'],
      prompt: [I18n.t('settings.installReady'), 'badge-accent'],
      manual: [I18n.t('settings.installHow'), 'badge-warn']
    };
    const [label, cls] = badges[state];
    const btnLabel = state === 'installed' ? I18n.t('settings.installDone') : state === 'prompt' ? I18n.t('settings.installBtn') : I18n.t('settings.installHow');
    const btnClass = state === 'installed' ? 'btn btn-ghost' : 'btn btn-primary';
    const disabled = state === 'installed' ? ' disabled' : '';
    return `
      <div class="card card-compact" id="s-pwa-card">
        <div class="row between" style="margin-bottom:8px">
          <span style="font-weight:600;font-size:13.5px">${I18n.t('settings.installApp')}</span>
          <span class="badge ${cls}">${label}</span>
        </div>
        <p style="font-size:12.5px;color:var(--text-2);line-height:1.55;margin:0 0 12px">
          ${I18n.t('settings.installDesc')}
        </p>
        <button class="${btnClass}" id="s-install"${disabled}>${btnLabel}</button>
        <details style="margin-top:10px;font-size:12px;color:var(--text-2);line-height:1.6">
          <summary style="cursor:pointer;font-weight:600;color:var(--text-1)">${I18n.t('settings.installManual')}</summary>
          <p style="margin:8px 0 0">
            <strong>Android / Chrome:</strong> menu ⋮ → Adicionar à tela inicial.<br>
            <strong>iPhone / Safari:</strong> Compartilhar → Adicionar à Tela de Início.<br>
            <strong>Desktop:</strong> ícone de instalar na barra de endereço.<br>
            <em style="display:block;margin-top:8px">Requer HTTPS (GitHub Pages). Arquivo local funciona offline, mas sem instalação nativa.</em>
          </p>
        </details>
      </div>`;
  }
  async _promptInstall(){
    if(this._isAppInstalled()){
      Toast.show('O Velora já está instalado neste dispositivo.', 'success');
      return;
    }
    if(this._deferredInstall){
      this._deferredInstall.prompt();
      const choice = await this._deferredInstall.userChoice.catch(()=>null);
      this._deferredInstall = null;
      if(choice?.outcome === 'accepted'){
        Toast.show('App instalado. Abra pelo ícone na tela inicial.', 'success');
      }
      return;
    }
    Modal.open({
      title:'Instalar o Velora',
      bodyHtml:`<p style="font-size:13.5px;color:var(--text-1);line-height:1.7">
        Para instalar no seu dispositivo:<br><br>
        <strong>Android/Chrome:</strong> menu ⋮ → "Adicionar à tela inicial".<br>
        <strong>iPhone/Safari:</strong> botão Compartilhar → "Adicionar à Tela de Início".<br>
        <strong>Desktop:</strong> ícone de instalar na barra de endereço.<br><br>
        <em>Obs.: a instalação como app requer que a página seja aberta por um servidor (http/https). Aberto como arquivo local, ele funciona 100% offline, mas sem instalação nativa.</em>
      </p>`
    });
  }

}

});

document.addEventListener('DOMContentLoaded', ()=>{
  bootstrapVelora();
});
</script>
