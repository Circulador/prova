    });

    modalEl.querySelector('#ec-export-config')?.addEventListener('click', ()=>{
      try{
        const snap = this._snapshotConfig(modalEl);
        snap.exportedAt = new Date().toISOString();
        const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'velora-session-config.json';
        a.click();
        URL.revokeObjectURL(a.href);
        Toast.show('Configuração exportada.', 'success');
      }catch(e){ Toast.show('Não foi possível exportar.', 'error'); }
    });
    modalEl.querySelector('#ec-import-config-btn')?.addEventListener('click', ()=> modalEl.querySelector('#ec-import-config')?.click());
    modalEl.querySelector('#ec-import-config')?.addEventListener('change', e=>{
      const file = e.target.files?.[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const snap = JSON.parse(reader.result);
          if(snap.examId && snap.examId !== modalEl.querySelector('#ec-exam-global').value) syncExam(snap.examId);
          this._applySnapshot(modalEl, snap);
          this._updatePreview(modalEl);
          Toast.show('Configuração importada.', 'success');
        }catch(err){ Toast.show('JSON inválido.', 'error'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    modalEl.querySelectorAll('[name="ec-mode"]').forEach(r=>{
      r.addEventListener('change', ()=>{
        modalEl.querySelectorAll('.ec-mode-panel').forEach(p=>{
          if(p.dataset.panel === 'full') return;
          p.classList.add('hidden');
        });
        const panel = modalEl.querySelector(`[data-panel="${r.value}"]`);
        if(panel && r.value !== 'full') panel.classList.remove('hidden');
        if(r.value === 'full' || r.value === 'count'){
          const total = StorageManager.getExam(modalEl.querySelector('#ec-exam-global').value)?.questionIds?.length || 0;
          const basicQty = modalEl.querySelector('#ec-basic-qty');
          if(basicQty){
            if(r.value === 'full'){ basicQty.value = total; modalEl._countEdited = false; }
            else if(r.value === 'count'){ basicQty.value = parseInt(modalEl.querySelector('#ec-n-count')?.value,10)||total; modalEl._countEdited = true; }
          }
        }
        this._updatePreview(modalEl);
      });
    });

    modalEl.querySelector('#ec-exam-global')?.addEventListener('change', e=> syncExam(e.target.value));
    modalEl.querySelector('#ec-n-count')?.addEventListener('input', ()=>{
      modalEl._countEdited = true;
      const n = parseInt(modalEl.querySelector('#ec-n-count')?.value, 10);
      const basicQty = modalEl.querySelector('#ec-basic-qty');
      if(basicQty && n) basicQty.value = n;
      modalEl.querySelector('[name="ec-mode"][value="count"]')?.click();
      this._updatePreview(modalEl);
    });
    modalEl.querySelector('#ec-range-from')?.addEventListener('input', ()=>{ modalEl._rangeEdited = true; this._updatePreview(modalEl); });
    modalEl.querySelector('#ec-range-to')?.addEventListener('input', ()=>{ modalEl._rangeEdited = true; this._updatePreview(modalEl); });
    modalEl.querySelector('#ec-n-incorrect')?.addEventListener('input', ()=> this._updatePreview(modalEl));
    ['#ec-ex-mastered','#ec-ex-today','#ec-shuffle-q','#ec-shuffle-alt'].forEach(sel=>{
      modalEl.querySelector(sel)?.addEventListener('change', ()=> this._updatePreview(modalEl));
    });
    modalEl.querySelector('#ec-meta-filters-wrap')?.addEventListener('change', e=>{
      if(e.target.matches('input[type=checkbox]')) this._updatePreview(modalEl);
    });

    if(preset === 'quick'){
      modalEl.querySelector('[name="ec-mode"][value="count"]')?.click();
      const total = StorageManager.getExam(modalEl.querySelector('#ec-exam-global').value)?.questionIds?.length || 15;
      const n = Math.min(15, total);
      const nCount = modalEl.querySelector('#ec-n-count');
      const basicQty = modalEl.querySelector('#ec-basic-qty');
      if(nCount) nCount.value = n;
      if(basicQty) basicQty.value = n;
    } else if(preset === 'errors'){
      modalEl.querySelector('[name="ec-mode"][value="incorrect"]')?.click();
      const nInc = modalEl.querySelector('#ec-n-incorrect');
      if(nInc) nInc.value = 1;
    } else if(preset === 'full'){
      modalEl.querySelector('[name="ec-mode"][value="full"]')?.click();
    } else if(preset === 'sprint'){
      modalEl.querySelector('#ec-strategy').value = 'sprint';
      applyStrategy('sprint');
    } else if(preset === 'marathon'){
      modalEl.querySelector('#ec-strategy').value = 'marathon';
      applyStrategy('marathon');
    }

    modalEl.querySelectorAll('.ec-inline-input').forEach(inp=>{
      inp.addEventListener('click', e=> e.stopPropagation());
      inp.addEventListener('focus', ()=>{
        const radio = inp.closest('.ec-radio-row')?.querySelector('input[type=radio]');
        if(radio) radio.checked = true;
      });
    });

    modalEl.querySelector('[data-select-all]')?.addEventListener('click', ()=>{
      modalEl.querySelectorAll('.ec-section-cb').forEach(cb=>{ cb.checked = true; });
      this._updatePreview(modalEl);
    });
    modalEl.querySelector('[data-deselect-all]')?.addEventListener('click', ()=>{
      modalEl.querySelectorAll('.ec-section-cb').forEach(cb=>{ cb.checked = false; });
      this._updatePreview(modalEl);
    });
    modalEl.querySelector('#ec-sections')?.addEventListener('change', e=>{
      if(e.target.classList.contains('ec-section-cb')) this._updatePreview(modalEl);
    });

    const timerOn = modalEl.querySelector('#ec-timer-on');
    const timeInput = modalEl.querySelector('#ec-time');
    const toggleTimer = ()=>{
      if(timeInput) timeInput.disabled = !timerOn.checked;
      this._updatePreview(modalEl);
    };
    timerOn?.addEventListener('change', toggleTimer);
    timeInput?.addEventListener('input', ()=>{ modalEl._timeEdited = true; this._updatePreview(modalEl); });
    toggleTimer();

    modalEl.querySelector('[data-cancel]')?.addEventListener('click', closeFn);
    modalEl.querySelector('[data-ok]')?.addEventListener('click', ()=>{
      const product = this._getStudyProduct(modalEl);
      if(product === 'progressive'){
        const examId = modalEl.querySelector('#ec-exam-global')?.value;
        if(!examId){ Toast.show(I18n.isEn() ? 'Pick a track.' : 'Escolha uma trilha.', 'warn'); return; }
        IncrementalLearningController.applyConfig(examId, this._collectIncConfig(modalEl));
        closeFn();
        IncrementalLearningController.start(examId);
        return;
      }
      if(product === 'flashcards'){
        const examId = modalEl.querySelector('#ec-exam-global')?.value;
        const limit = Math.max(1, parseInt(modalEl.querySelector('#ec-basic-qty')?.value, 10) || 20);
        if(!examId){ Toast.show(I18n.isEn() ? 'Pick a study track.' : 'Escolha uma trilha.', 'warn'); return; }
        closeFn();
        FlashcardController.start(limit, {examId});
        return;
      }
      if(modalEl.querySelector('#ec-strategy')?.value === 'cat'){
        closeFn();
        PlayerController.startSmartReview();
        return;
      }
      const result = this._collectConfig(modalEl);
      if(!result.ok){ Toast.show(result.error, 'warn'); return; }
      try{ localStorage.setItem(this.CANDIDATE_KEY, result.config.candidateName || ''); }catch(e){}
      closeFn();
      PlayerController.start(result.config);
    });

    this._updatePreview(modalEl);
  }

  static _collectConfig(modalEl){
    const candidateName = modalEl.querySelector('#ec-candidate')?.value.trim() || '';
    const mode = modalEl.querySelector('[name="ec-mode"]:checked')?.value || 'full';
    const product = this._getStudyProduct(modalEl);
    const trainingMode = product === 'learn';
    const timerOn = product === 'exam' && !!modalEl.querySelector('#ec-timer-on')?.checked;
    const timeMinutes = Math.max(1, parseInt(modalEl.querySelector('#ec-time')?.value, 10) || 60);
    const shuffleQuestions = modalEl.querySelector('#ec-shuffle-q')?.checked !== false;
    const shuffleAlternatives = !!modalEl.querySelector('#ec-shuffle-alt')?.checked;
    const excludeMastered = !!modalEl.querySelector('#ec-ex-mastered')?.checked;
    const excludeToday = !!modalEl.querySelector('#ec-ex-today')?.checked;
    let examId, questionIds;

    switch(mode){
      case 'full':
        examId = modalEl.querySelector('#ec-exam-global').value;
        questionIds = this._finalizePool([...(StorageManager.getExam(examId)?.questionIds || [])], modalEl);
        break;
      case 'sections': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const tree = this._sectionTree(examId);
        const checked = [...modalEl.querySelectorAll('.ec-section-cb:checked')];
        if(!checked.length) return {ok:false, error:'Selecione ao menos uma seção.'};
        const idSet = new Set();
        checked.forEach(cb=> cb.dataset.ids.split(',').filter(Boolean).forEach(id=>idSet.add(id)));
        questionIds = this._finalizePool(tree.orderedIds.filter(id=>idSet.has(id)), modalEl);
        break;
      }
      case 'count': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const pool = this._finalizePool(StorageManager.getExam(examId)?.questionIds || [], modalEl);
        const n = parseInt(modalEl.querySelector('#ec-n-count').value, 10);
        if(!n || n < 1) return {ok:false, error:'Informe uma quantidade válida (N ≥ 1).'};
        if(n > pool.length) return {ok:false, error:`Restam apenas ${pool.length} questão(ões) após filtros.`};
        questionIds = Util.shuffle([...pool]).slice(0, n);
        break;
      }
      case 'range': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        const x = parseInt(modalEl.querySelector('#ec-range-from').value, 10);
        const y = parseInt(modalEl.querySelector('#ec-range-to').value, 10);
        if(!x || !y || x < 1 || y < x) return {ok:false, error:'Intervalo inválido. Use X ≤ Y, a partir de 1.'};
        if(y > pool.length) return {ok:false, error:`A prova tem apenas ${pool.length} questão(ões).`};
        questionIds = this._finalizePool(pool.slice(x - 1, y), modalEl);
        break;
      }
      case 'incorrect': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const n = parseInt(modalEl.querySelector('#ec-n-incorrect').value, 10);
        if(n == null || n < 0 || isNaN(n)) return {ok:false, error:'Informe N ≥ 0.'};
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        questionIds = this._finalizePool(pool.filter(qid=>{
          const s = StorageManager.getStat(qid);
          return (s.seen - s.correct) >= n;
        }), modalEl);
        if(!questionIds.length) return {ok:false, error:`Nenhuma questão com ${n}+ erro(s) após filtros.`};
        break;
      }
      case 'unseen': {
        examId = modalEl.querySelector('#ec-exam-global').value;
        const pool = StorageManager.getExam(examId)?.questionIds || [];
        questionIds = this._finalizePool(pool.filter(qid=>StorageManager.getStat(qid).seen===0), modalEl);
        if(!questionIds.length) return {ok:false, error:'Nenhuma questão nunca respondida nesta prova.'};
        break;
      }
      default:
        return {ok:false, error:'Seleção de questões inválida.'};
    }

    if(!questionIds.length) return {ok:false, error:'Nenhuma questão selecionada após filtros.'};
    if(shuffleQuestions && mode !== 'count') questionIds = Util.shuffle([...questionIds]);
    const strategy = modalEl.querySelector('#ec-strategy')?.value || 'normal';
    const session = new SessionConfig({
      examId, candidateName, questionIds, trainingMode, timerOn, timeMinutes, configMode: mode,
      excludeMastered, excludeToday, unseenOnly: mode === 'unseen',
      shuffleQuestions, shuffleAlternatives, preSubmitReview: !trainingMode,
      strategy
    });
    return {ok:true, config: session.toPlayerConfig()};
  }

  static _snapshotConfig(modalEl){
    const snap = {
      version: 1,
      examId: modalEl.querySelector('#ec-exam-global')?.value,
      mode: modalEl.querySelector('[name="ec-mode"]:checked')?.value,
      training: this._trainingMode(modalEl),
      timerOn: !!modalEl.querySelector('#ec-timer-on')?.checked,
      timeMinutes: modalEl.querySelector('#ec-time')?.value,
      basicQty: modalEl.querySelector('#ec-basic-qty')?.value,
      nCount: modalEl.querySelector('#ec-n-count')?.value,
      rangeFrom: modalEl.querySelector('#ec-range-from')?.value,
      rangeTo: modalEl.querySelector('#ec-range-to')?.value,
      nIncorrect: modalEl.querySelector('#ec-n-incorrect')?.value,
      candidate: modalEl.querySelector('#ec-candidate')?.value,
      strategy: modalEl.querySelector('#ec-strategy')?.value || 'normal',
      shuffleQuestions: modalEl.querySelector('#ec-shuffle-q')?.checked !== false,
      shuffleAlternatives: !!modalEl.querySelector('#ec-shuffle-alt')?.checked,
      excludeMastered: !!modalEl.querySelector('#ec-ex-mastered')?.checked,
      excludeToday: !!modalEl.querySelector('#ec-ex-today')?.checked,
      metaLevels: [...modalEl.querySelectorAll('.ec-meta-lvl input')].map(c => ({ v: c.value, on: c.checked })),
      metaSubs: [...modalEl.querySelectorAll('.ec-meta-sub input')].map(c => ({ v: c.value, on: c.checked })),
      metaTags: [...modalEl.querySelectorAll('.ec-meta-tag input')].map(c => ({ v: c.value, on: c.checked })),
    };
    return snap;
  }

  static _applyMetaSnapshot(modalEl, snap){
    const apply = (sel, items) => {
      if(!items?.length) return;
      const map = Object.fromEntries(items.map(i => [i.v, i.on]));
      modalEl.querySelectorAll(sel).forEach(c => {
        if(map[c.value] != null) c.checked = !!map[c.value];
      });
    };
    apply('.ec-meta-lvl input', snap.metaLevels);
    apply('.ec-meta-sub input', snap.metaSubs);
    apply('.ec-meta-tag input', snap.metaTags);
  }

  static _applySnapshot(modalEl, snap){
    if(!snap) return;
    if(snap.examId) modalEl.querySelector('#ec-exam-global').value = snap.examId;
    if(snap.mode) modalEl.querySelector(`[name="ec-mode"][value="${snap.mode}"]`)?.click();
    this._setSessionType(modalEl, !!snap.training);
    if(snap.timerOn != null) modalEl.querySelector('#ec-timer-on').checked = !!snap.timerOn;
    if(snap.timeMinutes) modalEl.querySelector('#ec-time').value = snap.timeMinutes;
    if(snap.basicQty) modalEl.querySelector('#ec-basic-qty').value = snap.basicQty;
    if(snap.nCount) modalEl.querySelector('#ec-n-count').value = snap.nCount;
    if(snap.rangeFrom) modalEl.querySelector('#ec-range-from').value = snap.rangeFrom;
    if(snap.rangeTo) modalEl.querySelector('#ec-range-to').value = snap.rangeTo;
    if(snap.nIncorrect != null) modalEl.querySelector('#ec-n-incorrect').value = snap.nIncorrect;
    if(snap.candidate != null) modalEl.querySelector('#ec-candidate').value = snap.candidate;
    if(snap.strategy) modalEl.querySelector('#ec-strategy').value = snap.strategy;
    if(snap.shuffleQuestions != null) modalEl.querySelector('#ec-shuffle-q').checked = !!snap.shuffleQuestions;
    if(snap.shuffleAlternatives != null) modalEl.querySelector('#ec-shuffle-alt').checked = !!snap.shuffleAlternatives;
    if(snap.excludeMastered != null) modalEl.querySelector('#ec-ex-mastered').checked = !!snap.excludeMastered;
    if(snap.excludeToday != null) modalEl.querySelector('#ec-ex-today').checked = !!snap.excludeToday;
    this._applyMetaSnapshot(modalEl, snap);
    this._syncBasicToMode(modalEl);
  }
}

/* =========================================================================
   INCREMENTAL LEARNING (Progressive cumulative blocks — 4 phases)
   Connected across Trilhas · Questões · Flashcards via active certification.
   ========================================================================= */
class IncrementalLearningController {
  static KEY = 'ef_incremental_v1';
  static ACTIVE_KEY = 'ef_incremental_active_exam';
  static DEFAULTS = {
    blockSize: 10,
    passThreshold: 70,
    useOfficialPass: false,
    maxAttempts: null,
    autoShuffleQ: true,
    autoShuffleAlt: true,
    autoReview: true,
    repeatWrongOnly: false,
    repeatHardOnly: false,
    repeatForgetting: false,
    fullReviewBeforeExam: true
  };
  static OFFICIAL_PASS = {
    'EXIN-PDPP': { pct: 65, ref: 'EXIN PDPP exam specification (26/40 = 65%)' },
    'EXIN-PDPF': { pct: 65, ref: 'EXIN PDPF exam specification' },
    'EXIN-ISFS': { pct: 65, ref: 'EXIN ISFS exam specification' }
  };
  static OFFICIAL_NON_PCT = {
    'ISC2-CISSP': 'ISC2 CISSP uses scaled scoring (700/1000) — not a simple percentage.',
    'ISACA-CISM': 'ISACA CISM uses a scaled score — see the official Candidate Guide.'
  };

  static _all(){
    try{ return JSON.parse(localStorage.getItem(this.KEY)||'{}'); }catch(e){ return {}; }
  }
  static _saveAll(data){
    try{ localStorage.setItem(this.KEY, JSON.stringify(data)); }catch(e){}
  }
  static getActiveExamId(){
    try{ return localStorage.getItem(this.ACTIVE_KEY)||''; }catch(e){ return ''; }
  }
  static setActiveExamId(examId){
    try{
      if(examId) localStorage.setItem(this.ACTIVE_KEY, examId);
      else localStorage.removeItem(this.ACTIVE_KEY);
    }catch(e){}
  }
  static ensure(examId){
    const all = this._all();
    if(!all[examId]){
      all[examId] = {
        ...this.DEFAULTS,
        currentBlock: 1,
        currentPhase: 1,
        phaseAttempts: {},
        blockStats: [],
        masteredIds: [],
        startedAt: new Date().toISOString(),
        completed: false
      };
      this._saveAll(all);
    }
    return all[examId];
  }
  static save(examId, progress){
    const all = this._all();
    all[examId] = progress;
    this._saveAll(all);
  }
  static getOfficialPassInfo(exam){
    const code = exam?.code || '';
    if(this.OFFICIAL_PASS[code]) return { ...this.OFFICIAL_PASS[code], available: true };
    if(this.OFFICIAL_NON_PCT[code]) return { available: false, note: this.OFFICIAL_NON_PCT[code] };
    if(exam?.passScore) return { pct: exam.passScore, ref: exam.title, available: true, fallback: true };
    return { available: false, note: I18n.t('inc.noOfficialPass') };
  }
  static passThreshold(exam, progress){
    if(progress.useOfficialPass){
      const info = this.getOfficialPassInfo(exam);
      if(info.available && info.pct != null) return info.pct;
    }
    return Math.min(100, Math.max(50, progress.passThreshold || 70));
  }
  static totalBlocks(exam, blockSize){
    const n = exam?.questionIds?.length || 0;
    return Math.max(1, Math.ceil(n / blockSize));
  }
  static unlockedCount(exam, progress){
    const total = exam?.questionIds?.length || 0;
    const bs = progress.blockSize || 10;
    const block = progress.currentBlock || 1;
    return Math.min(total, block * bs);
  }
  static questionPool(exam, progress){
    const ids = exam?.questionIds || [];
    return ids.slice(0, this.unlockedCount(exam, progress));
  }
  static phaseLabel(phase){
    const map = { 1: I18n.t('inc.phase1'), 2: I18n.t('inc.phase2'), 3: I18n.t('inc.phase3'), 4: I18n.t('inc.phase4') };
    return map[phase] || '';
  }
  static summary(examId){
    const exam = StorageManager.getExam(examId);
    if(!exam?.questionIds?.length) return null;
    const p = this.ensure(examId);
    const total = exam.questionIds.length;
    const blocks = this.totalBlocks(exam, p.blockSize);
    const unlocked = this.unlockedCount(exam, p);
    const pctDone = Math.round((unlocked / total) * 100);
    const phase = p.currentPhase || 1;
    const block = p.currentBlock || 1;
    return {
      examId, exam, progress: p, total, blocks, unlocked, pctDone, phase, block,
      passThreshold: this.passThreshold(exam, p),
      officialInfo: this.getOfficialPassInfo(exam),
      completed: !!p.completed
    };
  }
  static buildPlayerConfig(examId){
    const exam = StorageManager.getExam(examId);
    if(!exam) return null;
    const progress = this.ensure(examId);
    if(progress.completed) return null;
    this.setActiveExamId(examId);
    const phase = progress.currentPhase || 1;
    let pool = this.questionPool(exam, progress);
    if(progress.repeatWrongOnly){
      pool = pool.filter(id=>{
        const s = StorageManager.getStat(id);
        return s.seen > 0 && s.correct < s.seen;
      });
      if(!pool.length) pool = this.questionPool(exam, progress);
    }
    const shuffleQ = phase === 1 ? false : (phase >= 2 && progress.autoShuffleQ !== false);
    const shuffleAlt = phase >= 3 && progress.autoShuffleAlt !== false;
    return {
      examId,
      questionIds: pool,
      incrementalMode: true,
      incrementalPhase: phase,
      incrementalBlock: progress.currentBlock,
      trainingMode: phase < 4,
      timerOn: false,
      shuffleQuestions: shuffleQ,
      shuffleAlternatives: shuffleAlt,
      preSubmitReview: false,
      showAnswerAfterSelect: phase < 4,
      allowRevealAnswer: phase < 4
    };
  }
  static start(examId){
    const cfg = this.buildPlayerConfig(examId);
    if(!cfg){
      Toast.show(I18n.t('inc.complete'), 'success');
      return;
    }
    PlayerController.start(cfg);
  }
  static openConfig(examId){
    ExamConfigModal.open(examId, { product: 'progressive' });
  }
  static onSessionComplete(examId, historyEntry, state){
    const exam = StorageManager.getExam(examId);
    const progress = this.ensure(examId);
    const phase = state?.incrementalPhase || progress.currentPhase || 1;
    const block = state?.incrementalBlock || progress.currentBlock || 1;
    const key = `${block}:${phase}`;
    progress.phaseAttempts = progress.phaseAttempts || {};
    progress.phaseAttempts[key] = (progress.phaseAttempts[key] || 0) + 1;
    progress.blockStats = progress.blockStats || [];
    progress.blockStats.push({
      block, phase,
      pct: historyEntry.percentage,
      correct: historyEntry.correctCount,
      total: historyEntry.totalCount,
      date: historyEntry.date,
      duration: historyEntry.timeSpentSeconds
    });
    if(phase < 4){
      progress.currentPhase = phase + 1;
      this.save(examId, progress);
      return {
        ok: true, advanced: 'phase', nextPhase: phase + 1, block,
        message: `${I18n.t('inc.passedPhase')} → ${this.phaseLabel(phase + 1)}`
      };
    }
    const min = this.passThreshold(exam, progress);
    const passed = historyEntry.percentage >= min;
    if(!passed){
      const max = progress.maxAttempts;
      if(max && progress.phaseAttempts[key] >= max){
        return { ok: false, advanced: false, retry: true, maxAttempts: true, min, pct: historyEntry.percentage };
      }
      return { ok: false, advanced: false, retry: true, min, pct: historyEntry.percentage };
    }
    const totalBlocks = this.totalBlocks(exam, progress.blockSize);
    if(block >= totalBlocks){
      progress.completed = true;
      progress.completedAt = new Date().toISOString();
      this.save(examId, progress);
      return { ok: true, advanced: 'complete', message: I18n.t('inc.complete') };
    }
    progress.currentBlock = block + 1;
    progress.currentPhase = 1;
    const cumulative = this.unlockedCount(exam, progress);
    this.save(examId, progress);
    return {
      ok: true, advanced: 'block', nextBlock: progress.currentBlock, cumulative,
      message: I18n.t('inc.blockUnlocked').replace('{n}', String(cumulative))
    };
  }
  static renderStrip(examId, opts={}){
    const s = this.summary(examId);
    if(!s) return '';
    const phaseLbl = this.phaseLabel(s.phase);
    const blockLbl = I18n.t('inc.block').replace('{cur}', s.block).replace('{tot}', s.blocks);
    const btn = s.completed
      ? `<span class="inc-phase-pill">${I18n.t('inc.complete')}</span>`
      : `<button type="button" class="btn btn-sm btn-primary" data-inc-continue="${examId}">${Icons.play} ${I18n.t('inc.continue')}</button>`;
    return `
      <div class="inc-strip" data-inc-strip="${examId}">
        <span class="inc-phase-pill">${Util.escapeHtml(blockLbl)} · ${Util.escapeHtml(phaseLbl)}</span>
        <div class="inc-progress-bar" title="${s.pctDone}%"><span style="width:${s.pctDone}%"></span></div>
        <span class="inc-strip-meta">${s.unlocked}/${s.total} · meta ${s.passThreshold}%</span>
        ${btn}
        ${opts.compact ? '' : `<span class="hint" style="width:100%;margin-top:2px">${I18n.t('inc.stripHint')}</span>`}
      </div>`;
  }
  static bindStrip(el){
    el?.querySelectorAll('[data-inc-continue]').forEach(b=>{
      b.addEventListener('click', ()=> this.start(b.dataset.incContinue));
    });
  }
  static applyConfig(examId, cfg){
    const p = this.ensure(examId);
    Object.assign(p, {
      blockSize: cfg.blockSize,
      passThreshold: cfg.passThreshold,
      useOfficialPass: cfg.useOfficialPass,
      maxAttempts: cfg.maxAttempts,
      autoShuffleQ: cfg.autoShuffleQ,
      autoShuffleAlt: cfg.autoShuffleAlt,
      autoReview: cfg.autoReview,
      repeatWrongOnly: cfg.repeatWrongOnly,
      repeatHardOnly: cfg.repeatHardOnly,
      repeatForgetting: cfg.repeatForgetting
    });
    if(cfg.reset) { p.currentBlock = 1; p.currentPhase = 1; p.completed = false; p.phaseAttempts = {}; p.blockStats = []; }
    this.save(examId, p);
    this.setActiveExamId(examId);
  }
}

/* =========================================================================
   PLAYER CONTROLLER (execução do exame em tela cheia)
   ========================================================================= */
class PlayerController {
  static state = null;

  /* IA offline: monta sessão dinâmica com as questões mais fracas/atrasadas. */
  static startSmartReview(limit=15){
    this.startStudyNow(limit);
  }

  static startStudyNow(count=10){
    const weak = AITutor.pickWeak(count);
    if(!weak.length){
      Toast.show(I18n.isEn() ? 'Not enough history yet. Start a short session from Customize.' : 'Ainda não há histórico suficiente. Use Personalizar para uma sessão curta.', 'warn');
      return;
    }
    const tempExam = new Exam({
      id: Util.uid('exam_smart'),
      title: I18n.isEn() ? 'Smart study session' : 'Sessão de estudo inteligente',
      description: I18n.isEn() ? 'Weak areas prioritized by your history.' : 'Lacunas priorizadas pelo seu histórico.',
      category: 'Revisão', timeMinutes: Math.max(5, Math.round(weak.length * 1.2)),
      passScore: 70, questionIds: weak.map(q => q.id)
    });
    StorageManager.upsertExam(tempExam);
    this.start({
      examId: tempExam.id,
      questionIds: weak.map(q => q.id),
      trainingMode: true,
      timerOn: false,
      shuffleQuestions: true,
      preSubmitReview: false
    });
  }

  static start(configOrExamId, resumeSession=null){
    const config = typeof configOrExamId === 'string'
      ? {examId: configOrExamId}
      : (configOrExamId || {});
    const examId = config.examId;
    if(!examId){ Toast.show('Exame não informado.', 'error'); return; }

    const baseExam = StorageManager.getExam(examId);
    if(!baseExam){ Toast.show('Exame não encontrado.', 'error'); return; }

    const questionIdPool = (config.questionIds && config.questionIds.length)
      ? config.questionIds
      : baseExam.questionIds;
    const byId = new Map(StorageManager.getQuestions().map(q=>[q.id, new Question(q)]));
    let questions = questionIdPool.map(id=>byId.get(id)).filter(Boolean);
    if(!questions.length){ Toast.show('Este exame não possui questões vinculadas.', 'error'); return; }

    const settings = StorageManager.getSettings();
    const examData = {...baseExam};
    if(config.questionIds && config.questionIds.length !== baseExam.questionIds.length){
      examData.title = `${baseExam.title} (${config.questionIds.length} questões)`;
    }
    if(config.timeMinutes != null) examData.timeMinutes = config.timeMinutes;
    const exam = new Exam(examData);

    // --- Retomar sessão salva ---
    if(resumeSession && resumeSession.order && resumeSession.order.length){
      const resumeMap = new Map(questions.map(q=>[q.id,q]));
      const ordered = resumeSession.order.map(id=>resumeMap.get(id)).filter(Boolean);
      if(ordered.length) questions = ordered;
    } else if(!config.questionIds || config.questionIds.length === baseExam.questionIds.length){
      const doShuffleQ = config.shuffleQuestions !== false && (settings.randomOrder !== false);
      const doShuffleAlt = config.shuffleAlternatives || settings.randomAlternatives;
      if(doShuffleQ) questions = Util.shuffle(questions);
      if(doShuffleAlt){
        questions = questions.map(q=>{
          if(['single','multi','image'].includes(q.type)){
            const clone = new Question(q);
            clone.options = Util.shuffle(q.options);
            return clone;
          }
          return q;
        });
      }
    } else if(config.shuffleQuestions){
      questions = Util.shuffle(questions);
      if(config.shuffleAlternatives){
        questions = questions.map(q=>{
          if(['single','multi','image'].includes(q.type)){
            const clone = new Question(q);
            clone.options = Util.shuffle(q.options);
            return clone;
          }
          return q;
        });
      }
    }

    const trainingMode = !!config.trainingMode;
    const timerOn = resumeSession ? true : (config.timerOn !== false);
    const elapsedBefore = resumeSession?.elapsedSeconds || 0;
    this.state = {
      exam, questions,
      answers: resumeSession?.answers || {},
      marked: new Set(resumeSession?.marked || []),
      revealed: new Set(resumeSession?.revealed || []),
      revealPersistent: !!resumeSession?.revealPersistent,
      currentIndex: resumeSession?.currentIndex || 0,
      startedAt: Date.now() - elapsedBefore*1000,
      timer: null,
      streak: 0,
      lastMilestone: 0,
      candidateName: config.candidateName || resumeSession?.candidateName || '',
      trainingMode,
      timerOn,
      showAnswerAfterSelect: config.showAnswerAfterSelect != null ? !!config.showAnswerAfterSelect : (trainingMode ? true : !!settings.showAnswerAfterSelect),
      allowRevealAnswer: config.allowRevealAnswer != null ? !!config.allowRevealAnswer : (trainingMode ? true : (settings.allowRevealAnswer !== false)),
      incrementalMode: !!config.incrementalMode,
      incrementalPhase: config.incrementalPhase || 1,
      incrementalBlock: config.incrementalBlock || 1,
      allowFinishAnytime: settings.allowFinishAnytime !== false,
      preSubmitReview: config.preSubmitReview !== false && !trainingMode,
      paused: false,
      settings: StorageManager.getSettings()
    };

    this._mountShell();
    this._renderNav();
    this._renderQuestion();

    if(timerOn){
      const totalSeconds = exam.timeMinutes * 60;
      this.state.timer = new ExamTimer({
        totalSeconds: Math.max(1, totalSeconds - elapsedBefore),
        onTick: (remaining) => { this._updateTimerDisplay(remaining); this._persistSession(); },
        onWarn: (mins) => {
          SoundFx.beep(mins<=1?1100:660, 200);
          Toast.show(`Atenção: restam ${mins} minuto(s)!`, 'warn', 4000);
        },
        onEnd: () => { Toast.show('Tempo esgotado! Enviando exame automaticamente.', 'warn'); this.finish(true); }
      });
      this.state.timer.start();
    } else {
      this._updateTimerDisplay(null);
    }
    this._persistSession();

    document.getElementById('player-view').classList.add('show');
    document.body.classList.add('player-open');
    if(document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(()=>{});
    }
  }

  static _persistSession(){
    if(!this.state) return;
    try{
      StorageManager.saveSession({
        examId: this.state.exam.id,
        order: this.state.questions.map(q=>q.id),
        answers: this.state.answers,
        marked: [...this.state.marked],
        revealed: [...this.state.revealed],
        revealPersistent: !!this.state.revealPersistent,
        currentIndex: this.state.currentIndex,
        elapsedSeconds: Math.round((Date.now()-this.state.startedAt)/1000),
        candidateName: this.state.candidateName || '',
        trainingMode: !!this.state.trainingMode,
        savedAt: new Date().toISOString()
      });
    }catch(e){}
  }

  static _mountShell(){
    const root = document.getElementById('player-view');
    const cand = this.state.candidateName ? `<span class="player-candidate" title="${Util.escapeHtml(this.state.candidateName)}">${Util.escapeHtml(this.state.candidateName)}</span>` : '';
    const train = this.state.trainingMode ? `<span class="player-training-badge">${I18n.t('session.trainMode')}</span>` : '';
    const inc = this.state.incrementalMode
      ? `<span class="player-incremental-badge">${Util.escapeHtml(IncrementalLearningController.phaseLabel(this.state.incrementalPhase))} · ${I18n.t('inc.block').replace('{cur}', this.state.incrementalBlock).replace('{tot}', IncrementalLearningController.totalBlocks(this.state.exam, IncrementalLearningController.ensure(this.state.exam.id).blockSize))}</span>`
      : '';
    root.innerHTML = `
      <div class="player-top">
        <button class="btn btn-icon btn-ghost" id="p-exit" title="Sair" aria-label="Sair">${Icons.close}</button>
        <button class="btn btn-icon btn-ghost" id="p-toggle-nav" title="Mostrar/ocultar questões" aria-label="Mostrar ou ocultar questões">${Icons.menu}</button>
        ${cand}${train}${inc}
        <div class="player-progress-wrap"><div class="player-progress-bar" id="p-progress" style="width:0%"></div></div>
        <div class="player-timer-grp">
          <button class="btn btn-sm" id="p-pause" type="button" title="Pausar cronômetro" aria-label="Pausar">⏸</button>
          <div class="timer-pill" id="p-timer" role="timer" aria-live="off">--:--</div>
        </div>
        <div class="player-reveal-grp hidden" id="p-reveal-wrap" role="group" aria-label="Revelar respostas">
          <button class="btn btn-sm player-reveal-btn" id="p-reveal-q" type="button" aria-pressed="false" aria-label="${I18n.t('player.revealQuestion')}">${Icons.eyeOff}<span>${I18n.t('player.revealThis')}</span></button>
          <button class="btn btn-sm player-reveal-btn" id="p-reveal-all" type="button" aria-pressed="false" aria-label="${I18n.t('player.revealAll')}">${Icons.layers}<span>${I18n.t('player.revealEvery')}</span></button>
        </div>
        <div class="player-more" id="p-more-wrap">
          <button class="btn btn-icon btn-ghost" id="p-more-btn" type="button" aria-label="Mais opções" aria-haspopup="true" aria-expanded="false">${Icons.more}</button>
          <div class="player-more-menu" id="p-more-menu" role="menu" aria-label="Ações da sessão"></div>
        </div>
      </div>
      <div class="player-body">
        <div class="player-nav-list" id="p-nav" role="navigation" aria-label="Navegação entre questões"></div>
        <div class="player-question-area" id="p-question"></div>
      </div>
      <div id="p-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <div class="player-footer">
        <button class="btn" id="p-prev" type="button">${I18n.t('player.prev')}</button>
        <button class="btn" id="p-mark" type="button">${Icons.star} ${I18n.t('player.mark')}</button>
        <button class="btn btn-primary" id="p-primary" type="button">${I18n.t('player.next')}</button>
      </div>
    `;
    root.querySelector('#p-exit').addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title: I18n.t('player.exitTitle'), message: I18n.t('player.exitMsg'), confirmLabel: I18n.isEn() ? 'Leave' : 'Sair', danger:true});
      if(ok) this._exitWithoutSaving();
    });
    root.querySelector('#p-prev').addEventListener('click', ()=>this._move(-1));
    root.querySelector('#p-primary').addEventListener('click', ()=>this._handlePrimaryAction());
    root.querySelector('#p-mark').addEventListener('click', ()=>this._toggleMark());
    root.querySelector('#p-toggle-nav').addEventListener('click', ()=>{
      root.querySelector('#p-nav').classList.toggle('collapsed');
    });
    root.querySelector('#p-pause')?.addEventListener('click', ()=>this._togglePause());
    root.querySelector('#p-reveal-q')?.addEventListener('click', ()=>this._toggleRevealCurrent());
    root.querySelector('#p-reveal-all')?.addEventListener('click', ()=>this._toggleRevealAll());
    root.querySelector('#p-more-btn')?.addEventListener('click', (e)=>{
      e.stopPropagation();
      this._togglePlayerMenu();
    });
    this._menuOutsideClick = (e)=>{
      const wrap = document.getElementById('p-more-wrap');
      if(wrap && !wrap.contains(e.target)) this._closePlayerMenu();
    };
    document.addEventListener('click', this._menuOutsideClick);
    this._renderPlayerMenu();
    this._updateFooterButtons();
    this._updateRevealControls();
    this._updateMarkButton();
    if(window.matchMedia('(max-width:639px)').matches){
      root.querySelector('#p-nav')?.classList.add('collapsed');
    }

    // Navegação por teclado (acessibilidade / eficiência no desktop)
    this._keyHandler = (e)=>{
      if(!document.getElementById('player-view').classList.contains('show')) return;
      const tag = (e.target.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea' || tag==='select') return;
      if(e.defaultPrevented) return;
      const q = this.state.questions[this.state.currentIndex];
      if(e.key==='ArrowRight'){ e.preventDefault(); this._handlePrimaryAction(); }
      else if(e.key==='ArrowLeft'){ e.preventDefault(); this._move(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); this._handlePrimaryAction(); }
      else if(/^[1-9]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = Number(e.key)-1;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(/^[a-hA-H]$/.test(e.key) && ['single','boolean','image','multi'].includes(q.type)){
        const idx = e.key.toLowerCase().charCodeAt(0)-97;
        if(q.options[idx]){ e.preventDefault(); this._selectByIndex(idx); }
      }
      else if(e.key.toLowerCase()==='m'){ e.preventDefault(); this._toggleMark(); }
    };
    document.addEventListener('keydown', this._keyHandler);
    // Swipe horizontal entre questões (padrão mobile, uso com o polegar)
    const area = root.querySelector('#p-question');
    let tsx=0, tsy=0, tst=0;
    area.addEventListener('touchstart', (e)=>{
      const t = e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; tst=Date.now();
    }, {passive:true});
    area.addEventListener('touchend', (e)=>{
      const t = e.changedTouches[0];
      const dx = t.clientX - tsx, dy = t.clientY - tsy, dt = Date.now()-tst;
      // gesto válido: horizontal, rápido, e não sobre uma seleção de texto
      if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.8 && dt < 600){
        if(dx < 0) this._handlePrimaryAction(); else this._move(-1);
      }
    }, {passive:true});
  }

  static _isAnswered(q){
    const a = this.state.answers[q.id];
    return a !== undefined && a !== null && (!Array.isArray(a) ? String(a).length>0 : a.length>0);
  }

  static _shouldShowSubmit(){
    if(this.state.trainingMode) return false;
    const {questions, currentIndex} = this.state;
    const isLast = currentIndex >= questions.length - 1;
    const allAnswered = questions.every(q => this._isAnswered(q));
    return isLast || allAnswered;
  }

  static _updateFooterButtons(){
    const prev = document.getElementById('p-prev');
    const primary = document.getElementById('p-primary');
    if(!prev || !primary || !this.state) return;
    const {questions, currentIndex, trainingMode} = this.state;
    prev.disabled = currentIndex <= 0;
    if(this._shouldShowSubmit()){
      primary.textContent = I18n.t('player.submit');
      primary.className = 'btn btn-primary';
      primary.disabled = false;
    } else {
      primary.textContent = I18n.t('player.next');
      primary.className = 'btn btn-primary';
      primary.disabled = trainingMode && currentIndex >= questions.length - 1;
    }
  }

  static _handlePrimaryAction(){
    if(this._shouldShowSubmit()) this._confirmFinish();
    else {
      const {questions, currentIndex, trainingMode} = this.state;
      if(trainingMode && currentIndex >= questions.length - 1) return;
      this._move(1);
    }
  }

  static _closePlayerMenu(){
    const menu = document.getElementById('p-more-menu');
    const btn = document.getElementById('p-more-btn');
    menu?.classList.remove('show');
    btn?.setAttribute('aria-expanded', 'false');
  }

  static _togglePlayerMenu(){
    const menu = document.getElementById('p-more-menu');
    const btn = document.getElementById('p-more-btn');
    if(!menu || !btn) return;
    const open = menu.classList.toggle('show');
    btn.setAttribute('aria-expanded', String(open));
    if(open) this._renderPlayerMenu();
  }

  static _renderPlayerMenu(){
    const menu = document.getElementById('p-more-menu');
    if(!menu || !this.state) return;
    const s = this.state;
    const items = [];
    const add = (action, label, extra='') => items.push(
      `<button type="button" class="player-more-item${extra}" data-action="${action}" role="menuitem">${label}</button>`
    );
    if(s.trainingMode) add('explain', 'Explicar');
    add('pause', s.paused ? (I18n.isEn() ? 'Resume' : 'Retomar') : (I18n.isEn() ? 'Pause' : 'Pausar'));
    add('exit', I18n.isEn() ? 'Leave' : 'Sair');
    menu.innerHTML = items.join('');
    menu.querySelectorAll('[data-action]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        this._closePlayerMenu();
        this._onMenuAction(el.dataset.action);
      });
    });
  }

  static _onMenuAction(action){
    switch(action){
      case 'explain': this._showExplain(); break;
      case 'pause': this._togglePause(); break;
      case 'exit':
        Modal.confirm({title: I18n.t('player.exitTitle'), message: I18n.t('player.exitMsg'), confirmLabel: I18n.isEn() ? 'Leave' : 'Sair', danger:true})
          .then(ok=>{ if(ok) this._exitWithoutSaving(); });
        break;
    }
  }

  static _announce(msg){
    const live = document.getElementById('p-live');
    if(live) live.textContent = msg;
  }
  static _selectByIndex(idx){
    const q = this.state.questions[this.state.currentIndex];
    const opt = q.options[idx];
    if(!opt) return;
    if(q.type==='multi'){
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      cur.has(opt.id) ? cur.delete(opt.id) : cur.add(opt.id);
      this.state.answers[q.id] = [...cur];
    } else {
      this.state.answers[q.id] = opt.id;
      this._trackStreak(q);
    }
    this._afterAnswer();
  }
  static _afterAnswer(){
    this._persistSession();
    this._renderQuestion();
    this._renderNav();
    this._updateFooterButtons();
  }
  static _trackStreak(q){
    // Atualiza streak apenas para tipos objetivos com resposta imediata
    if(!this.state.showAnswerAfterSelect) return;
    const correct = q.isCorrect(this.state.answers[q.id]);
    if(correct){
      this.state.streak++;
      Gamification.noteStreak(this.state.streak);
      if(this.state.streak>0 && this.state.streak%5===0){
        RewardPop.show(String(this.state.streak), `${this.state.streak} seguidas!`, 'Continue assim!', 1400);
        this._announce(`Sequência de ${this.state.streak} acertos.`);
      }
    } else {
      this.state.streak = 0;
    }
  }

  static _togglePause(){
    if(!this.state?.timer) return;
    this.state.paused = !this.state.paused;
    if(this.state.paused) this.state.timer.pause();
    else this.state.timer.resume();
    const btn = document.getElementById('p-pause');
    if(btn){
      btn.textContent = this.state.paused ? '▶' : '⏸';
      btn.title = this.state.paused ? 'Retomar cronômetro' : 'Pausar cronômetro';
      btn.setAttribute('aria-label', this.state.paused ? 'Retomar' : 'Pausar');
      btn.classList.toggle('active', this.state.paused);
    }
    document.body.classList.toggle('player-paused', this.state.paused);
    this._renderPlayerMenu();
  }

  static _showExplain(){
    const q = this.state.questions[this.state.currentIndex];
    const expl = QuestionDisplay.explanation(q, this.state.settings);
    if(!expl){ Toast.show('Esta questão não tem explicação cadastrada.', 'warn'); return; }
    Modal.open({
      title: 'Explicação',
      bodyHtml: `<div class="fb-explain" style="font-size:14px;line-height:1.55;white-space:pre-wrap">${Util.escapeHtml(expl)}</div>`,
      footerHtml: `<button class="btn btn-primary" data-close type="button">Entendi</button>`,
      onMount: (el, close)=> el.querySelector('[data-close]')?.addEventListener('click', close)
    });
  }

  static _toggleRevealCurrent(){
    if(this.state.revealPersistent) return;
    const q = this.state.questions[this.state.currentIndex];
    this.state.revealed.has(q.id) ? this.state.revealed.delete(q.id) : this.state.revealed.add(q.id);
    this._updateRevealControls();
    this._renderQuestion();
    this._persistSession();
  }

  static _toggleRevealAll(){
    this.state.revealPersistent = !this.state.revealPersistent;
    if(!this.state.revealPersistent) this.state.revealed.clear();
    this._updateRevealControls();
    this._renderQuestion();
    this._persistSession();
  }

  static _updateRevealControls(){
    if(!this.state) return;
    const q = this.state.questions[this.state.currentIndex];
    const wrap = document.getElementById('p-reveal-wrap');
    const show = !!this.state.allowRevealAnswer;
    if(wrap) wrap.classList.toggle('hidden', !show);
    const btnQ = document.getElementById('p-reveal-q');
    const btnAll = document.getElementById('p-reveal-all');
    const qOn = !this.state.revealPersistent && this.state.revealed.has(q.id);
    const allOn = !!this.state.revealPersistent;
    if(btnQ){
      btnQ.classList.toggle('active', qOn);
      btnQ.disabled = allOn;
      btnQ.setAttribute('aria-pressed', String(qOn));
      const ico = btnQ.querySelector('svg');
      if(ico) ico.outerHTML = (qOn ? Icons.eye : Icons.eyeOff);
    }
    if(btnAll){
      btnAll.classList.toggle('active', allOn);
      btnAll.setAttribute('aria-pressed', String(allOn));
    }
  }

  static _feedbackBox(q, userAnswer, answered){
    const correctAns = this._fmtCorrect(q);
    // Reveladа sem ter respondido: caixa neutra mostrando só a resposta correta
    if(!answered){
      return `<div class="feedback-box correct">
        <div class="fb-head" style="color:var(--accent)">Resposta correta revelada</div>
        <div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>
        ${q.explanation?`<div class="fb-explain">${Util.escapeHtml(QuestionDisplay.explanation(q, this.state?.settings))}</div>`:''}
      </div>`;
    }
    const correct = q.isCorrect(userAnswer);
    const yourAns = this._fmtAnswer(q, userAnswer) || '(sem resposta)';
    return `<div class="feedback-box ${correct?'correct':'incorrect'}">
      <div class="fb-head">${correct?'Correto':'Incorreto'}</div>
      <div class="fb-line">Sua resposta: <strong>${Util.escapeHtml(yourAns)}</strong></div>
      ${!correct?`<div class="fb-line">Resposta correta: <strong>${Util.escapeHtml(correctAns)}</strong></div>`:''}
      ${q.explanation?`<div class="fb-explain">${Util.escapeHtml(QuestionDisplay.explanation(q, this.state?.settings))}</div>`:''}
    </div>`;
  }
  static _fmtAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': { const o=q.options.find(o=>o.id===ans); return o?o.text:''; }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  static _fmtCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return (q.correctShort||[]).join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }

  static _cleanup(){
    this.state?.timer?.stop();
    if(this._keyHandler){ document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
    if(this._menuOutsideClick){ document.removeEventListener('click', this._menuOutsideClick); this._menuOutsideClick = null; }
    document.body.classList.remove('player-paused');
    document.getElementById('player-view').classList.remove('show');
    document.body.classList.remove('player-open');
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  }
  static _exitWithoutSaving(){
    StorageManager.clearSession();
    this._cleanup();
    App.instance.router.go('home');
  }

  static _updateTimerDisplay(remaining){
    const pill = document.getElementById('p-timer');
    if(!pill) return;
    if(remaining == null || !this.state?.timerOn){
      pill.textContent = '∞';
      pill.classList.remove('warn-30','warn-10','warn-1');
      return;
    }
    pill.textContent = Util.formatTime(remaining);
    pill.classList.remove('warn-30','warn-10','warn-1');
    const mins = remaining/60;
    if(mins<=1) pill.classList.add('warn-1');
    else if(mins<=10) pill.classList.add('warn-10');
    else if(mins<=30) pill.classList.add('warn-30');
  }

  static _renderNav(){
    const nav = document.getElementById('p-nav');
    const meta = document.getElementById('p-nav-meta');
    const {questions, answers, marked, currentIndex} = this.state;
    if(meta) meta.textContent = `Questão ${currentIndex+1} de ${questions.length} — deslize para ver todas`;
    nav.innerHTML = questions.map((q,i)=>{
      const classes = ['qnum'];
      if(i===currentIndex) classes.push('current');
      if(answers[q.id]!==undefined) classes.push('answered');
      if(marked.has(q.id)) classes.push('marked');
      const state = [];
      if(answers[q.id]!==undefined) state.push('respondida');
      if(marked.has(q.id)) state.push('marcada');
      const aria = `Questão ${i+1}${state.length?' ('+state.join(', ')+')':''}`;
      return `<button class="${classes.join(' ')}" data-goto="${i}" aria-label="${aria}" ${i===currentIndex?'aria-current="true"':''}>${i+1}</button>`;
    }).join('');
    nav.querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{
      this.state.currentIndex = Number(b.dataset.goto);
      this._renderQuestion(); this._renderNav();
    }));
    nav.querySelector(`[data-goto="${currentIndex}"]`)?.scrollIntoView({inline:'nearest', block:'nearest', behavior:'smooth'});
  }

  static _renderQuestion(){
    const {questions, currentIndex, answers} = this.state;
    const q = questions[currentIndex];
    const area = document.getElementById('p-question');
    const userAnswer = answers[q.id];
    const settings = this.state.settings || StorageManager.getSettings();
    const stemHtml = Util.escapeHtml(QuestionDisplay.stem(q, settings)).replace(/\n/g, '<br>');
    document.getElementById('p-progress').style.width = `${Math.round(((currentIndex+1)/questions.length)*100)}%`;

    // determina se devemos mostrar a correção (após seleção) ou revelar a resposta
    const answered = userAnswer !== undefined && userAnswer !== null &&
      (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
    const revealed = this.state.revealPersistent || this.state.revealed.has(q.id);
    const showFeedback = revealed || (this.state.showAnswerAfterSelect && answered);

    let bodyHtml = '';
    if(['single','boolean','image'].includes(q.type)){
      bodyHtml = q.options.map((o,i)=>{
        const isSel = userAnswer===o.id;
        let cls = 'q-option radio-type' + (isSel?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(isSel){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-single="${o.id}" role="radio" tabindex="0" aria-checked="${isSel}">
          <div class="marker"></div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(QuestionDisplay.optionLabel(o, settings))}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='multi'){
      bodyHtml = q.options.map((o,i)=>{
        const selected = Array.isArray(userAnswer) && userAnswer.includes(o.id);
        let cls = 'q-option' + (selected?' selected':'');
        let tag = '';
        if(showFeedback){
          cls += ' locked';
          if(o.correct){ cls += ' opt-correct'; tag = '<span class="opt-tag ok">Correta</span>'; }
          else if(selected){ cls += ' opt-wrong'; tag = '<span class="opt-tag no">Sua resposta</span>'; }
        }
        return `<div class="${cls}" data-select-multi="${o.id}" role="checkbox" tabindex="0" aria-checked="${selected}">
          <div class="marker">${selected?'✓':''}</div><span class="letter">${Question.optionLetter(i)}.</span><span>${Util.escapeHtml(QuestionDisplay.optionLabel(o, settings))}</span>${tag}
        </div>`;
      }).join('');
    } else if(q.type==='short'){
      bodyHtml = `<input class="input" id="p-short-answer" placeholder="Digite sua resposta..." value="${Util.escapeHtml(userAnswer||'')}">`;
    } else if(q.type==='matching'){
      const rightOptions = Util.shuffle(q.matchPairs.map(p=>p.right));
      bodyHtml = q.matchPairs.map((p,i)=>`
        <div class="row" style="margin-bottom:10px">
          <span style="min-width:160px;font-size:13.5px">${Util.escapeHtml(p.left)}</span>
          <select class="select" data-match-idx="${i}">
            <option value="">Selecione...</option>
            ${rightOptions.map(r=>`<option value="${Util.escapeHtml(r)}" ${userAnswer && userAnswer[i]===r?'selected':''}>${Util.escapeHtml(r)}</option>`).join('')}
          </select>
        </div>`).join('');
    } else if(q.type==='sequence'){
      const order = userAnswer || Util.shuffle(q.sequenceItems.map(s=>s.text));
      bodyHtml = `<div id="seq-sortable">${order.map((text,i)=>`
        <div class="q-option" draggable="true" data-seq-text="${Util.escapeHtml(text)}" style="cursor:grab">
          <span class="letter">${i+1}.</span><span>${Util.escapeHtml(text)}</span>
        </div>`).join('')}</div>
        <p class="hint">Arraste os itens para reordenar (ou use os botões ↑/↓).</p>`;
    }

    area.innerHTML = `
      <div class="q-index">Questão ${currentIndex+1} de ${questions.length} · ${QUESTION_TYPES[q.type]?.label||q.type}</div>
      ${q.image ? `<img class="q-image" src="${q.image}">` : ''}
      <div class="q-text">${stemHtml}</div>
      <div id="q-options" ${q.type==='multi'?'role="group"':(['single','boolean','image'].includes(q.type)?'role="radiogroup"':'')} aria-label="Alternativas">${bodyHtml}</div>
      ${showFeedback ? this._feedbackBox(q, userAnswer, answered) : ''}
    `;

    // anúncio para leitores de tela ao renderizar feedback
    if(showFeedback && answered){
      this._announce(q.isCorrect(userAnswer) ? 'Resposta correta.' : `Resposta incorreta. Correta: ${this._fmtCorrect(q)}`);
    }

    // bind interactions
    const selectSingle = (el)=>{
      this.state.answers[q.id] = el.dataset.selectSingle;
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-single]').forEach(el=>{
      el.addEventListener('click', ()=>selectSingle(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectSingle(el); } });
    });
    const selectMulti = (el)=>{
      const cur = new Set(Array.isArray(this.state.answers[q.id]) ? this.state.answers[q.id] : []);
      const id = el.dataset.selectMulti;
      cur.has(id) ? cur.delete(id) : cur.add(id);
      this.state.answers[q.id] = [...cur];
      this._trackStreak(q);
      this._afterAnswer();
    };
    area.querySelectorAll('[data-select-multi]').forEach(el=>{
      el.addEventListener('click', ()=>selectMulti(el));
      el.addEventListener('keydown', (e)=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); e.stopPropagation(); selectMulti(el); } });
    });
    area.querySelector('#p-short-answer')?.addEventListener('input', (e)=>{
      this.state.answers[q.id] = e.target.value;
      this._persistSession();
      this._renderNav();
      this._updateFooterButtons();
    });
    area.querySelectorAll('[data-match-idx]').forEach(sel=>sel.addEventListener('change', ()=>{
      const ans = this.state.answers[q.id] || {};
      ans[Number(sel.dataset.matchIdx)] = sel.value;
      this.state.answers[q.id] = ans;
      this._persistSession();
      this._renderNav();
      this._updateFooterButtons();
    }));
    if(q.type==='sequence'){
      this._bindSequenceDrag(area, q);
      if(!this.state.answers[q.id]){
        this.state.answers[q.id] = [...area.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
      }
    }
    this._updateMarkButton();
    this._updateRevealControls();
    this._updateFooterButtons();
  }

  static _bindSequenceDrag(area, q){
    const wrap = area.querySelector('#seq-sortable');
    let dragEl = null;
    wrap.querySelectorAll('[draggable]').forEach(item=>{
      item.addEventListener('dragstart', ()=>{ dragEl = item; item.style.opacity='.4'; });
      item.addEventListener('dragend', ()=>{ item.style.opacity='1'; this._syncSeqAnswer(wrap, q); });
      item.addEventListener('dragover', (e)=>{
        e.preventDefault();
        const after = this._getDragAfter(wrap, e.clientY);
        if(after==null) wrap.appendChild(dragEl); else wrap.insertBefore(dragEl, after);
      });
    });
  }
  static _getDragAfter(wrap, y){
    const els = [...wrap.querySelectorAll('[draggable]:not([style*="opacity: 0.4"])')];
    return els.reduce((closest, child)=>{
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height/2;
      if(offset < 0 && offset > closest.offset) return {offset, element: child};
      return closest;
    }, {offset:-Infinity}).element;
  }
  static _syncSeqAnswer(wrap, q){
    this.state.answers[q.id] = [...wrap.querySelectorAll('[data-seq-text]')].map(el=>el.dataset.seqText);
    this._renderNav();
  }

  static _move(delta){
    const {questions, currentIndex} = this.state;
    const next = Util.clamp(currentIndex+delta, 0, questions.length-1);
    this.state.currentIndex = next;
    this._checkMilestone();
    this._persistSession();
    this._renderQuestion(); this._renderNav();
    this._updateFooterButtons();
    this._updateRevealControls();
    this._updateMarkButton();
  }
  static _checkMilestone(){
    const total = this.state.questions.length;
    const reached = this.state.currentIndex + 1;
    // marco de "metade do caminho"
    if(total>=6 && this.state.lastMilestone<1 && reached>=Math.ceil(total/2)){
      this.state.lastMilestone = 1;
      RewardPop.show('50%', 'Metade concluída!', 'Você está indo muito bem!', 1500);
      this._announce('Você chegou à metade do exame.');
    }
  }
  static _toggleMark(){
    const q = this.state.questions[this.state.currentIndex];
    this.state.marked.has(q.id) ? this.state.marked.delete(q.id) : this.state.marked.add(q.id);
    this._persistSession();
    this._renderNav();
    this._updateMarkButton();
  }
  static _updateMarkButton(){
    const btn = document.getElementById('p-mark');
    if(!btn) return;
    const q = this.state.questions[this.state.currentIndex];
    const isMarked = this.state.marked.has(q.id);
    btn.innerHTML = isMarked ? `${Icons.starFilled} ${I18n.t('player.marked')}` : `${Icons.star} ${I18n.t('player.mark')}`;
    btn.classList.toggle('btn-primary', isMarked);
    btn.setAttribute('aria-pressed', String(isMarked));
  }

  static async _confirmFinish(){
    const total = this.state.questions.length;
    const answeredCount = this.state.questions.filter(q=>{
      const a = this.state.answers[q.id];
      return a !== undefined && a !== null && (!Array.isArray(a) ? String(a).length>0 : a.length>0);
    }).length;
    const unanswered = total - answeredCount;

    if(this.state.preSubmitReview && !this.state.trainingMode){
      const reviewed = await this._preSubmitReview(answeredCount, total, unanswered);
      if(!reviewed) return;
      return;
    }

    let msg;
    if(unanswered>0){
      msg = `Você respondeu ${answeredCount} de ${total} questão(ões) (${unanswered} em branco). ` +
            `Você pode finalizar mesmo assim — o seu score será calculado sobre o total de ${total} questão(ões). Deseja finalizar agora?`;
    } else {
      msg = 'Deseja finalizar o exame e ver o seu score agora?';
    }
    const ok = await Modal.confirm({title:'Finalizar exame', message:msg, confirmLabel:'Finalizar e ver score'});
    if(ok) this.finish(false);
  }

  static _preSubmitReview(answeredCount, total, unanswered){
    return new Promise(resolve=>{
      const marked = this.state.questions.filter(q=>this.state.marked.has(q.id)).length;
      const rows = this.state.questions.map((q,i)=>{
        const a = this.state.answers[q.id];
        const done = a !== undefined && a !== null && (!Array.isArray(a) ? String(a).length>0 : a.length>0);
        const mark = this.state.marked.has(q.id) ? ' ★' : '';
        return `<button type="button" class="btn btn-ghost btn-sm" data-goto-review="${i}" style="margin:2px">${i+1}${done?' ✓':' —'}${mark}</button>`;
      }).join('');
      Modal.open({
        title: 'Revisar antes de enviar',
        wide: true,
        bodyHtml: `
          <p style="margin-bottom:12px;font-size:13px;color:var(--text-1)">
            ${answeredCount} de ${total} respondidas${unanswered ? ` · ${unanswered} em branco` : ''}${marked ? ` · ${marked} marcadas` : ''}.
            Toque em um número para revisar. Quando estiver pronto, envie o simulado.
          </p>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${rows}</div>`,
        footerHtml: `
          <button class="btn btn-ghost" data-back type="button">Voltar ao simulado</button>
          <button class="btn btn-primary" data-submit type="button">${I18n.t('player.submit')}</button>`,
        onMount: (el, close)=>{
          el.querySelector('[data-back]')?.addEventListener('click', ()=>{ close(); resolve(false); });
          el.querySelector('[data-submit]')?.addEventListener('click', ()=>{ close(); this.finish(false); resolve(true); });
          el.querySelectorAll('[data-goto-review]').forEach(b=> b.addEventListener('click', ()=>{
            this.state.currentIndex = Number(b.dataset.gotoReview);
            close();
            this._renderQuestion();
            this._renderNav();
            resolve(false);
          }));
        }
      });
    });
  }

  static finish(auto=false){
    const {exam, questions, answers, marked, startedAt, timer} = this.state;
    timer?.stop();
    const timeSpentSeconds = Math.round((Date.now()-startedAt)/1000);
    let correctCount = 0;
    const detail = questions.map(q=>{
      const userAnswer = answers[q.id];
      const correct = q.isCorrect(userAnswer);
      if(correct) correctCount++;
      // IA offline: registra desempenho por questão (repetição espaçada)
      const answered = userAnswer !== undefined && userAnswer !== null &&
        (!Array.isArray(userAnswer) ? String(userAnswer).length>0 : userAnswer.length>0);
      if(answered) AITutor.record(q.id, correct);
      return {questionId:q.id, question:q, userAnswer, correct, marked: marked.has(q.id)};
    });
    const percentage = Math.round((correctCount/questions.length)*100);
    const historyEntry = {
      id: Util.uid('hist'),
      examId: exam.id,
      examTitle: exam.title,
      date: new Date().toISOString(),
      correctCount, totalCount: questions.length, percentage,
      timeSpentSeconds,
      passed: percentage >= exam.passScore,
      markedCount: marked.size,
      detail: detail.map(d=>({questionId:d.questionId, userAnswer:d.userAnswer, correct:d.correct, marked:d.marked}))
    };
    StorageManager.addHistory(historyEntry);
    StorageManager.clearSession();

    let incrementalOutcome = null;
    if(this.state.incrementalMode){
      incrementalOutcome = IncrementalLearningController.onSessionComplete(exam.id, historyEntry, this.state);
      historyEntry.incremental = {
        phase: this.state.incrementalPhase,
        block: this.state.incrementalBlock,
        outcome: incrementalOutcome
      };
    }

    // Gamificação: XP, nível e conquistas
    const gameResult = Gamification.registerExam({correctCount, totalCount: questions.length, percentage});

    this._cleanup();
    ResultController.show({exam, detail, historyEntry, gameResult});
  }
}

/* ---------- Result Controller ---------- */
class ResultController {
  static show({exam, detail, historyEntry}){
    const el = document.getElementById('view-dashboard') || null;
    App.instance.router.go('result', {exam, detail, historyEntry});
  }
}
class ResultView {
  get title(){ return 'Resultado'; }
  get crumb(){ return ''; }
  render(el, params){
    const {exam, detail, historyEntry} = params;
    this._data = params;
    const pct = historyEntry.percentage;
    const inc = historyEntry.incremental;
    const outcome = inc?.outcome;
    const incProgress = inc ? IncrementalLearningController.ensure(exam.id) : null;
    const passMin = incProgress ? IncrementalLearningController.passThreshold(exam, incProgress) : exam.passScore;
    const passedDisplay = inc && inc.phase === 4 ? pct >= passMin : historyEntry.passed;
    const color = passedDisplay ? 'var(--good)' : 'var(--bad)';
    const circumference = 2*Math.PI*62;
    const dash = circumference*(pct/100);
    let incBanner = '';
    let incPrimaryBtn = '';
    if(inc){
      if(outcome?.ok && outcome.advanced === 'complete'){
        incBanner = `<div class="card card-compact" style="margin-bottom:12px;border-color:var(--good)"><p style="margin:0;font-size:13px">${Util.escapeHtml(outcome.message||I18n.t('inc.complete'))}</p></div>`;
      } else if(outcome?.ok){
        incBanner = `<div class="card card-compact" style="margin-bottom:12px;border-color:var(--good)"><p style="margin:0;font-size:13px">${Util.escapeHtml(outcome.message||I18n.t('inc.passedPhase'))}</p></div>`;
        incPrimaryBtn = `<button class="btn btn-primary" id="r-inc-next">${Icons.play} ${I18n.t('inc.continue')}</button>`;
      } else if(outcome?.retry){
        incBanner = `<div class="card card-compact" style="margin-bottom:12px;border-color:var(--warn)"><p style="margin:0;font-size:13px">${I18n.t('inc.failedValidation').replace('{pct}', String(pct)).replace('{min}', String(passMin))}</p></div>`;
        incPrimaryBtn = `<button class="btn btn-primary" id="r-inc-retry">${Icons.play} ${I18n.isEn() ? 'Retry validation' : 'Tentar validação'}</button>`;
      }
    }
    el.innerHTML = `
      <div class="score-hero">
        <div class="score-ring">
          <svg width="150" height="150">
            <circle cx="75" cy="75" r="62" stroke="var(--bg-3)" stroke-width="12" fill="none"/>
            <circle cx="75" cy="75" r="62" stroke="${color}" stroke-width="12" fill="none"
              stroke-dasharray="${dash} ${circumference}" stroke-linecap="round"/>
          </svg>
          <div class="pct" style="color:${color}">${pct}%</div>
        </div>
        <h2 style="font-size:20px;margin-bottom:4px">${inc ? (passedDisplay ? I18n.t('inc.passedPhase') : (inc.phase===4 ? I18n.t('inc.failedValidation').replace('{pct}','').replace('{min}','') : I18n.t('inc.passedPhase'))) : (historyEntry.passed?'Aprovado 🎉':'Não atingiu a nota mínima')}</h2>
        <p style="color:var(--text-2);font-size:13px">${Util.escapeHtml(exam.title)}${inc ? ` · ${IncrementalLearningController.phaseLabel(inc.phase)} · meta ${passMin}%` : ` · nota mínima ${exam.passScore}%`}</p>
      </div>
      ${incBanner}
      ${this._xpBanner(params.gameResult)}
      ${this._gapsBanner(detail)}
      <div class="result-grid">
        <div class="card stat-card"><span class="label">Acertos</span><span class="value" style="color:var(--good)">${historyEntry.correctCount}</span></div>
        <div class="card stat-card"><span class="label">Erros</span><span class="value" style="color:var(--bad)">${historyEntry.totalCount-historyEntry.correctCount}</span></div>
        <div class="card stat-card"><span class="label">Tempo gasto</span><span class="value">${Util.formatDuration(historyEntry.timeSpentSeconds)}</span></div>
        <div class="card stat-card"><span class="label">Marcadas</span><span class="value" style="color:var(--warn)">${historyEntry.markedCount}</span></div>
      </div>
      <div class="row" style="gap:10px;margin-top:10px;flex-wrap:wrap">
        ${incPrimaryBtn}
        <button class="btn ${incPrimaryBtn?'':'btn-primary'}" id="r-review">Revisar respostas</button>
        <button class="btn" id="r-smart">Revisão inteligente</button>
        <button class="btn" id="r-retry-wrong">Refazer apenas erradas</button>
        <button class="btn" id="r-retry-marked">Refazer apenas marcadas</button>
        <button class="btn btn-ghost" id="r-dashboard">Voltar ao Início</button>
      </div>
    `;
    el.querySelector('#r-review').addEventListener('click', ()=> ReviewController.show(detail, exam));
    el.querySelector('#r-dashboard').addEventListener('click', ()=> App.instance.router.go('home'));
    el.querySelector('#r-retry-wrong').addEventListener('click', ()=> this._retry(detail.filter(d=>!d.correct), exam));
    el.querySelector('#r-retry-marked').addEventListener('click', ()=> this._retry(detail.filter(d=>d.marked), exam));

class ReviewView {
  get title(){ return 'Revisão'; }
  get crumb(){ return ''; }
  render(el, params){
    const {detail, exam} = params;
    el.innerHTML = `
      <div class="row between" style="margin-bottom:16px">
        <span style="font-size:13px;color:var(--text-1)">${Util.escapeHtml(exam.title||'')} — revisão detalhada</span>
        <button class="btn btn-ghost" id="rv-back">Voltar</button>
      </div>
      ${detail.map((d,i)=>this._item(d,i)).join('')}
    `;
    el.querySelector('#rv-back').addEventListener('click', ()=> App.instance.router.go('home'));
  }
  _item(d,i){
    const q = d.question;
    const userAnswerText = this._formatAnswer(q, d.userAnswer);
    const correctAnswerText = this._formatCorrect(q);
    return `<div class="review-item ${d.correct?'correct':'incorrect'}">
      <div class="row between">
        <strong style="font-size:13.5px">${i+1}. ${Util.escapeHtml(q.text)}</strong>
        <span class="badge" style="background:${d.correct?'var(--good-soft)':'var(--bad-soft)'};color:${d.correct?'var(--good)':'var(--bad)'}">${d.correct?'Correta':'Incorreta'}</span>
      </div>
      <div class="review-answer ${d.correct?'correct':'incorrect'}">Sua resposta: ${Util.escapeHtml(userAnswerText||'(sem resposta)')}</div>
      ${!d.correct ? `<div class="review-answer correct">Resposta correta: ${Util.escapeHtml(correctAnswerText)}</div>` : ''}
      ${q.explanation ? `<div class="review-explain">${Util.escapeHtml(q.explanation)}</div>` : ''}
    </div>`;
  }
  _formatAnswer(q, ans){
    if(ans===undefined || ans===null) return '';
    switch(q.type){
      case 'single': case 'boolean': case 'image': {
        const o = q.options.find(o=>o.id===ans); return o?o.text:'';
      }
      case 'multi': return (ans||[]).map(id=>q.options.find(o=>o.id===id)?.text).filter(Boolean).join(', ');
      case 'short': return ans;
      case 'matching': return Object.entries(ans||{}).map(([i,v])=>`${q.matchPairs[i]?.left} → ${v}`).join('; ');
      case 'sequence': return (ans||[]).join(' → ');
      default: return '';
    }
  }
  _formatCorrect(q){
    switch(q.type){
      case 'single': case 'boolean': case 'image': return q.options.find(o=>o.correct)?.text||'';
      case 'multi': return q.options.filter(o=>o.correct).map(o=>o.text).join(', ');
      case 'short': return q.correctShort.join(' / ');
      case 'matching': return q.matchPairs.map(p=>`${p.left} → ${p.right}`).join('; ');
      case 'sequence': return q.sequenceItems.map(s=>s.text).join(' → ');
      default: return '';
    }
  }
}

class QuestionDisplay {
  static mode(settings){
    return settings?.bilingualMode || 'dual';
  }
  static stem(q, settings){
    const en = q.stemEn || q.text || '';
    const pt = q.stemPt || q.text || en;
    const m = this.mode(settings);
    if(m === 'en') return en;
    if(m === 'pt') return pt;
    return en && pt && en !== pt ? en + '\n\n— ' + pt : (pt || en);
  }
  static optionLabel(opt, settings){
    const en = opt.textEn || opt.text || '';
    const pt = opt.textPt || opt.text || en;
    const m = this.mode(settings);
    if(m === 'en') return en;
    if(m === 'pt') return pt;
    return en && pt && en !== pt ? en + ' / ' + pt : (pt || en);
  }
  static explanation(q, settings){
    const en = q.explanationEn || q.explanation || '';
    const pt = q.explanationPt || q.explanation || en;
    const m = this.mode(settings);
    if(m === 'en') return en;
    if(m === 'pt') return pt;
    return pt && en && en !== pt ? en + '\n\n— ' + pt : (pt || en);
  }
}
