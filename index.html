<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#141210">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ExamForge">
<meta name="description" content="ExamForge — simulador de exames offline, acessível e gamificado.">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%23c17f59'/%3E%3Ctext x='90' y='120' font-family='Arial' font-size='84' font-weight='bold' fill='white' text-anchor='middle'%3EEF%3C/text%3E%3C/svg%3E">
<title>ExamForge — Simulador de Exames</title>
<style>
:root{
  --bg-base:#141210;
  --bg-surface:#1c1916;
  --bg-elevated:#242019;
  --bg-0:var(--bg-base);
  --bg-1:var(--bg-surface);
  --bg-2:var(--bg-elevated);
  --bg-3:#2a241f;
  --border:rgba(154,146,138,.22);
  --border-soft:rgba(154,146,138,.12);
  --text-0:#f0ebe3;
  --text-1:#b8aea4;
  --text-2:#7a726a;
  --accent:#c17f59;
  --accent-soft:rgba(193,127,89,.14);
  --accent-strong:#a86b47;
  --good:#6b9e78;
  --good-soft:rgba(107,158,120,.14);
  --bad:#c96a62;
  --bad-soft:rgba(201,106,98,.14);
  --warn:#c4a24a;
  --warn-soft:rgba(196,162,74,.14);
  --radius-sm:6px;
  --touch:44px;
  --radius-md:10px;
  --radius-lg:14px;
  --shadow-1:none;
  --shadow-2:0 4px 16px rgba(0,0,0,.18);
  --shadow-3:0 8px 32px rgba(0,0,0,.28);
  --mono:'SF Mono',ui-monospace,'Cascadia Code','Fira Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Helvetica,Arial,sans-serif;
  --font-scale:1;
  --text-xs:12px;
  --text-sm:13px;
  --text-md:15px;
  --text-lg:18px;
  --text-xl:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;max-width:100%;overflow:hidden}
body{
  font-family:var(--sans);
  background:var(--bg-0);
  color:var(--text-0);
  font-size:calc(14px * var(--font-scale));
  line-height:1.5;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
}
/* quebra textos longos (URLs, enunciados) para nunca estourar a largura */
.q-text,.q-option,.fb-line,.fb-explain,.review-item,.review-explain,.list-row .title,.list-row .desc{overflow-wrap:anywhere;word-break:break-word}
img,svg,video{max-width:100%}
body.light{
  --bg-base:#faf8f5;
  --bg-surface:#ffffff;
  --bg-elevated:#f3f0eb;
  --bg-0:var(--bg-base);
  --bg-1:var(--bg-surface);
  --bg-2:var(--bg-elevated);
  --bg-3:#ebe6df;
  --border:rgba(26,22,20,.12);
  --border-soft:rgba(26,22,20,.07);
  --text-0:#1a1614;
  --text-1:#5c554f;
  --text-2:#8a827a;
  --accent:#a86b47;
  --accent-soft:rgba(168,107,71,.12);
  --accent-strong:#8f5738;
  --good:#4d8260;
  --good-soft:rgba(77,130,96,.12);
  --bad:#b8554e;
  --bad-soft:rgba(184,85,78,.12);
  --warn:#9a7f2e;
  --warn-soft:rgba(154,127,46,.12);
}
::-webkit-scrollbar{width:0;height:0;display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;color:inherit}
a{color:var(--accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.q-option:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-color:var(--accent)}
.qnum:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ---------- Shell ---------- */
#app{display:flex;min-height:100vh;min-height:100dvh;width:100%;max-width:100%}

.rail{
  width:84px;flex-shrink:0;background:var(--bg-1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 8px;gap:4px;
}
.rail-logo{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;margin-bottom:18px;
}
.rail-btn{
  width:100%;min-height:52px;border-radius:var(--radius-md);
  background:transparent;border:none;color:var(--text-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:6px 2px;
  transition:background .15s ease,color .15s ease,transform .15s ease;
  position:relative;
}
.rail-btn svg{width:19px;height:19px;flex-shrink:0}
.rail-btn .rail-label{font-size:10.5px;font-weight:600;letter-spacing:.2px;line-height:1.1}
.rail-btn:hover{background:var(--bg-3);color:var(--text-0)}
.rail-btn.active{background:var(--accent-soft);color:var(--accent)}
.rail-btn.active::before{
  content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:22px;background:var(--accent);border-radius:2px;
}
.rail-spacer{flex:1}

.main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg-0)}
.topbar{
  height:52px;flex-shrink:0;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  background:var(--bg-1);
}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:.2px}
.topbar .crumb{color:var(--text-2);font-size:13px}
.topbar-spacer{flex:1}
.topbar-more{position:relative}
.topbar-more-menu{
  position:absolute;top:calc(100% + 6px);right:0;min-width:200px;
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);
  box-shadow:var(--shadow-2);padding:6px;display:none;flex-direction:column;gap:2px;z-index:60;
}
.topbar-more-menu.show{display:flex}
.topbar-more-item{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  padding:9px 10px;border-radius:var(--radius-sm);background:transparent;border:none;
  color:var(--text-0);font-size:13px;font-weight:500;
}
.topbar-more-item:hover{background:var(--bg-3)}
.view{flex:1;overflow-y:auto;padding:28px 32px 60px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.view.hidden{display:none}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--bg-2);color:var(--text-0);
  font-size:13px;font-weight:500;transition:all .15s ease;
}
.btn:hover{background:var(--bg-3);border-color:var(--text-2)}
.btn:active{transform:scale(.97)}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-strong)}
.btn-danger{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.btn-danger:hover{background:var(--bad);color:#fff}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--bg-3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media (max-width:700px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

.card{
  background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:16px 18px;transition:background .15s ease;
}
.card:hover{background:var(--bg-2)}
.stat-card{display:flex;flex-direction:column;gap:6px}
.stat-card .label{font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-card .value{font-size:28px;font-weight:700;letter-spacing:-.5px}
.stat-card .sub{font-size:12px;color:var(--text-2)}
.stat-card .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}

.section-title{font-size:var(--text-sm);font-weight:600;color:var(--text-2);margin:24px 0 10px}
.section-title:first-child{margin-top:0}

.list-row{
  display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--radius-md);
  border:none;background:var(--bg-1);margin-bottom:6px;
  transition:background .15s ease;
}
.list-row:hover{background:var(--bg-2)}
.list-row .meta{flex:1;min-width:0}
.list-row .title{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-row .desc{font-size:12px;color:var(--text-2);margin-top:2px}
.list-row .badge{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;
}
.badge-good{background:var(--good-soft);color:var(--good)}
.badge-warn{background:var(--warn-soft);color:var(--warn)}
.badge-bad{background:var(--bad-soft);color:var(--bad)}
.badge-accent{background:var(--accent-soft);color:var(--accent)}
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-2);
}
.empty-state svg{width:44px;height:44px;margin-bottom:14px;opacity:.5}
.empty-state h3{color:var(--text-1);font-size:15px;margin-bottom:6px}
.empty-state p{font-size:13px;max-width:360px;margin:0 auto}

/* ---------- Forms ---------- */
.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-1);margin-bottom:6px}
.field .hint{font-size:11.5px;color:var(--text-2);margin-top:4px}
.input,.select,.textarea{
  width:100%;padding:9px 11px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--bg-2);color:var(--text-0);
  font-size:13.5px;transition:border-color .15s ease,box-shadow .15s ease;
}
.input:focus,.select:focus,.textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);outline:none;
}
.textarea{resize:vertical;min-height:70px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.form-grid .field.full{grid-column:1/-1}
@media (max-width:700px){.form-grid{grid-template-columns:1fr}}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-1);cursor:pointer}
.checkbox-row input{width:16px;height:16px;accent-color:var(--accent)}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-2)}
.tag-chip{background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:5px}
.tag-chip button{background:none;border:none;color:inherit;font-size:13px;line-height:1}
.tag-input-wrap input{border:none;background:none;flex:1;min-width:80px;font-size:13px;outline:none}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--text-2);border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--text-0)}
.tab.active{color:var(--accent);border-color:var(--accent)}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .18s ease;
}
.modal-backdrop.show{opacity:1;pointer-events:auto}
.modal{
  background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:560px;max-width:92vw;max-height:86vh;display:flex;flex-direction:column;
  box-shadow:var(--shadow-3);transform:translateY(10px) scale(.98);transition:transform .18s ease;
}
.modal-backdrop.show .modal{transform:translateY(0) scale(1)}
.modal.wide{width:820px}
.modal-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:15px;font-weight:600;flex:1}
.modal-body{padding:20px;overflow-y:auto}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}

/* ---------- Exam config dialog (Windows-style) ---------- */
.exam-config{display:flex;flex-direction:column;gap:14px}
.ec-fieldset{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px 14px;margin:0;background:var(--bg-2)}
.ec-legend{font-size:12px;font-weight:700;color:var(--text-1);padding:0 6px}
.ec-radio-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-0);margin:10px 0 4px;cursor:pointer;line-height:1.4}
.ec-radio-row input{margin-top:2px;accent-color:var(--accent);flex-shrink:0}
.ec-mode-panel{margin:0 0 8px 24px;padding:10px 12px;border-left:2px solid var(--border);background:var(--bg-1);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.ec-section-toolbar{display:flex;gap:8px;margin-bottom:8px}
.ec-section-tree{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg-0)}
.ec-materia-group{margin-bottom:10px}
.ec-materia-group:last-child{margin-bottom:0}
.ec-materia-title{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-2);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border-soft)}
.ec-section-item{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:4px 2px;cursor:pointer;color:var(--text-0)}
.ec-section-item input{accent-color:var(--accent)}
.ec-section-count{font-size:11.5px;color:var(--text-2);margin-left:auto}
.ec-inline-input{width:56px;padding:4px 6px;text-align:center;display:inline-block;vertical-align:middle;margin:0 4px}
.ec-radio-row .ec-inline-input{margin-top:-2px}
.ec-options{margin-top:4px;padding-top:12px;border-top:1px solid var(--border-soft)}
.hub-actions-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.hub-actions-bar .spacer{flex:1}
.list-row-select{cursor:pointer}
.list-row-select input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0}
.list-row-select.checked{background:var(--accent-soft)}
.ec-timer-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:16px}
.ec-timer-min{flex:1;min-width:120px;max-width:160px}
.ec-timer-min .input:disabled{opacity:.45;cursor:not-allowed}
.player-candidate{font-size:12px;color:var(--text-2);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-training-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:12px;background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn);white-space:nowrap}

/* ---------- Toasts ---------- */
#toast-region{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300}
.toast{
  display:flex;align-items:center;gap:10px;background:var(--bg-elevated);
  border:1px solid var(--border);border-left:3px solid var(--accent);
  padding:12px 16px;border-radius:var(--radius-md);
  font-size:var(--text-sm);min-width:260px;max-width:360px;
  animation:toastIn .2s ease;
}
.toast.success{border-left-color:var(--good)}
.toast.error{border-left-color:var(--bad)}
.toast.warn{border-left-color:var(--warn)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.hide{animation:toastOut .18s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}

/* ---------- Loading ---------- */
#loading-overlay{
  position:fixed;inset:0;background:rgba(20,18,16,.75);z-index:400;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
#loading-overlay.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Question bank / editor ---------- */
.qtype-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
@media (max-width:700px){.qtype-grid{grid-template-columns:repeat(2,1fr)}}
.qtype-btn{
  padding:10px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-2);font-size:12px;text-align:center;color:var(--text-1);
  transition:.15s;
}
.qtype-btn.active,.qtype-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.alt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.alt-row input[type="text"]{flex:1}
.alt-row .radio-check{width:18px;height:18px;flex-shrink:0}
.match-row,.seq-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}

/* ---------- Player ---------- */
#player-view{position:fixed;inset:0;height:100vh;height:100dvh;background:var(--bg-0);z-index:150;display:none;flex-direction:column;overflow:hidden}
#player-view.show{display:flex}
.player-top{
  height:56px;flex-shrink:0;display:flex;align-items:center;gap:16px;
  padding:0 22px;border-bottom:1px solid var(--border);background:var(--bg-1);
}
.player-progress-wrap{flex:1;height:6px;background:var(--bg-3);border-radius:4px;overflow:hidden}
.player-progress-bar{height:100%;background:var(--accent);transition:width .25s ease;border-radius:4px}
.timer-pill{
  font-family:var(--mono);font-size:14px;font-weight:700;padding:6px 12px;border-radius:20px;
  background:var(--bg-3);border:1px solid var(--border);transition:.25s;
}
.timer-pill.warn-30{color:var(--warn)}
.timer-pill.warn-10{color:var(--warn);background:var(--warn-soft);border-color:var(--warn)}
.timer-pill.warn-1{color:var(--bad);background:var(--bad-soft);border-color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.player-body{flex:1;display:flex;overflow:hidden;min-height:0}
.player-nav-list{
  width:220px;flex-shrink:1;border-right:1px solid var(--border);background:var(--bg-1);
  overflow-y:auto;overflow-x:hidden;min-height:0;padding:14px 10px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-content:start;
}
.qnum{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);
  font-size:12px;font-weight:600;color:var(--text-1);display:flex;align-items:center;justify-content:center;
  position:relative;transition:.15s;
}
.qnum:hover{border-color:var(--accent)}
.qnum.current{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.qnum.answered{background:var(--good-soft);border-color:var(--good);color:var(--good)}
.qnum.marked::after{content:'';position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--warn);border-radius:50%}
.player-question-area{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0;min-height:0;padding:32px 40px;width:100%;max-width:860px;margin:0 auto;position:relative;z-index:1}
#q-options{position:relative;z-index:2}
.q-index{font-size:12px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.q-text{font-size:17px;line-height:1.6;margin-bottom:22px;font-weight:500}
.q-image{max-width:100%;border-radius:var(--radius-md);margin-bottom:18px;border:1px solid var(--border)}
.q-option{
  display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--border);

<script>
'use strict';
/* =========================================================================
   EXAMFORGE — Simulador de Exames (100% offline, single file)
   Arquitetura: classes ES2023, separação de responsabilidades.
   ========================================================================= */

/* ---------------------------------------------------------------------
   Util
--------------------------------------------------------------------- */
const Util = {
  uid(prefix='id'){ return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`; },
  escapeHtml(str=''){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  },
  shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  },
  formatTime(totalSeconds){
    totalSeconds = Math.max(0, Math.floor(totalSeconds));
    const h = Math.floor(totalSeconds/3600);
    const m = Math.floor((totalSeconds%3600)/60);
    const s = totalSeconds%60;
    const pad = n => String(n).padStart(2,'0');
    return h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  },
  formatDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  },
  formatDuration(seconds){
    const m = Math.floor(seconds/60), s = Math.round(seconds%60);
    if(m<=0) return `${s}s`;
    return `${m}min ${s}s`;
  },
  download(filename, content, mime='application/octet-stream'){
    const blob = new Blob([content], {type:mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  },
  clamp(n,min,max){ return Math.min(max, Math.max(min,n)); },
  csvEscape(v){
    v = String(v ?? '');
    if(/[",\n;]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
    return v;
  },
  parseCsvLine(line){
    // simple CSV/; splitter respecting quotes
    const result=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c = line[i];
      if(inQ){
        if(c === '"'){
          if(line[i+1] === '"'){ cur+='"'; i++; } else inQ=false;
        } else cur += c;
      } else {
        if(c === '"') inQ = true;
        else if(c === ',' || c === ';'){ result.push(cur); cur=''; }
        else cur += c;
      }
    }
    result.push(cur);
    return result.map(s=>s.trim());
  }
};

/* ---------------------------------------------------------------------
   Toast / Modal / Loading (UI Components)
--------------------------------------------------------------------- */
class Toast {
  static show(message, type='info', timeout=3200){
    const region = document.getElementById('toast-region');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${Util.escapeHtml(message)}</span>`;
    region.appendChild(el);
    setTimeout(()=>{
      el.classList.add('hide');
      setTimeout(()=>el.remove(), 200);
    }, timeout);
  }
}

class Loading {
  static show(msg='Carregando…'){
    document.getElementById('loading-msg').textContent = msg;
    document.getElementById('loading-overlay').classList.add('show');
  }
  static hide(){ document.getElementById('loading-overlay').classList.remove('show'); }
}

class Modal {
  static open({title, bodyHtml, footerHtml='', wide=false, onMount=null}){
    const region = document.getElementById('modal-region');
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal ${wide?'wide':''}">
        <div class="modal-header">
          <h3>${Util.escapeHtml(title)}</h3>
          <button class="btn btn-icon btn-ghost" data-close aria-label="Fechar">${Icons.close}</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
      </div>`;
    region.appendChild(backdrop);
    requestAnimationFrame(()=>backdrop.classList.add('show'));
    const close = () => {
      backdrop.classList.remove('show');
      setTimeout(()=>backdrop.remove(), 180);
    };
    backdrop.addEventListener('click', e=>{ if(e.target === backdrop) close(); });
    backdrop.querySelector('[data-close]').addEventListener('click', close);
    if(onMount) onMount(backdrop, close);
    return {el: backdrop, close};
  }
  static confirm({title, message, confirmLabel='Confirmar', cancelLabel='Cancelar', danger=false}){
    return new Promise(resolve=>{
      const {close} = Modal.open({
        title,
        bodyHtml: `<p style="font-size:13.5px;color:var(--text-1);line-height:1.6">${Util.escapeHtml(message)}</p>`,
        footerHtml: `
          <button class="btn btn-ghost" data-cancel>${Util.escapeHtml(cancelLabel)}</button>
          <button class="btn ${danger?'btn-danger':'btn-primary'}" data-ok>${Util.escapeHtml(confirmLabel)}</button>`,
        onMount(modalEl){
          modalEl.querySelector('[data-cancel]').addEventListener('click', ()=>{ close(); resolve(false); });
          modalEl.querySelector('[data-ok]').addEventListener('click', ()=>{ close(); resolve(true); });
        }
      });
    });
  }
  static async doubleConfirm({title, message, sureMessage='Você tem certeza?', danger=true}){
    const ok1 = await this.confirm({title, message, confirmLabel:'Sim', cancelLabel:'Não', danger});
    if(!ok1) return false;
    return this.confirm({title:'Confirmação', message:sureMessage, confirmLabel:'Sim', cancelLabel:'Não', danger});
  }
}

/* ---------------------------------------------------------------------
   Storage layer (LocalStorage)
--------------------------------------------------------------------- */
class StorageManager {
  static KEYS = {
    EXAMS: 'ef_exams',
    QUESTIONS: 'ef_questions',
    HISTORY: 'ef_history',
    SETTINGS: 'ef_settings',
    SESSION: 'ef_session',
    GAME: 'ef_game',
    ONBOARDED: 'ef_onboarded_v1',
    STATS: 'ef_qstats'
  };
  static _get(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ console.error('Storage read error', key, e); return fallback; }
  }
  static _set(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ console.error('Storage write error', key, e); Toast.show('Erro ao salvar dados localmente.', 'error'); return false; }
  }
  static getExams(){ return this._get(this.KEYS.EXAMS, []); }
  static saveExams(exams){ return this._set(this.KEYS.EXAMS, exams); }
  static getExam(id){ return this.getExams().find(e=>e.id===id) || null; }
  static upsertExam(exam){
    const exams = this.getExams();
    const idx = exams.findIndex(e=>e.id===exam.id);
    if(idx>=0) exams[idx]=exam; else exams.push(exam);
    this.saveExams(exams);
  }
  static deleteExam(id){
    this.saveExams(this.getExams().filter(e=>e.id!==id));
  }
  static deleteExams(ids){
    const drop = new Set(ids);
    this.saveExams(this.getExams().filter(e=>!drop.has(e.id)));
  }

  static getQuestions(){ return this._get(this.KEYS.QUESTIONS, []); }
  static saveQuestions(qs){ return this._set(this.KEYS.QUESTIONS, qs); }
  static upsertQuestion(q){
    const qs = this.getQuestions();
    const idx = qs.findIndex(x=>x.id===q.id);
    if(idx>=0) qs[idx]=q; else qs.push(q);
    this.saveQuestions(qs);
  }
  static deleteQuestion(id){ this.saveQuestions(this.getQuestions().filter(q=>q.id!==id)); }

  static getHistory(){ return this._get(this.KEYS.HISTORY, []); }
  static addHistory(entry){
    const h = this.getHistory();
    h.unshift(entry);
    this._set(this.KEYS.HISTORY, h);
  }
  static clearHistory(){ this._set(this.KEYS.HISTORY, []); }

  static getSettings(){
    const defaults = {
      darkMode:true, font:'sans', fontSize:1, sound:true,
      defaultTimer:60, randomOrder:false, randomAlternatives:false, language:'pt-BR',
      showAnswerAfterSelect:true, allowRevealAnswer:true, allowFinishAnytime:true
    };
    // mescla os padrões com o que já estiver salvo, garantindo que chaves novas existam
    return {...defaults, ...this._get(this.KEYS.SETTINGS, {})};
  }
  static saveSettings(s){ return this._set(this.KEYS.SETTINGS, s); }

  /* --- Sessão ativa (retomar de onde parou) --- */
  static getSession(){ return this._get(this.KEYS.SESSION, null); }
  static saveSession(sess){ return this._set(this.KEYS.SESSION, sess); }
  static clearSession(){ try{ localStorage.removeItem(this.KEYS.SESSION); }catch(e){} }

  /* --- Gamificação (XP, nível, streak, conquistas) --- */
  static getGame(){
    return this._get(this.KEYS.GAME, {
      xp:0, level:1, bestStreak:0, examsCompleted:0, totalCorrect:0,
      perfectExams:0, achievements:[], lastActive:null
    });
  }
  static saveGame(g){ return this._set(this.KEYS.GAME, g); }

  /* --- IA offline: estatísticas por questão (repetição espaçada) --- */
  static getStats(){ return this._get(this.KEYS.STATS, {}); }
  static saveStats(s){ return this._set(this.KEYS.STATS, s); }
  static getStat(qid){
    const all = this.getStats();
    return all[qid] || {seen:0, correct:0, streak:0, ease:2.3, due:0, last:null};
  }

  static isOnboarded(){ try{ return !!localStorage.getItem(this.KEYS.ONBOARDED); }catch(e){ return true; } }
  static setOnboarded(){ try{ localStorage.setItem(this.KEYS.ONBOARDED, '1'); }catch(e){} }
}

/* ---------------------------------------------------------------------
   Reward pop (celebração / micro-recompensa)
--------------------------------------------------------------------- */
class RewardPop {
  static show(icon, title, subtitle='', ms=1600){
    const el = document.createElement('div');
    el.className = 'reward-pop';
    el.setAttribute('role','status');
    el.innerHTML = `<div class="rp-ic">${icon}</div><div class="rp-tt">${Util.escapeHtml(title)}</div>${subtitle?`<div class="rp-sb">${Util.escapeHtml(subtitle)}</div>`:''}`;

  }

/* ---------------------------------------------------------------------
   Gamification engine (XP, níveis, streak, conquistas)
--------------------------------------------------------------------- */
const ACHIEVEMENTS = [
  {id:'first_exam', ic:'P1', nm:'Primeiros Passos', ds:'Conclua seu primeiro simulado.'},
  {id:'perfect', ic:'100', nm:'Nota Máxima', ds:'Acerte 100% em um simulado.'},
  {id:'streak10', ic:'10', nm:'Em Chamas', ds:'Acerte 10 questões seguidas.'},
  {id:'exams5', ic:'5', nm:'Estudioso', ds:'Conclua 5 simulados.'},
  {id:'correct100', ic:'100+', nm:'Centurião', ds:'Acumule 100 acertos no total.'},
  {id:'level5', ic:'Lv5', nm:'Veterano', ds:'Alcance o nível 5.'},
  {id:'night_owl', ic:'00h', nm:'Coruja', ds:'Estude após a meia-noite.'},
];
class Gamification {
  static XP_PER_CORRECT = 10;
  static XP_PER_EXAM = 25;
  static XP_PERFECT_BONUS = 50;
  static levelFromXp(xp){ return Math.floor(Math.sqrt(xp/100)) + 1; }
  static xpForLevel(lvl){ return Math.pow(lvl-1,2)*100; }
  static progress(){
    const g = StorageManager.getGame();
    const lvl = this.levelFromXp(g.xp);
    const curBase = this.xpForLevel(lvl);
    const nextBase = this.xpForLevel(lvl+1);
    const pct = Math.max(0, Math.min(100, Math.round(((g.xp-curBase)/(nextBase-curBase))*100)));
    return {xp:g.xp, level:lvl, pct, toNext:nextBase-g.xp};
  }
  static unlock(id){
    const g = StorageManager.getGame();
    if(g.achievements.includes(id)) return false;
    g.achievements.push(id);
    StorageManager.saveGame(g);
    const def = ACHIEVEMENTS.find(a=>a.id===id);
    if(def) RewardPop.show(def.ic, 'Conquista desbloqueada!', def.nm, 2200);
    return true;
  }
  static checkStatic(){
    // conquistas que dependem de estado acumulado
    const g = StorageManager.getGame();
    if(g.examsCompleted>=1) this.unlock('first_exam');
    if(g.examsCompleted>=5) this.unlock('exams5');
    if(g.totalCorrect>=100) this.unlock('correct100');
    if(g.perfectExams>=1) this.unlock('perfect');
    if(this.levelFromXp(g.xp)>=5) this.unlock('level5');
    const h = new Date().getHours();
    if(h>=0 && h<5) this.unlock('night_owl');
  }
  static registerExam({correctCount, totalCount, percentage}){
    const g = StorageManager.getGame();
    const before = this.levelFromXp(g.xp);
    let gained = correctCount*this.XP_PER_CORRECT + this.XP_PER_EXAM;
    if(percentage===100){ gained += this.XP_PERFECT_BONUS; g.perfectExams++; }
    g.xp += gained;
    g.examsCompleted++;
    g.totalCorrect += correctCount;
    g.lastActive = new Date().toISOString();
    g.level = this.levelFromXp(g.xp);
    StorageManager.saveGame(g);
    this.checkStatic();
    const after = this.levelFromXp(g.xp);
    return {gained, leveledUp: after>before, newLevel: after};
  }
  static noteStreak(streak){
    const g = StorageManager.getGame();
    if(streak>g.bestStreak){ g.bestStreak = streak; StorageManager.saveGame(g); }
    if(streak>=10) this.unlock('streak10');
  }
}
/* ---------------------------------------------------------------------
   AITutor — IA offline: repetição espaçada (SM-2 lite) + detecção de lacunas
   100% no navegador, sem chamadas externas.
--------------------------------------------------------------------- */
class AITutor {
  static DAY = 86400000;
  /* Atualiza a estatística de uma questão após ser respondida (algoritmo SM-2 simplificado). */
  static record(qid, correct){
    const all = StorageManager.getStats();
    const s = all[qid] || {seen:0, correct:0, streak:0, ease:2.3, due:0, last:null};
    s.seen++;
    s.last = Date.now();
    if(correct){
      s.correct++;
      s.streak++;
      s.ease = Math.min(3.0, s.ease + 0.12);
      // intervalo cresce com a sequência de acertos e a "facilidade"
      const intervalDays = Math.round(Math.pow(s.ease, s.streak-1));
      s.due = Date.now() + Math.min(intervalDays, 30) * this.DAY;
    } else {
      s.streak = 0;
      s.ease = Math.max(1.4, s.ease - 0.25);
      s.due = Date.now() + 10 * 60 * 1000; // rever em ~10 min
    }
    all[qid] = s;
    StorageManager.saveStats(all);
  }
  /* Prioridade de revisão: quanto MAIOR, mais a questão precisa ser revista. */
  static priority(qid){
    const s = StorageManager.getStat(qid);
    if(s.seen===0) return 40; // nunca vista: prioridade média-alta
    const acc = s.correct / s.seen;
    const overdue = Math.max(0, Date.now() - s.due) / this.DAY;
    return (1 - acc) * 100 + Math.min(overdue, 30) * 2 - s.streak * 3;
  }
  /* Seleciona as N questões mais "fracas/atrasadas" de todo o banco. */
  static pickWeak(limit=15){
    const qs = StorageManager.getQuestions();
    return qs
      .map(q => ({q, p: this.priority(q.id)}))
      .sort((a,b) => b.p - a.p)
      .slice(0, limit)
      .map(x => x.q);
  }
  /* Quantas questões estão "vencidas" (due) para revisão hoje. */
  static dueCount(){
    const qs = StorageManager.getQuestions();
    const now = Date.now();
    return qs.filter(q => { const s = StorageManager.getStat(q.id); return s.seen>0 && s.due<=now; }).length;
  }
  /* Detecção de lacunas: acurácia por categoria (agregada de todo o histórico de stats). */
  static gapsByCategory(){
    const qs = StorageManager.getQuestions();
    const map = {};
    qs.forEach(q=>{
      const cat = q.category || 'Sem categoria';
      const s = StorageManager.getStat(q.id);
      if(s.seen===0) return;
      map[cat] = map[cat] || {cat, seen:0, correct:0};
      map[cat].seen += s.seen;
      map[cat].correct += s.correct;
    });
    return Object.values(map)
      .map(m=>({...m, acc: Math.round((m.correct/m.seen)*100)}))
      .sort((a,b)=>a.acc-b.acc);
  }
  /* Lacunas de uma tentativa específica (para mostrar no resultado). */
  static gapsFromDetail(detail){
    const map = {};
    detail.forEach(d=>{
      const cat = d.question.category || 'Sem categoria';
      map[cat] = map[cat] || {cat, total:0, correct:0};
      map[cat].total++;
      if(d.correct) map[cat].correct++;
    });
    return Object.values(map)
      .map(m=>({...m, acc: Math.round((m.correct/m.total)*100)}))
      .sort((a,b)=>a.acc-b.acc);
  }
}

/* ---------------------------------------------------------------------
   Domain models
--------------------------------------------------------------------- */
const QUESTION_TYPES = {
  single: {label:'Múltipla escolha', icon:'◉'},
  multi: {label:'Múltiplas respostas', icon:'☑'},
  boolean: {label:'Verdadeiro/Falso', icon:'V/F'},
  short: {label:'Resposta curta', icon:'✎'},
  matching: {label:'Relacionar colunas', icon:'⇄'},
  sequence: {label:'Sequência', icon:'≡'},
  image: {label:'Imagem', icon:'Img'}
};

class Question {
  constructor(data={}){
    this.id = data.id || Util.uid('q');
    this.type = data.type || 'single';
    this.text = data.text || '';
    this.image = data.image || null; // base64 or url
    this.options = data.options || []; // [{id,text,correct}]
    this.correctShort = data.correctShort || []; // array of accepted strings
    this.matchPairs = data.matchPairs || []; // [{left,right}]
    this.sequenceItems = data.sequenceItems || []; // [{text}] in correct order
    this.explanation = data.explanation || '';
    this.level = data.level || 'medio'; // facil, medio, dificil
    this.category = data.category || '';
    this.materia = data.materia || data.subject || data.discipline || '';
    this.submateria = data.submateria || data.subtopic || '';
    this.tags = data.tags || [];
    this.comments = data.comments || '';
  }

  static optionLetter(i){ return String.fromCharCode(65+i); }

  isCorrect(userAnswer){
    if(userAnswer === undefined || userAnswer === null) return false;
    switch(this.type){
      case 'single':
      case 'boolean':
      case 'image': {
        const correctOpt = this.options.find(o=>o.correct);
        return correctOpt && userAnswer === correctOpt.id;
      }
      case 'multi': {
        const correctIds = this.options.filter(o=>o.correct).map(o=>o.id).sort();
        const given = Array.isArray(userAnswer) ? [...userAnswer].sort() : [];
        return correctIds.length===given.length && correctIds.every((v,i)=>v===given[i]);
      }
      case 'short': {
        const norm = s => String(s||'').trim().toLowerCase();
        return this.correctShort.some(c => norm(c) === norm(userAnswer));
      }
      case 'matching': {
        if(!userAnswer || typeof userAnswer !== 'object') return false;
        return this.matchPairs.every((pair, idx) => userAnswer[idx] === pair.right);
      }
      case 'sequence': {
        if(!Array.isArray(userAnswer)) return false;
        const correctOrder = this.sequenceItems.map(s=>s.text);
        return correctOrder.length === userAnswer.length && correctOrder.every((v,i)=>v===userAnswer[i]);
      }
      default: return false;
    }
  }
}

  get accept(){ return '*'; }

  parse(text){ throw new Error('parse() não implementado'); }
}

class JSONImporter extends BaseImporter {
  get label(){ return 'JSON'; }
  get accept(){ return '.json,application/json'; }
  parse(text){
    const data = JSON.parse(text);
    // Suporta tanto {exam,questions} quanto array de questões cru
    if(Array.isArray(data)){
      return {exam:null, questions:data.map(q=>new Question(q))};
    }
    const questions = (data.questions||[]).map(q=>new Question(q));
    const exam = data.exam ? new Exam({...data.exam, questionIds:questions.map(q=>q.id)}) : null;
    return {exam, questions};
  }
}

class CSVImporter extends BaseImporter {
  get label(){ return 'CSV'; }
  get accept(){ return '.csv,text/csv'; }
  parse(text){
    const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
    if(!lines.length) return {exam:null, questions:[]};
    const headers = Util.parseCsvLine(lines[0]).map(h=>h.toLowerCase());
    const questions = [];
    for(let i=1;i<lines.length;i++){
      const cols = Util.parseCsvLine(lines[i]);
      const row = {};
      headers.forEach((h,idx)=> row[h] = cols[idx] ?? '');
      const opts = [];
      ['a','b','c','d','e','f'].forEach(letter=>{
        const key = `option_${letter}`;
        if(row[key]){
          opts.push({id:Util.uid('opt'), text:row[key], correct: (row.correct||'').trim().toLowerCase()===letter});
        }
      });
      questions.push(new Question({
        type: row.type || (opts.length ? 'single' : 'short'),
        text: row.question || row.text || '',
        options: opts,
        correctShort: row.answer ? [row.answer] : [],
        explanation: row.explanation || '',
        category: row.category || '',
        level: row.level || 'medio',
        tags: row.tags ? row.tags.split('|').map(s=>s.trim()).filter(Boolean) : []
      }));
    }
    return {exam:null, questions};
  }
}

class TXTImporter extends BaseImporter {
  get label(){ return 'TXT'; }
  get accept(){ return '.txt,text/plain'; }
  parse(text){
    // Formato simples: bloco separado por linha em branco
    // Pergunta
    // A) alt
    // B) alt *  (asterisco marca correta)
    // Explicação: ...
    const blocks = text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
    const questions = [];
    for(const block of blocks){
      const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
      if(!lines.length) continue;
      const qText = lines[0];
      const options = [];
      let explanation = '';
      for(let i=1;i<lines.length;i++){
        const line = lines[i];
        const m = line.match(/^([A-Ha-h])[\).\-]\s*(.*)$/);
        if(m){
          const correct = /\*\s*$/.test(m[2]);
          options.push({id:Util.uid('opt'), text:m[2].replace(/\*\s*$/,'').trim(), correct});
        } else if(/^explica[çc][ãa]o\s*:/i.test(line)){
          explanation = line.replace(/^explica[çc][ãa]o\s*:/i,'').trim();
        }
      }
      questions.push(new Question({
        type: options.length ? 'single' : 'short',
        text: qText,
        options,
        explanation
      }));
    }
    return {exam:null, questions};
  }
}

class HTMLImporter extends BaseImporter {
  get label(){ return 'HTML'; }
  get accept(){ return '.html,.htm,text/html'; }
  parse(text){
    // Espera export previamente gerado por este próprio app (data-exam-json)
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const scriptTag = doc.querySelector('script[type="application/json"][data-examforge]');
    if(scriptTag){
      const data = JSON.parse(scriptTag.textContent);
      const questions = (data.questions||[]).map(q=>new Question(q));
      const exam = data.exam ? new Exam({...data.exam, questionIds:questions.map(q=>q.id)}) : null;
      return {exam, questions};
    }
    // Fallback: tenta extrair de uma lista simples <li> com texto
    const items = [...doc.querySelectorAll('li,p')].map(el=>el.textContent.trim()).filter(Boolean);
    const questions = items.map(t=>new Question({type:'short', text:t}));
    return {exam:null, questions};
  }
}

class ImporterRegistry {
  static _map = new Map();
  static register(key, importerInstance){ this._map.set(key, importerInstance); }
  static get(key){ return this._map.get(key); }

  static detectByExtension(filename){
    const ext = filename.split('.').pop().toLowerCase();
    const map = {json:'json', csv:'csv', txt:'txt', html:'html', htm:'html'};
    return map[ext] || null;
  }
}

class CSVExporter extends BaseExporter {

  export(exam, questions){
    const headers = ['type','question','option_a','option_b','option_c','option_d','option_e','option_f','correct','answer','explanation','category','level','tags'];
    const rows = [headers.join(',')];
    questions.forEach(q=>{
      const opts = q.options || [];
      const optCols = ['a','b','c','d','e','f'].map((_,i)=> opts[i] ? Util.csvEscape(opts[i].text) : '');
      const correctLetter = (()=>{
        const idx = opts.findIndex(o=>o.correct);
        return idx>=0 ? Question.optionLetter(idx).toLowerCase() : '';
      })();
      rows.push([
        q.type, Util.csvEscape(q.text), ...optCols, correctLetter,
        Util.csvEscape((q.correctShort||[])[0]||''), Util.csvEscape(q.explanation),
        Util.csvEscape(q.category), Util.csvEscape(q.level), Util.csvEscape((q.tags||[]).join('|'))
      ].join(','));
    });
    return rows.join('\n');
  }
}

   Sound (beep via WebAudio, sem dependências externas)
--------------------------------------------------------------------- */
class SoundFx {
  static _ctx = null;
  static beep(freq=880, duration=140, volume=.05){
    const settings = StorageManager.getSettings();
    if(!settings.sound) return;
    try{
      this._ctx = this._ctx || new (window.AudioContext||window.webkitAudioContext)();
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.value = volume;
      osc.connect(gain); gain.connect(this._ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, this._ctx.currentTime + duration/1000);
      osc.stop(this._ctx.currentTime + duration/1000 + 0.02);
    }catch(e){ /* silencioso */ }
  }
}

   Timer
--------------------------------------------------------------------- */
class ExamTimer {
  constructor({totalSeconds, onTick, onWarn, onEnd}){
    this.total = totalSeconds;
    this.remaining = totalSeconds;
    this.onTick = onTick;
    this.onWarn = onWarn;
    this.onEnd = onEnd;
    this._warned = new Set();
    this._interval = null;
    this.paused = false;
  }
  start(){
    if(this._interval) return;
    this._interval = setInterval(()=>{
      if(this.paused) return;
      this.remaining -= 1;
      const mins = Math.floor(this.remaining/60);
      [30,10,5,1].forEach(w=>{
        if(mins===w && this.remaining%60===0 && !this._warned.has(w)){
          this._warned.add(w);
          this.onWarn && this.onWarn(w);
        }
      });
      this.onTick && this.onTick(this.remaining);
      if(this.remaining<=0){ this.stop(); this.onEnd && this.onEnd(); }
    }, 1000);
  }
  pause(){ this.paused = true; }
  resume(){ this.paused = false; }
  stop(){ clearInterval(this._interval); this._interval = null; }
}

class Router {
  constructor(app){
    this.app = app;
    this.routes = {};
    this.current = null;
  }
  register(name, view){ this.routes[name] = view; }
  go(name, params={}){
    const tabMap = {study:{route:'study'}, profile:{route:'progress'}, history:{route:'progress'}, bank:{route:'content',tab:'questoes'}, progress:{route:'progress'}, dashboard:{route:'home'}};
    if(tabMap[name]){ const m=tabMap[name]; if(m.tab) params={...params,tab:m.tab}; name=m.route||name; }
    if(this.current && this.routes[this.current]?.onLeave) this.routes[this.current].onLeave();
    document.querySelectorAll('#views .view').forEach(v=>v.classList.add('hidden'));
    const view = this.routes[name];
    if(!view) return;
    this.current = name;
    let el = document.getElementById(`view-${name}`);
    if(!el){
      el = document.createElement('div');
      el.className = 'view';
      el.id = `view-${name}`;
      document.getElementById('views').appendChild(el);
    }
    el.classList.remove('hidden');
    document.getElementById('topbar-title').textContent = view.title || name;
    document.getElementById('topbar-crumb').textContent = view.crumb ? `/ ${view.crumb}` : '';
    this._updateRail(name);
    if(['home','study','content','progress'].includes(name)) try{ location.hash = name + (params.tab ? '/'+params.tab : ''); }catch(_){}
    view.render(el, params);
  }
  _updateRail(name){
    const active = name === 'builder' ? 'content' : name;
    document.querySelectorAll('.tabbar-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.route === active);
    });
  }
}

        <div class="tab active" data-tab="meta">Metadados</div>
        <div class="tab" data-tab="questions">Questões vinculadas (${linkedCount})</div>
      </div>

      <div id="tab-meta">
        <div class="form-grid">
          <div class="field full"><label>Título</label><input class="input" id="f-title" value="${Util.escapeHtml(e.title)}" placeholder="Ex: AZ-900 — Fundamentos do Azure"></div>
          <div class="field full"><label>Descrição</label><textarea class="textarea" id="f-desc" placeholder="Breve descrição do exame">${Util.escapeHtml(e.description)}</textarea></div>
          <div class="field"><label>Categoria</label><input class="input" id="f-category" value="${Util.escapeHtml(e.category)}" placeholder="Cloud, Segurança, Redes..."></div>
          <div class="field"><label>Código</label><input class="input" id="f-code" value="${Util.escapeHtml(e.code)}" placeholder="AZ-900"></div>
          <div class="field"><label>Idioma</label>
            <select class="select" id="f-language">
              <option value="pt-BR" ${e.language==='pt-BR'?'selected':''}>Português (BR)</option>
              <option value="en-US" ${e.language==='en-US'?'selected':''}>English (US)</option>
              <option value="es-ES" ${e.language==='es-ES'?'selected':''}>Español</option>
            </select>
          </div>
          <div class="field"><label>Tempo (minutos)</label><input class="input" type="number" min="1" id="f-time" value="${e.timeMinutes}"></div>
          <div class="field"><label>Nota mínima (%)</label><input class="input" type="number" min="0" max="100" id="f-pass" value="${e.passScore}"></div>
          <div class="field"><label>Autor</label><input class="input" id="f-author" value="${Util.escapeHtml(e.author)}"></div>
          <div class="field"><label>Versão</label><input class="input" id="f-version" value="${Util.escapeHtml(e.version)}"></div>
          <div class="field full"><label>Tags</label>
            <div class="tag-input-wrap" id="f-tags-wrap">
              ${e.tags.map(t=>BuilderView._tagChip(t)).join('')}
              <input type="text" placeholder="Digite e pressione Enter" id="f-tags-input">
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:8px">
          <button class="btn btn-primary" id="b-save">Salvar exame</button>
          ${e.id && StorageManager.getExam(e.id) ? `<button class="btn btn-danger" id="b-delete">${Icons.trash} Excluir</button>` : ''}
        </div>
      </div>

      <div id="tab-questions" class="hidden">
        <div class="row between" style="margin-bottom:14px">
          <span style="font-size:13px;color:var(--text-1)">${linkedCount} de ${allQuestions.length} questões do banco vinculadas</span>
          <button class="btn btn-primary btn-sm" id="b-add-question">${Icons.plus} Nova questão</button>
        </div>
        <div id="q-link-list">
          ${allQuestions.length ? allQuestions.map(q=>BuilderView._questionCheckRow(q, e.questionIds.includes(q.id))).join('') : DashboardView._empty('Banco de questões vazio', 'Crie questões na aba Banco de Questões ou clique em "Nova questão".')}
        </div>
      </div>
    `;

    el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{
      el.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      el.querySelector('#tab-meta').classList.toggle('hidden', t.dataset.tab!=='meta');
      el.querySelector('#tab-questions').classList.toggle('hidden', t.dataset.tab!=='questions');
    }));

    // tag input
    const tagsWrap = el.querySelector('#f-tags-wrap');
    const tagsInput = el.querySelector('#f-tags-input');
    tagsInput.addEventListener('keydown', ev=>{
      if(ev.key==='Enter' && tagsInput.value.trim()){
        ev.preventDefault();
        e.tags.push(tagsInput.value.trim());
        tagsInput.value='';
        this._refreshTags(tagsWrap, tagsInput);
      }
    });
    this._bindTagRemoval(tagsWrap, tagsInput);

    el.querySelector('#b-save').addEventListener('click', ()=>this._save(el));
    el.querySelector('#b-delete')?.addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Excluir exame', message:'Esta ação não pode ser desfeita. Deseja continuar?', confirmLabel:'Excluir', danger:true});
      if(ok){ StorageManager.deleteExam(e.id); Toast.show('Exame excluído.', 'success'); App.instance.router.go('home'); }
    });
    el.querySelector('#b-add-question').addEventListener('click', ()=> QuestionEditorController.openModal(null, (q)=>{
      this.exam.questionIds.push(q.id);
      this._renderForm(el);
      el.querySelector('[data-tab="questions"]').click();
    }));
    el.querySelectorAll('[data-link-q]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const qid = cb.dataset.linkQ;
        if(cb.checked){ if(!this.exam.questionIds.includes(qid)) this.exam.questionIds.push(qid); }
        else { this.exam.questionIds = this.exam.questionIds.filter(id=>id!==qid); }
      });
    });
  }
  _refreshTags(wrap, input){
    wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
    this.exam.tags.forEach(t=>{
      const chip = document.createElement('span');
      chip.className='tag-chip';
      chip.innerHTML = `${Util.escapeHtml(t)} <button data-tag="${Util.escapeHtml(t)}">✕</button>`;
      wrap.insertBefore(chip, input);
    });
    this._bindTagRemoval(wrap, input);
  }
  _bindTagRemoval(wrap, input){
    wrap.querySelectorAll('[data-tag]').forEach(btn=>{
      btn.onclick = ()=>{
        this.exam.tags = this.exam.tags.filter(t=>t!==btn.dataset.tag);
        this._refreshTags(wrap, input);
      };
    });
  }
  static _tagChip(t){ return `<span class="tag-chip">${Util.escapeHtml(t)} <button data-tag="${Util.escapeHtml(t)}">✕</button></span>`; }
  static _questionCheckRow(q, checked){
    return `<label class="list-row" style="cursor:pointer">
      <input type="checkbox" data-link-q="${q.id}" ${checked?'checked':''} style="width:16px;height:16px;accent-color:var(--accent)">
      <div class="meta">
        <div class="title">${Util.escapeHtml(q.text.slice(0,90))}</div>
        <div class="desc">${QUESTION_TYPES[q.type]?.label||q.type} · ${Util.escapeHtml(q.category||'sem categoria')}</div>
      </div>
      <span class="badge">${Util.escapeHtml(q.level)}</span>
    </label>`;
  }
  _save(el){
    const e = this.exam;
    e.title = el.querySelector('#f-title').value.trim();
    e.description = el.querySelector('#f-desc').value.trim();
    e.category = el.querySelector('#f-category').value.trim();
    e.code = el.querySelector('#f-code').value.trim();
    e.language = el.querySelector('#f-language').value;
    e.timeMinutes = Number(el.querySelector('#f-time').value)||60;
    e.passScore = Number(el.querySelector('#f-pass').value)||70;
    e.author = el.querySelector('#f-author').value.trim();
    e.version = el.querySelector('#f-version').value.trim();
    e.updatedAt = new Date().toISOString();
    if(!e.title){ Toast.show('Informe um título para o exame.', 'error'); return; }
    StorageManager.upsertExam(e);
    Toast.show('Exame salvo com sucesso.', 'success');
    App.instance.router.go('home');
  }
}

/* ---------- Question Bank ---------- */
class QuestionBankView {
  get title(){ return 'Banco de Questões'; }
  get crumb(){ return ''; }
  render(el){
    this.el = el;
    this._renderList();
  }
  _renderList(filter=''){
    const f = filter.trim().toLowerCase();
    const all = StorageManager.getQuestions();
    const match = q => (q.text+(q.materia||'')+(q.submateria||'')+(q.category||'')+q.tags.join(' ')).toLowerCase().includes(f);
    const content = f
      ? (all.filter(match).length ? all.filter(match).map(q=>this._row(q)).join('') : DashboardView._empty('Nenhuma questão', 'Ajuste a busca.'))
      : this._renderTree(BankHierarchy.groupByExam());
    this.el.innerHTML = `
      <div class="row between" style="margin-bottom:12px;gap:8px">
        <input class="input" id="qb-search" placeholder="Buscar por prova, matéria ou texto..." value="${Util.escapeHtml(filter)}">
        <button class="btn btn-sm btn-primary" id="qb-new">${Icons.plus}</button>
      </div>
      <div id="qb-list" class="${f?'':'bank-tree'}">${content}</div>
    `;
    this.el.querySelector('#qb-new').addEventListener('click', ()=>QuestionEditorController.openModal(null, ()=>this._renderList(this.el.querySelector('#qb-search').value)));
    this.el.querySelector('#qb-search').addEventListener('input', e=>this._renderList(e.target.value));
    this._bindActions(all);
  }
  _renderTree(tree){
    if(!tree.length) return DashboardView._empty('Nenhuma questão', 'Toque + para criar.');
    return tree.map(node=>{
      const ex = node.exam;
      const total = node.materias.reduce((s,m)=>s+m.submaterias.reduce((t,sub)=>t+sub.questions.length,0),0);
      const materias = node.materias.map(m=>`
        <details class="bank-materia">
          <summary>${Util.escapeHtml(m.materia)} <span class="bank-count">${m.submaterias.reduce((t,s)=>t+s.questions.length,0)} questões</span></summary>
          ${m.submaterias.map(sub=>`
            <details class="bank-sub">
              <summary>${Util.escapeHtml(sub.submateria)} <span class="bank-count">${sub.questions.length}</span></summary>
              ${sub.questions.map(q=>this._row(q)).join('')}
            </details>`).join('')}
        </details>`).join('');
      return `<details class="bank-prova">
        <summary>${Util.escapeHtml(ex.title||'Prova')} <span class="bank-count">${total} questões</span></summary>
        ${materias}
      </details>`;
    }).join('');
  }
  _bindActions(all){
    this.el.querySelectorAll('[data-edit-q]').forEach(b=>b.addEventListener('click', ()=>{
      const q = all.find(x=>x.id===b.dataset.editQ);
      QuestionEditorController.openModal(q, ()=>this._renderList(this.el.querySelector('#qb-search')?.value||''));
    }));
    this.el.querySelectorAll('[data-del-q]').forEach(b=>b.addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Excluir questão', message:'Esta questão será removida do banco.', confirmLabel:'Excluir', danger:true});
      if(ok){ StorageManager.deleteQuestion(b.dataset.delQ); Toast.show('Questão excluída.', 'success'); this._renderList(this.el.querySelector('#qb-search')?.value||''); }
    }));
  }
  _row(q){
    const desc = [q.materia, q.submateria||q.category].filter(Boolean).join(' · ') || 'geral';
    return `<div class="list-row list-row-compact">
      <div class="meta">
        <div class="title">${Util.escapeHtml(q.text.slice(0,80)||'(sem enunciado)')}</div>
        <div class="desc">${Util.escapeHtml(desc)}</div>
      </div>
      <button class="btn btn-icon btn-ghost btn-sm" data-edit-q="${q.id}">${Icons.edit}</button>
      <button class="btn btn-icon btn-danger btn-sm" data-del-q="${q.id}">${Icons.trash}</button>
    </div>`;
  }
}

/* ---------- Question Editor (modal, shared by Bank & Builder) ---------- */
class QuestionEditorController {
  static openModal(existing, onSaved){
    const q = existing ? new Question(existing) : new Question();
    const bodyHtml = `
      <div class="qtype-grid" id="qtype-grid">
        ${Object.entries(QUESTION_TYPES).map(([key,def])=>`
          <button type="button" class="qtype-btn ${q.type===key?'active':''}" data-type="${key}">${def.icon} ${def.label}</button>
        `).join('')}
      </div>
      <div class="field full"><label>Pergunta</label><textarea class="textarea" id="qe-text" placeholder="Digite o enunciado...">${Util.escapeHtml(q.text)}</textarea></div>
      <div class="field full"><label>Imagem (opcional)</label>
        <input type="file" accept="image/*" id="qe-image">
        <div id="qe-image-preview" style="margin-top:8px">${q.image?`<img src="${q.image}" style="max-width:100%;max-height:140px;border-radius:8px">`:''}</div>
      </div>
      <div id="qe-type-body"></div>
      <div class="form-grid" style="margin-top:6px">
        <div class="field"><label>Matéria</label><input class="input" id="qe-materia" value="${Util.escapeHtml(q.materia)}" placeholder="Ex.: Matemática"></div>
        <div class="field"><label>Sub-matéria</label><input class="input" id="qe-submateria" value="${Util.escapeHtml(q.submateria)}" placeholder="Ex.: Funções"></div>
        <div class="field"><label>Categoria</label><input class="input" id="qe-category" value="${Util.escapeHtml(q.category)}"></div>
        <div class="field"><label>Nível</label>
          <select class="select" id="qe-level">
            <option value="facil" ${q.level==='facil'?'selected':''}>Fácil</option>
            <option value="medio" ${q.level==='medio'?'selected':''}>Médio</option>
            <option value="dificil" ${q.level==='dificil'?'selected':''}>Difícil</option>
          </select>
        </div>
        <div class="field full"><label>Tags (separadas por vírgula)</label><input class="input" id="qe-tags" value="${Util.escapeHtml(q.tags.join(', '))}"></div>
        <div class="field full"><label>Explicação</label><textarea class="textarea" id="qe-explanation">${Util.escapeHtml(q.explanation)}</textarea></div>
        <div class="field full"><label>Comentários</label><textarea class="textarea" id="qe-comments">${Util.escapeHtml(q.comments)}</textarea></div>
      </div>
    `;
    const {el, close} = Modal.open({
      title: existing ? 'Editar questão' : 'Nova questão',
      wide:true,
      bodyHtml,
      footerHtml: `<button class="btn btn-ghost" data-cancel>Cancelar</button><button class="btn btn-primary" data-save>Salvar questão</button>`,
      onMount:(modalEl, closeFn)=>{
        const renderTypeBody = () => this._renderTypeBody(modalEl, q);
        modalEl.querySelectorAll('[data-type]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            q.type = btn.dataset.type;
            modalEl.querySelectorAll('[data-type]').forEach(b=>b.classList.toggle('active', b===btn));
            renderTypeBody();
          });
        });
        renderTypeBody();
        modalEl.querySelector('#qe-image').addEventListener('change', ev=>{
          const file = ev.target.files[0];
          if(!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            q.image = reader.result;
            modalEl.querySelector('#qe-image-preview').innerHTML = `<img src="${reader.result}" style="max-width:100%;max-height:140px;border-radius:8px">`;
          };
          reader.readAsDataURL(file);
        });
        modalEl.querySelector('[data-cancel]').addEventListener('click', closeFn);
        modalEl.querySelector('[data-save]').addEventListener('click', ()=>{
          q.text = modalEl.querySelector('#qe-text').value.trim();
          q.materia = modalEl.querySelector('#qe-materia').value.trim();
          q.submateria = modalEl.querySelector('#qe-submateria').value.trim();
          q.category = modalEl.querySelector('#qe-category').value.trim() || q.submateria;
          q.level = modalEl.querySelector('#qe-level').value;
          q.tags = modalEl.querySelector('#qe-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
          q.explanation = modalEl.querySelector('#qe-explanation').value.trim();
          q.comments = modalEl.querySelector('#qe-comments').value.trim();
          this._collectTypeData(modalEl, q);
          if(!q.text){ Toast.show('Informe o enunciado da questão.', 'error'); return; }
          StorageManager.upsertQuestion(q);
          Toast.show('Questão salva.', 'success');
          closeFn();
          onSaved && onSaved(q);
        });
      }
    });
  }
  static _renderTypeBody(modalEl, q){
    const body = modalEl.querySelector('#qe-type-body');
    if(q.type==='single' || q.type==='multi' || q.type==='image'){
      if(!q.options.length) q.options = [{id:Util.uid('opt'),text:'',correct:true},{id:Util.uid('opt'),text:'',correct:false}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Alternativas</label>
        <div id="alt-rows">${q.options.map((o,i)=>this._altRow(o,i,q.type)).join('')}</div>
        <button type="button" class="btn btn-sm" id="alt-add">${Icons.plus} Adicionar alternativa</button>
      `;
      this._bindAltRows(body, q);
    } else if(q.type==='boolean'){
      if(q.options.length!==2) q.options = [{id:Util.uid('opt'),text:'Verdadeiro',correct:true},{id:Util.uid('opt'),text:'Falso',correct:false}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Resposta correta</label>
        <div id="alt-rows">${q.options.map((o,i)=>this._altRow(o,i,'single', true)).join('')}</div>
      `;
      this._bindAltRows(body, q);
    } else if(q.type==='short'){
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Respostas aceitas (uma por linha)</label>
        <textarea class="textarea" id="short-answers" style="min-height:70px">${q.correctShort.join('\n')}</textarea>
      `;
    } else if(q.type==='matching'){
      if(!q.matchPairs.length) q.matchPairs = [{left:'',right:''},{left:'',right:''}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Pares (coluna A ⇄ coluna B)</label>
        <div id="match-rows">${q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('')}</div>
        <button type="button" class="btn btn-sm" id="match-add">${Icons.plus} Adicionar par</button>
      `;
      this._bindMatchRows(body, q);
    } else if(q.type==='sequence'){
      if(!q.sequenceItems.length) q.sequenceItems = [{text:''},{text:''}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Itens na ordem correta</label>
        <div id="seq-rows">${q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('')}</div>
        <button type="button" class="btn btn-sm" id="seq-add">${Icons.plus} Adicionar item</button>
      `;
      this._bindSeqRows(body, q);
    }
  }
  static _altRow(o, i, type, radioForced=false){
    const inputType = (type==='multi') ? 'checkbox' : 'radio';
    return `<div class="alt-row" data-idx="${i}">
      <span class="letter">${Question.optionLetter(i)}</span>
      <input type="${inputType}" name="alt-correct" class="radio-check" data-correct-idx="${i}" ${o.correct?'checked':''}>
      <input type="text" class="input" data-text-idx="${i}" value="${Util.escapeHtml(o.text)}" placeholder="Texto da alternativa">
      ${!radioForced ? `<button type="button" class="btn btn-icon btn-ghost" data-remove-idx="${i}">${Icons.trash}</button>` : ''}
    </div>`;
  }
  static _bindAltRows(body, q){
    const wrap = body.querySelector('#alt-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-correct-idx]').forEach(inp=>{
        inp.addEventListener('change', ()=>{
          const idx = Number(inp.dataset.correctIdx);
          if(inp.type==='radio'){ q.options.forEach((o,i)=> o.correct = i===idx); }
          else { q.options[idx].correct = inp.checked; }
        });
      });
      wrap.querySelectorAll('[data-text-idx]').forEach(inp=>{
        inp.addEventListener('input', ()=>{ q.options[Number(inp.dataset.textIdx)].text = inp.value; });
      });
      wrap.querySelectorAll('[data-remove-idx]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          q.options.splice(Number(btn.dataset.removeIdx),1);
          wrap.innerHTML = q.options.map((o,i)=>this._altRow(o,i,q.type)).join('');
          rebind();
        });
      });
    };
    rebind();
    body.querySelector('#alt-add')?.addEventListener('click', ()=>{
      q.options.push({id:Util.uid('opt'), text:'', correct:false});
      wrap.innerHTML = q.options.map((o,i)=>this._altRow(o,i,q.type)).join('');
      rebind();
    });
  }
  static _matchRow(p,i){
    return `<div class="match-row" data-idx="${i}">
      <input type="text" class="input" data-left-idx="${i}" value="${Util.escapeHtml(p.left)}" placeholder="Item A">
      <span>⇄</span>
      <input type="text" class="input" data-right-idx="${i}" value="${Util.escapeHtml(p.right)}" placeholder="Item B (correspondente)">
      <button type="button" class="btn btn-icon btn-ghost" data-remove-match="${i}">${Icons.trash}</button>
    </div>`;
  }
  static _bindMatchRows(body, q){
    const wrap = body.querySelector('#match-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-left-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.matchPairs[Number(inp.dataset.leftIdx)].left = inp.value));
      wrap.querySelectorAll('[data-right-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.matchPairs[Number(inp.dataset.rightIdx)].right = inp.value));
      wrap.querySelectorAll('[data-remove-match]').forEach(btn=> btn.addEventListener('click', ()=>{
        q.matchPairs.splice(Number(btn.dataset.removeMatch),1);
        wrap.innerHTML = q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('');
        rebind();
      }));
    };
    rebind();
    body.querySelector('#match-add')?.addEventListener('click', ()=>{
      q.matchPairs.push({left:'',right:''});
      wrap.innerHTML = q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('');
      rebind();
    });
  }
  static _seqRow(s,i){
    return `<div class="seq-row" data-idx="${i}">
      <span class="letter">${i+1}.</span>
      <input type="text" class="input" data-seq-idx="${i}" value="${Util.escapeHtml(s.text)}" placeholder="Item da sequência">
      <button type="button" class="btn btn-icon btn-ghost" data-remove-seq="${i}">${Icons.trash}</button>
    </div>`;
  }
  static _bindSeqRows(body, q){
    const wrap = body.querySelector('#seq-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-seq-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.sequenceItems[Number(inp.dataset.seqIdx)].text = inp.value));
      wrap.querySelectorAll('[data-remove-seq]').forEach(btn=> btn.addEventListener('click', ()=>{
        q.sequenceItems.splice(Number(btn.dataset.removeSeq),1);
        wrap.innerHTML = q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('');
        rebind();
      }));
    };
    rebind();
    body.querySelector('#seq-add')?.addEventListener('click', ()=>{
      q.sequenceItems.push({text:''});
      wrap.innerHTML = q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('');
      rebind();
    });
  }
  static _collectTypeData(modalEl, q){
    if(q.type==='short'){
      const ta = modalEl.querySelector('#short-answers');
      if(ta) q.correctShort = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    }
    // options/matchPairs/sequenceItems já são atualizados via listeners diretamente no objeto q
  }
}

/* ---------- History View ---------- */
class HistoryView {
  get title(){ return 'Histórico'; }
  get crumb(){ return ''; }
  render(el, compact=false){
    const history = StorageManager.getHistory();
    const list = compact ? history.slice(0, 8) : history;
    el.innerHTML = `
      ${!compact && history.length ? `<div class="row between" style="margin-bottom:12px"><span class="hub-stat">${history.length} tentativa(s)</span><button class="btn btn-danger btn-sm" id="h-clear">${Icons.trash}</button></div>` : ''}

/* ---------- Progress analytics & charts ---------- */
class ProgressAnalytics {
  static summary(){
    const history = StorageManager.getHistory();
    const g = StorageManager.getGame();
    const p = Gamification.progress();
    const avg = history.length ? Math.round(history.reduce((s,h)=>s+(h.percentage||0),0)/history.length) : 0;
    const passed = history.filter(h=>h.passed).length;
    return {history, g, p, avg, passed, attempts: history.length};
  }
  static resultBuckets(history){
    const buckets = {aprovado:0, media:0, baixo:0};
    history.forEach(h=>{
      const pct = h.percentage||0;
      if(pct>=70) buckets.aprovado++;
      else if(pct>=50) buckets.media++;
      else buckets.baixo++;
    });
    return buckets;
  }
  static accuracyByMateria(){
    const map = {};
    StorageManager.getQuestions().forEach(q=>{
      const m = q.materia || 'Outros';
      const s = StorageManager.getStat(q.id);
      if(s.seen===0) return;
      map[m] = map[m] || {seen:0, correct:0};
      map[m].seen += s.seen;
      map[m].correct += s.correct;
    });
    let rows = Object.entries(map).map(([materia,v])=>({materia, acc: Math.round(v.correct/v.seen*100)}));
    if(!rows.length){
      const exams = Object.fromEntries(StorageManager.getExams().map(e=>[e.id,e]));
      StorageManager.getHistory().forEach(h=>{
        const m = exams[h.examId]?.materia || h.examTitle?.split('—')[0]?.trim() || 'Outros';
        map[m] = map[m] || {sum:0, n:0};
        map[m].sum += h.percentage||0;
        map[m].n++;
      });
      rows = Object.entries(map).map(([materia,v])=>({materia, acc: Math.round(v.sum/v.n)}));
    }
    return rows.sort((a,b)=>a.materia.localeCompare(b.materia,'pt-BR')).slice(0,6);
  }
}

class ChartHelpers {
  static pie(segments, size=110){
    const total = segments.reduce((s,x)=>s+x.value,0);
    if(!total) return `<div class="chart-empty">Sem dados ainda</div>`;
    const cx=size/2, cy=size/2, r=size*0.38;
    let angle = -Math.PI/2;
    const slices = segments.filter(s=>s.value>0).map(s=>{
      const slice = (s.value/total)*Math.PI*2;
      const x1 = cx + r*Math.cos(angle);
      const y1 = cy + r*Math.sin(angle);
      angle += slice;
      const x2 = cx + r*Math.cos(angle);
      const y2 = cy + r*Math.sin(angle);
      const large = slice > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      return `<path d="${d}" fill="${s.color}"/>`;
    }).join('');
    const legend = segments.filter(s=>s.value>0).map(s=>`<span style="color:${s.color}">●</span> ${s.label} ${s.value}`).join(' · ');
    return `<svg class="chart-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${slices}</svg><div class="chart-legend">${legend}</div>`;
  }
  static radar(labels, values, size=120){
    if(!labels.length) return `<div class="chart-empty">Faça simulados para ver matérias</div>`;
    const cx=size/2, cy=size/2, maxR=size*0.36, n=labels.length;
    const pt = (i,v)=>{ const a = -Math.PI/2 + (Math.PI*2*i/n); const r = maxR*(Math.max(0,Math.min(100,v))/100); return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
    const rings = [25,50,75,100].map(p=>{
      const pts = labels.map((_,i)=>pt(i,p).join(',')).join(' ');
      return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
    }).join('');
    const axes = labels.map((_,i)=>{ const [x,y]=pt(i,100); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border-soft)" stroke-width="1"/>`; }).join('');
    const dataPts = labels.map((_,i)=>pt(i,values[i]||0).join(',')).join(' ');
    const dots = labels.map((_,i)=>{ const [x,y]=pt(i,values[i]||0); return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent)"/>`; }).join('');
    const lbls = labels.map((lb,i)=>{ const [x,y]=pt(i,118); return `<text x="${x}" y="${y}" text-anchor="middle" font-size="7" fill="var(--text-2)">${Util.escapeHtml(lb.slice(0,8))}</text>`; }).join('');
    return `<svg class="chart-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${rings}${axes}<polygon points="${dataPts}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>${dots}${lbls}</svg>`;
  }
  static gauge(value, size=120){
    const pct = Math.max(0, Math.min(100, value||0));
    const cx=size/2, cy=size*0.58, r=size*0.38;
    const start = Math.PI, end = 0;
    const needleAngle = Math.PI + (pct/100)*Math.PI;
    const nx = cx + r*0.82*Math.cos(needleAngle);
    const ny = cy + r*0.82*Math.sin(needleAngle);
    const color = pct>=70?'var(--good)':pct>=50?'var(--warn)':'var(--bad)';
    const arc = (a1,a2,col)=>{ const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2); return `<path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"/>`; };
    return `<svg class="chart-svg" width="${size}" height="${size*0.72}" viewBox="0 0 ${size} ${size*0.72}">
      ${arc(start, start+Math.PI*0.5, 'var(--bad)')}
      ${arc(start+Math.PI*0.5, start+Math.PI*0.7, 'var(--warn)')}
      ${arc(start+Math.PI*0.7, end, 'var(--good)')}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="var(--text-0)"/>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="16" font-weight="700" fill="${color}">${pct}%</text>
    </svg><div class="chart-legend">Média geral</div>`;
  }
  static sparkline(history, width=320, height=72){
    const recent = history.slice(0, 12).reverse();
    if(!recent.length) return `<div class="chart-empty">Complete um simulado para ver sua evolução.</div>`;
    const pad = 4;
    const barGap = 4;
    const barW = Math.max(8, (width - pad*2 - (recent.length - 1) * barGap) / recent.length);
    const maxH = height - 24;
    const bars = recent.map((h,i)=>{
      const hgt = Math.max(2, (h.percentage / 100) * maxH);
      const x = pad + i * (barW + barGap);
      const y = height - 16 - hgt;
      const cls = h.percentage >= 70 ? 'good' : h.percentage >= 50 ? 'warn' : 'bad';
      return `<rect x="${x}" y="${y}" width="${barW}" height="${hgt}" rx="2" class="chart-bar-${cls}"><title>${h.percentage}%</title></rect>`;
    }).join('');
    return `<svg class="chart-spark" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
  }
}

/* ---------- Import Controller ---------- */
class ImportController {
  static openModal(){
    const bodyHtml = `
      <div class="field full">
        <label>Selecione um arquivo (JSON, CSV, TXT ou HTML)</label>
        <input type="file" id="import-file" accept=".json,.csv,.txt,.html,.htm">
        <p class="hint">O formato é detectado automaticamente pela extensão do arquivo.</p>
      </div>
      <div id="import-status" style="font-size:13px;color:var(--text-1)"></div>
    `;
    const {el, close} = Modal.open({
      title:'Importar dados',
      bodyHtml,
      footerHtml:`<button class="btn btn-ghost" data-cancel>Cancelar</button>`,
      onMount:(modalEl, closeFn)=>{
        modalEl.querySelector('[data-cancel]').addEventListener('click', closeFn);
        modalEl.querySelector('#import-file').addEventListener('change', async (ev)=>{
          const file = ev.target.files[0];
          if(!file) return;
          const statusEl = modalEl.querySelector('#import-status');
          statusEl.textContent = 'Lendo arquivo...';
          Loading.show('Importando dados...');
          try{
            const key = ImporterRegistry.detectByExtension(file.name);
            const importer = key && ImporterRegistry.get(key);
            if(!importer) throw new Error('Formato de arquivo não suportado.');
            const text = await file.text();
            const {exam, questions} = importer.parse(text);
            questions.forEach(q=> StorageManager.upsertQuestion(q));
            if(exam) StorageManager.upsertExam(exam);
            Loading.hide();
            statusEl.textContent = `Importado: ${questions.length} questão(ões)${exam?` e 1 exame ("${exam.title}")`:''}.`;
            Toast.show(`Importação concluída: ${questions.length} questão(ões).`, 'success');
            setTimeout(()=>{ closeFn(); App.instance.router.go('home'); }, 900);
          }catch(err){
            Loading.hide();
            console.error(err);
            statusEl.textContent = 'Erro ao importar: ' + err.message;
            Toast.show('Falha na importação: ' + err.message, 'error');
          }
        });
      }
    });
  }
}

class ExportController {

        modalEl.querySelectorAll('[data-export]').forEach(btn=>{
