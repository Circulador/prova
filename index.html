/* ---------------------------------------------------------------------
   Gamification engine (XP, níveis, streak, conquistas)
--------------------------------------------------------------------- */
const ACHIEVEMENTS = [
  {id:'first_exam', ic:'P1', nm:'Primeiros Passos', ds:'Conclua seu primeiro simulado.'},
  {id:'perfect', ic:'100', nm:'Nota Máxima', ds:'Acerte 100% em um simulado.'},
  {id:'streak10', ic:'10', nm:'Em Chamas', ds:'Acerte 10 questões seguidas.'},
  {id:'exams5', ic:'5', nm:'Estudioso', ds:'Conclua 5 simulados.'},
  {id:'correct100', ic:'100+', nm:'Centurião', ds:'Acumule 100 acertos no total.'},
  {id:'level5', ic:'Lv5', nm:'Veterano', ds:'Alcance o nível 5.'},
  {id:'night_owl', ic:'00h', nm:'Coruja', ds:'Estude após a meia-noite.'},
];
class Gamification {
  static XP_PER_CORRECT = 10;
  static XP_PER_EXAM = 25;
  static XP_PERFECT_BONUS = 50;
  static levelFromXp(xp){ return Math.floor(Math.sqrt(xp/100)) + 1; }
  static xpForLevel(lvl){ return Math.pow(lvl-1,2)*100; }
  static progress(){
    const g = StorageManager.getGame();
    const lvl = this.levelFromXp(g.xp);
    const curBase = this.xpForLevel(lvl);
    const nextBase = this.xpForLevel(lvl+1);
    const pct = Math.max(0, Math.min(100, Math.round(((g.xp-curBase)/(nextBase-curBase))*100)));
    return {xp:g.xp, level:lvl, pct, toNext:nextBase-g.xp};
  }
  static unlock(id){
    const g = StorageManager.getGame();
    if(g.achievements.includes(id)) return false;
    g.achievements.push(id);
    StorageManager.saveGame(g);
    const def = ACHIEVEMENTS.find(a=>a.id===id);
    if(def) RewardPop.show(def.ic, 'Conquista desbloqueada!', def.nm, 2200);
    return true;
  }
  static checkStatic(){
    // conquistas que dependem de estado acumulado
    const g = StorageManager.getGame();
    if(g.examsCompleted>=1) this.unlock('first_exam');
    if(g.examsCompleted>=5) this.unlock('exams5');
    if(g.totalCorrect>=100) this.unlock('correct100');
    if(g.perfectExams>=1) this.unlock('perfect');
    if(this.levelFromXp(g.xp)>=5) this.unlock('level5');
    const h = new Date().getHours();
    if(h>=0 && h<5) this.unlock('night_owl');
  }
  static registerExam({correctCount, totalCount, percentage}){
    const g = StorageManager.getGame();
    const before = this.levelFromXp(g.xp);
    let gained = correctCount*this.XP_PER_CORRECT + this.XP_PER_EXAM;
    if(percentage===100){ gained += this.XP_PERFECT_BONUS; g.perfectExams++; }
    g.xp += gained;
    g.examsCompleted++;
    g.totalCorrect += correctCount;
    g.lastActive = new Date().toISOString();
    g.level = this.levelFromXp(g.xp);
    StorageManager.saveGame(g);
    this.checkStatic();
    const after = this.levelFromXp(g.xp);
    return {gained, leveledUp: after>before, newLevel: after};
  }
  static noteStreak(streak){
    const g = StorageManager.getGame();
    if(streak>g.bestStreak){ g.bestStreak = streak; StorageManager.saveGame(g); }
    if(streak>=10) this.unlock('streak10');
  }
}
/* ---------------------------------------------------------------------
   AITutor — IA offline: repetição espaçada (SM-2 lite) + detecção de lacunas
   100% no navegador, sem chamadas externas.
--------------------------------------------------------------------- */
class AITutor {
  static DAY = 86400000;
  /* Atualiza a estatística de uma questão após ser respondida (algoritmo SM-2 simplificado). */
  static record(qid, correct){
    const all = StorageManager.getStats();
    const s = all[qid] || {seen:0, correct:0, streak:0, ease:2.3, due:0, last:null};
    s.seen++;
    s.last = Date.now();
    if(correct){
      s.correct++;
      s.streak++;
      s.ease = Math.min(3.0, s.ease + 0.12);
      // intervalo cresce com a sequência de acertos e a "facilidade"
      const intervalDays = Math.round(Math.pow(s.ease, s.streak-1));
      s.due = Date.now() + Math.min(intervalDays, 30) * this.DAY;
    } else {
      s.streak = 0;
      s.ease = Math.max(1.4, s.ease - 0.25);
      s.due = Date.now() + 10 * 60 * 1000; // rever em ~10 min
    }
    all[qid] = s;
    StorageManager.saveStats(all);
  }
  /* Prioridade de revisão: quanto MAIOR, mais a questão precisa ser revista. */
  static priority(qid){
    const s = StorageManager.getStat(qid);
    if(s.seen===0) return 40; // nunca vista: prioridade média-alta
    const acc = s.correct / s.seen;
    const overdue = Math.max(0, Date.now() - s.due) / this.DAY;
    return (1 - acc) * 100 + Math.min(overdue, 30) * 2 - s.streak * 3;
  }
  /* Seleciona as N questões mais "fracas/atrasadas" de todo o banco. */
  static pickWeak(limit=15){
    const qs = StorageManager.getQuestions();
    return qs
      .map(q => ({q, p: this.priority(q.id)}))
      .sort((a,b) => b.p - a.p)
      .slice(0, limit)
      .map(x => x.q);
  }
  /* Quantas questões estão "vencidas" (due) para revisão hoje. */
  static dueCount(){
    const qs = StorageManager.getQuestions();
    const now = Date.now();
    return qs.filter(q => { const s = StorageManager.getStat(q.id); return s.seen>0 && s.due<=now; }).length;
  }
  /* Detecção de lacunas: acurácia por categoria (agregada de todo o histórico de stats). */
  static gapsByCategory(){
    const qs = StorageManager.getQuestions();
    const map = {};
    qs.forEach(q=>{
      const cat = q.category || 'Sem categoria';
      const s = StorageManager.getStat(q.id);
      if(s.seen===0) return;
      map[cat] = map[cat] || {cat, seen:0, correct:0};
      map[cat].seen += s.seen;
      map[cat].correct += s.correct;
    });
    return Object.values(map)
      .map(m=>({...m, acc: Math.round((m.correct/m.seen)*100)}))
      .sort((a,b)=>a.acc-b.acc);
  }
  /* Lacunas de uma tentativa específica (para mostrar no resultado). */
  static gapsFromDetail(detail){
    const map = {};
    detail.forEach(d=>{
      const cat = d.question.category || 'Sem categoria';
      map[cat] = map[cat] || {cat, total:0, correct:0};
      map[cat].total++;
      if(d.correct) map[cat].correct++;
    });
    return Object.values(map)
      .map(m=>({...m, acc: Math.round((m.correct/m.total)*100)}))
      .sort((a,b)=>a.acc-b.acc);
  }
}

class Question {
  constructor(data={}){
    this.id = data.id || Util.uid('q');
    this.type = data.type || 'single';
    this.text = data.text || '';
    this.image = data.image || null; // base64 or url
    this.options = data.options || []; // [{id,text,correct}]
    this.correctShort = data.correctShort || []; // array of accepted strings
    this.matchPairs = data.matchPairs || []; // [{left,right}]
    this.sequenceItems = data.sequenceItems || []; // [{text}] in correct order
    this.explanation = data.explanation || '';
    this.stemEn = data.stemEn || '';
    this.stemPt = data.stemPt || data.text || '';
    this.explanationEn = data.explanationEn || data.explanation || '';
    this.explanationPt = data.explanationPt || data.explanation || '';
    this.level = data.level || 'medio'; // facil, medio, dificil
    this.category = data.category || '';
    this.materia = data.materia || data.subject || data.discipline || '';
    this.submateria = data.submateria || data.subtopic || '';
    this.tags = data.tags || [];
    this.comments = data.comments || '';
    /** Schema v2 pass-through — metadata de privacidade / learning views (Privacy Knowledge OS) */
    this.nodeMeta = data.nodeMeta || null;
  }

  static optionLetter(i){ return String.fromCharCode(65+i); }

  isCorrect(userAnswer){
    if(userAnswer === undefined || userAnswer === null) return false;
    switch(this.type){
      case 'single':
      case 'boolean':
      case 'image': {
        const correctOpt = this.options.find(o=>o.correct);
        return correctOpt && userAnswer === correctOpt.id;
      }
      case 'multi': {
        const correctIds = this.options.filter(o=>o.correct).map(o=>o.id).sort();
        const given = Array.isArray(userAnswer) ? [...userAnswer].sort() : [];
        return correctIds.length===given.length && correctIds.every((v,i)=>v===given[i]);
      }
      case 'short': {
        const norm = s => String(s||'').trim().toLowerCase();
        return this.correctShort.some(c => norm(c) === norm(userAnswer));
      }
      case 'matching': {
        if(!userAnswer || typeof userAnswer !== 'object') return false;
        return this.matchPairs.every((pair, idx) => userAnswer[idx] === pair.right);
      }
      case 'sequence': {
        if(!Array.isArray(userAnswer)) return false;
        const correctOrder = this.sequenceItems.map(s=>s.text);
        return correctOrder.length === userAnswer.length && correctOrder.every((v,i)=>v===userAnswer[i]);
      }
      default: return false;
    }
  }
}

class Exam {
  constructor(data={}){
    this.id = data.id || Util.uid('exam');
    this.title = data.title || '';
    this.description = data.description || '';
    this.category = data.category || '';
    this.trilha = data.trilha || data.serie || data.category || '';
    this.materia = data.materia || '';
    this.serie = data.serie || '';
    this.code = data.code || '';
    this.region = data.region || '';
    this.trackId = data.trackId || data.region || '';
    this.org = data.org || '';
    this.stub = !!data.stub;
    this.language = data.language || 'pt-BR';
    this.timeMinutes = data.timeMinutes ?? 60;
    this.passScore = data.passScore ?? 70;
    this.author = data.author || '';
    this.version = data.version || '1.0';
    this.tags = data.tags || [];
    this.questionIds = data.questionIds || [];
    this.createdAt = data.createdAt || new Date().toISOString();
    this.updatedAt = data.updatedAt || new Date().toISOString();
  }
}

/* ---------------------------------------------------------------------
   Knowledge Node — Fase 1 (projeção read-only, sem persistência)
   Spec: docs/KNOWLEDGE-MODEL.md §8 Fase 1
   Entrega: KnowledgeNormalizer + KnowledgeRepository (memória apenas).
   Zero mudança de UX; dual-write/read é Fase 2+.
--------------------------------------------------------------------- */
class KnowledgeNormalizer {
  static truncate(str, max){
    const s = String(str || '').trim();
    return s.length <= max ? s : s.slice(0, max - 1) + '…';
  }

  /** Deriva texto verso do flashcard — mesma lógica de FSRS.backText */
  static flashcardBackText(q){
    let ans = '';
    if(['single','boolean','image'].includes(q.type)){
      ans = (q.options || []).find(o => o.correct)?.text || '';
    } else if(q.type === 'multi'){
      ans = (q.options || []).filter(o => o.correct).map(o => o.text).join(', ');
    } else if(q.type === 'short'){
      ans = (q.correctShort || []).join(' / ');
    } else if(q.type === 'matching'){
      ans = (q.matchPairs || []).map(p => p.left + ' → ' + p.right).join('\n');
    } else if(q.type === 'sequence'){
      ans = (q.sequenceItems || []).map(s => s.text).join(' → ');
    }
    return 'Resposta: ' + (ans || 'Não cadastrada.') + (q.explanation ? '\n\nExplicação: ' + q.explanation : '');
  }

  static autoFlashcard(q){
    return [{
      viewId: 'fc_auto',
      front: q.text,
      back: this.flashcardBackText(q),
      derivedFrom: 'question'
    }];
  }

  static fromLegacyQuestion(q){
    const now = new Date().toISOString();
    const stat = StorageManager.getStat(q.id);
    const views = {
      question: {
        viewId: 'qv_default',
        type: q.type,
        stem: q.text,
        image: q.image,
        options: q.options,
        correctShort: q.correctShort,
        matchPairs: q.matchPairs,
        sequenceItems: q.sequenceItems
      },
      flashcards: this.autoFlashcard(q)
    };
    if(q.explanation){
      views.explanation = { viewId: 'ev_default', body: q.explanation };
    }
    return {
      id: q.id,
      schemaVersion: '1.0.0',
      kind: 'concept',
      title: this.truncate(q.text, 80),
      metadata: {
        difficulty: q.level,
        tags: q.tags,
        category: q.category,
        materia: q.materia,
        submateria: q.submateria,
        legacy: { questionId: q.id }
      },
      views,
      progress: {
        seen: stat.seen || 0,
        correct: stat.correct || 0,
        streak: stat.streak || 0,
        lastAttemptAt: stat.last || null
      },
      createdAt: now,
      updatedAt: now
    };
  }

  static fromLegacyExam(exam){
    const now = new Date().toISOString();
    return {
      id: exam.id,
      schemaVersion: '1.0.0',
      kind: 'collection',
      title: exam.title || '',
      metadata: {
        legacy: { examIds: [exam.id] },
        tags: exam.tags,
        category: exam.category,
        trilha: exam.trilha,
        materia: exam.materia,
        code: exam.code
      },
      collection: {
        collectionType: 'exam',
        questionSelection: (exam.questionIds || []).map(id => ({ nodeId: id })),
        rules: {
          timeMinutes: exam.timeMinutes,
          passScore: exam.passScore
        }
      },
      createdAt: exam.createdAt || now,
      updatedAt: exam.updatedAt || now
    };
  }
}

class KnowledgeRepository {
  static _nodes = [];
  static _links = [];
  static _built = false;

  static _debugEnabled(){
    try{ return localStorage.getItem('ef_knowledge_debug') === '1'; }catch(e){ return false; }
  }

  static buildGraphFromLegacy(){
    const nodes = [];
    const links = [];
    const index = new Map();
    const addNode = (node) => {
      if(!index.has(node.id)){ index.set(node.id, node); nodes.push(node); }
      return node;
    };

    StorageManager.getQuestions().forEach(raw => {
      const q = raw instanceof Question ? raw : new Question(raw);
      addNode(KnowledgeNormalizer.fromLegacyQuestion(q));
    });

    StorageManager.getExams().forEach(raw => {
      const exam = raw instanceof Exam ? raw : new Exam(raw);
      addNode(KnowledgeNormalizer.fromLegacyExam(exam));
      (exam.questionIds || []).forEach(qid => {
        links.push({
          id: Util.uid('kl'),
          from: exam.id,
          to: qid,
          type: 'includes'
        });
      });
    });

    this._appendExinStructure(nodes, links, index);

    this._nodes = nodes;
    this._links = links;
    this._built = true;
    return { nodes, links };
  }

  /** Preview in-memory: trilha regional → certificação → tópico → conceitos */
  static _appendExinStructure(nodes, links, index){
    const dpoExams = StorageManager.getExams().filter(e =>
      (e.questionIds || []).length && (e.region || e.trackId || /^(EXIN-|IAPP-|PECB-|ISACA-|ISO-|CNIL-|TUV-|UK-)/.test(e.code || ''))
    );
    if(!dpoExams.length) return;

    const byTrack = {};
    dpoExams.forEach(e=>{
      const key = e.trackId || e.region || 'global';
      byTrack[key] = byTrack[key] || [];
      byTrack[key].push(e);
    });

    Object.entries(byTrack).forEach(([trackKey, exinExams])=>{
    const trilhaId = 'track-' + trackKey;
    const trackMeta = (typeof GlobalDPOSeeder !== 'undefined' && GlobalDPOSeeder.TRACKS)
      ? GlobalDPOSeeder.TRACKS.find(t=>t.id===trackKey || t.region===trackKey) : null;
    const trilhaLabel = trackMeta ? `${trackMeta.name} — DPO` : (exinExams[0]?.trilha || 'DPO Global');

    const now = new Date().toISOString();
    const addNode = (node) => {
      if(!index.has(node.id)){ index.set(node.id, node); nodes.push(node); }
    };
    const addLink = (from, to, type) => {
      links.push({ id: Util.uid('kl'), from, to, type });
    };

    addNode({
      id: trilhaId,
      schemaVersion: '1.0.0',
      kind: 'track',
      title: trilhaLabel,
      metadata: { tags: [trilhaLabel] },
      views: {},
      createdAt: now,
      updatedAt: now
    });

    exinExams.forEach(exam => {
      const certId = 'cert-' + (exam.code || exam.id).toLowerCase().replace(/[^a-z0-9]+/g, '-');
      addNode({
        id: certId,
        schemaVersion: '1.0.0',
        kind: 'certification',
        title: exam.title || exam.materia || exam.code,
        metadata: { code: exam.code, materia: exam.materia, legacy: { examIds: [exam.id] } },
        views: {},
        createdAt: now,
        updatedAt: now
      });
      addLink(certId, trilhaId, 'parent');

      const qmap = new Map(StorageManager.getQuestions().map(q => [q.id, q]));
      const topics = new Map();
      (exam.questionIds || []).forEach(qid => {
        const q = qmap.get(qid);
        if(!q) return;
        const sub = q.submateria || q.category || 'Geral';
        const topicId = 'topic-' + certId + '-' + sub.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 48);
        if(!topics.has(topicId)){
          topics.set(topicId, sub);
          addNode({
            id: topicId,
            schemaVersion: '1.0.0',
            kind: 'topic',
            title: sub,
            metadata: { materia: q.materia, submateria: sub },
            views: {},
            createdAt: now,
            updatedAt: now
          });
          addLink(topicId, certId, 'parent');
        }
        if(index.has(qid)){
          addLink(qid, topicId, 'parent');
        }
      });
    });
    });
  }

  static _ensureGraph(){
    if(!this._built) this.buildGraphFromLegacy();
  }

  static projectQuestions(){
    this._ensureGraph();
    return this._nodes
      .filter(n => n.kind === 'concept' && n.views?.question)
      .map(n => {
        const qv = n.views.question;
        const meta = n.metadata || {};
        return new Question({
          id: n.id,
          type: qv.type,
          text: qv.stem,
          image: qv.image,
          options: qv.options,
          correctShort: qv.correctShort,
          matchPairs: qv.matchPairs,
          sequenceItems: qv.sequenceItems,
          explanation: n.views.explanation?.body || '',
          level: meta.difficulty || 'medio',
          category: meta.category || '',
          materia: meta.materia || '',
          submateria: meta.submateria || '',
          tags: meta.tags || []
        });
      });
  }

  static projectExams(){
    this._ensureGraph();
    return this._nodes
      .filter(n => n.kind === 'collection' && n.collection)
      .map(n => {
        const meta = n.metadata || {};
        return new Exam({
          id: n.id,
          title: n.title,
          description: meta.description || '',
          category: meta.category || '',
          trilha: meta.trilha || '',
          materia: meta.materia || '',
          code: meta.code || '',
          timeMinutes: n.collection.rules?.timeMinutes ?? 60,
          passScore: n.collection.rules?.passScore ?? 70,
          tags: meta.tags || [],
          questionIds: (n.collection.questionSelection || []).map(s => s.nodeId),
          createdAt: n.createdAt,
          updatedAt: n.updatedAt
        });
      });
  }

  /** Validação Fase 1 — silenciosa se contagens batem; log único se divergir ou ef_knowledge_debug=1 */
  static validatePhase1(){
    const legacyQ = StorageManager.getQuestions().length;
    const legacyE = StorageManager.getExams().length;
    const { nodes, links } = this.buildGraphFromLegacy();
    const concepts = nodes.filter(n => n.kind === 'concept').length;
    const collections = nodes.filter(n => n.kind === 'collection').length;
    const projectedQ = this.projectQuestions().length;
    const projectedE = this.projectExams().length;
    const match = concepts === legacyQ && collections === legacyE &&
      projectedQ === legacyQ && projectedE === legacyE;
    if(match && !this._debugEnabled()) return { match, nodes: nodes.length, links: links.length };
    console.debug('[Knowledge Phase 1]', {
      nodes: nodes.length, links: links.length,
      concepts, collections,
      legacyQuestions: legacyQ, projectedQuestions: projectedQ,
      legacyExams: legacyE, projectedExams: projectedE,
      match
    });
    return { match, nodes: nodes.length, links: links.length };
  }
}

/* ---------------------------------------------------------------------
   Importers (arquitetura plugável)
--------------------------------------------------------------------- */
class BaseImporter {
  get label(){ return 'Base'; }
  get accept(){ return '*'; }
  /** @returns {{exam:object|null, questions:object[]}} */
  parse(text){ throw new Error('parse() não implementado'); }
}

class JSONImporter extends BaseImporter {
  get label(){ return 'JSON'; }
  get accept(){ return '.json,application/json'; }
  parse(text){
    const data = JSON.parse(text);
    // Suporta tanto {exam,questions} quanto array de questões cru
    if(Array.isArray(data)){
      return {exam:null, questions:data.map(q=>new Question(q))};
    }
    const questions = (data.questions||[]).map(q=>new Question(q));
    const exam = data.exam ? new Exam({...data.exam, questionIds:questions.map(q=>q.id)}) : null;
    return {exam, questions};
  }
}

class CSVImporter extends BaseImporter {
  get label(){ return 'CSV'; }
  get accept(){ return '.csv,text/csv'; }
  parse(text){
    const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
    if(!lines.length) return {exam:null, questions:[]};
    const headers = Util.parseCsvLine(lines[0]).map(h=>h.toLowerCase());
    const questions = [];
    for(let i=1;i<lines.length;i++){
      const cols = Util.parseCsvLine(lines[i]);
      const row = {};
      headers.forEach((h,idx)=> row[h] = cols[idx] ?? '');
      const opts = [];
      ['a','b','c','d','e','f'].forEach(letter=>{
        const key = `option_${letter}`;
        if(row[key]){
          opts.push({id:Util.uid('opt'), text:row[key], correct: (row.correct||'').trim().toLowerCase()===letter});
        }
      });
      questions.push(new Question({
        type: row.type || (opts.length ? 'single' : 'short'),
        text: row.question || row.text || '',
        options: opts,
        correctShort: row.answer ? [row.answer] : [],
        explanation: row.explanation || '',
        category: row.category || '',
        level: row.level || 'medio',
        tags: row.tags ? row.tags.split('|').map(s=>s.trim()).filter(Boolean) : []
      }));
    }
    return {exam:null, questions};
  }
}

class TXTImporter extends BaseImporter {
  get label(){ return 'TXT'; }
  get accept(){ return '.txt,text/plain'; }
  parse(text){
    // Formato simples: bloco separado por linha em branco
    // Pergunta
    // A) alt
    // B) alt *  (asterisco marca correta)
    // Explicação: ...
    const blocks = text.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
    const questions = [];
    for(const block of blocks){
      const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
      if(!lines.length) continue;
      const qText = lines[0];
      const options = [];
      let explanation = '';
      for(let i=1;i<lines.length;i++){
        const line = lines[i];
        const m = line.match(/^([A-Ha-h])[\).\-]\s*(.*)$/);
        if(m){
          const correct = /\*\s*$/.test(m[2]);
          options.push({id:Util.uid('opt'), text:m[2].replace(/\*\s*$/,'').trim(), correct});
        } else if(/^explica[çc][ãa]o\s*:/i.test(line)){
          explanation = line.replace(/^explica[çc][ãa]o\s*:/i,'').trim();
        }
      }
      questions.push(new Question({
        type: options.length ? 'single' : 'short',
        text: qText,
        options,
        explanation
      }));
    }
    return {exam:null, questions};
  }
}

class HTMLImporter extends BaseImporter {
  get label(){ return 'HTML'; }
  get accept(){ return '.html,.htm,text/html'; }
  parse(text){
    // Espera export previamente gerado por este próprio app (data-exam-json)
    const doc = new DOMParser().parseFromString(text, 'text/html');
    const scriptTag = doc.querySelector('script[type="application/json"][data-examforge]');
    if(scriptTag){
      const data = JSON.parse(scriptTag.textContent);
      const questions = (data.questions||[]).map(q=>new Question(q));
      const exam = data.exam ? new Exam({...data.exam, questionIds:questions.map(q=>q.id)}) : null;
      return {exam, questions};
    }
    // Fallback: tenta extrair de uma lista simples <li> com texto
    const items = [...doc.querySelectorAll('li,p')].map(el=>el.textContent.trim()).filter(Boolean);
    const questions = items.map(t=>new Question({type:'short', text:t}));
    return {exam:null, questions};
  }
}

class ImporterRegistry {
  static _map = new Map();
  static register(key, importerInstance){ this._map.set(key, importerInstance); }
  static get(key){ return this._map.get(key); }
  static all(){ return [...this._map.entries()]; }
  static detectByExtension(filename){
    const ext = filename.split('.').pop().toLowerCase();
    const map = {json:'json', csv:'csv', txt:'txt', html:'html', htm:'html'};
    return map[ext] || null;
  }
}

--------------------------------------------------------------------- */
class BaseExporter {
  get label(){ return 'Base'; }
  get extension(){ return 'txt'; }
  get mime(){ return 'text/plain'; }
  export(exam, questions){ throw new Error('export() não implementado'); }
}

class JSONExporter extends BaseExporter {
  get label(){ return 'JSON'; }
  get extension(){ return 'json'; }
  get mime(){ return 'application/json'; }
  export(exam, questions){
    return JSON.stringify({exam, questions}, null, 2);
  }
}

class CSVExporter extends BaseExporter {
  get label(){ return 'CSV'; }
  get extension(){ return 'csv'; }
  get mime(){ return 'text/csv'; }
  export(exam, questions){
    const headers = ['type','question','option_a','option_b','option_c','option_d','option_e','option_f','correct','answer','explanation','category','level','tags'];
    const rows = [headers.join(',')];
    questions.forEach(q=>{
      const opts = q.options || [];
      const optCols = ['a','b','c','d','e','f'].map((_,i)=> opts[i] ? Util.csvEscape(opts[i].text) : '');
      const correctLetter = (()=>{
        const idx = opts.findIndex(o=>o.correct);
        return idx>=0 ? Question.optionLetter(idx).toLowerCase() : '';
      })();
      rows.push([
        q.type, Util.csvEscape(q.text), ...optCols, correctLetter,
        Util.csvEscape((q.correctShort||[])[0]||''), Util.csvEscape(q.explanation),
        Util.csvEscape(q.category), Util.csvEscape(q.level), Util.csvEscape((q.tags||[]).join('|'))
      ].join(','));
    });
    return rows.join('\n');
  }
}

class HTMLExporter extends BaseExporter {
  get label(){ return 'HTML'; }
  get extension(){ return 'html'; }
  get mime(){ return 'text/html'; }
  export(exam, questions){
    const rows = questions.map((q,i)=>`
      <li>
        <strong>${i+1}. ${Util.escapeHtml(q.text)}</strong>
        <ul>${(q.options||[]).map(o=>`<li>${o.correct?'<b>':''}${Util.escapeHtml(o.text)}${o.correct?' ✔</b>':''}</li>`).join('')}</ul>
        ${q.explanation ? `<p><em>Explicação: ${Util.escapeHtml(q.explanation)}</em></p>` : ''}
      </li>`).join('');
    return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>${Util.escapeHtml(exam?.title || 'Exame Exportado')}</title>
<style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:0 20px;color:#222}
li{margin-bottom:14px}h1{font-size:22px}</style></head><body>
<h1>${Util.escapeHtml(exam?.title || 'Exame Exportado')}</h1>
<p>${Util.escapeHtml(exam?.description || '')}</p>
<ol>${rows}</ol>
<script type="application/json" data-examforge>${JSON.stringify({exam, questions})}<\/script>
</body></html>`;
  }
}

/* ---------------------------------------------------------------------
   Sound (beep via WebAudio, sem dependências externas)
--------------------------------------------------------------------- */
class SoundFx {
  static _ctx = null;
  static beep(freq=880, duration=140, volume=.05){
    const settings = StorageManager.getSettings();
    if(!settings.sound) return;
    try{
      this._ctx = this._ctx || new (window.AudioContext||window.webkitAudioContext)();
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.value = volume;
      osc.connect(gain); gain.connect(this._ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, this._ctx.currentTime + duration/1000);
      osc.stop(this._ctx.currentTime + duration/1000 + 0.02);
    }catch(e){ /* silencioso */ }
  }
}

/* ---------------------------------------------------------------------
   Timer
--------------------------------------------------------------------- */
class ExamTimer {
  constructor({totalSeconds, onTick, onWarn, onEnd}){
    this.total = totalSeconds;
    this.remaining = totalSeconds;
    this.onTick = onTick;
    this.onWarn = onWarn;
    this.onEnd = onEnd;
    this._warned = new Set();
    this._interval = null;
    this.paused = false;
  }
  start(){
    if(this._interval) return;
    this._interval = setInterval(()=>{
      if(this.paused) return;
      this.remaining -= 1;
      const mins = Math.floor(this.remaining/60);
      [30,10,5,1].forEach(w=>{
        if(mins===w && this.remaining%60===0 && !this._warned.has(w)){
          this._warned.add(w);
          this.onWarn && this.onWarn(w);
        }
      });
      this.onTick && this.onTick(this.remaining);
      if(this.remaining<=0){ this.stop(); this.onEnd && this.onEnd(); }
    }, 1000);
  }
  pause(){ this.paused = true; }
  resume(){ this.paused = false; }
  stop(){ clearInterval(this._interval); this._interval = null; }
}

class Router {
  constructor(app){
    this.app = app;
    this.routes = {};
    this.current = null;
    this._lastParams = {};
  }
  register(name, view){ this.routes[name] = view; }
  go(name, params={}){
    this._lastParams = params;
    const tabMap = {study:{route:'content',tab:'certificacoes'}, profile:{route:'progress'}, history:{route:'progress'}, bank:{route:'content',tab:'questoes'}, progress:{route:'progress'}, dashboard:{route:'home'}, help:{route:'help'}};
    if(tabMap[name]){ const m=tabMap[name]; if(m.tab) params={...params,tab:m.tab}; name=m.route||name; }
    if(this.current && this.routes[this.current]?.onLeave) this.routes[this.current].onLeave();
    document.querySelectorAll('#views .view').forEach(v=>v.classList.add('hidden'));
    const view = this.routes[name];
    if(!view) return;
    this.current = name;
    let el = document.getElementById(`view-${name}`);
    if(!el){
      el = document.createElement('div');
      el.className = 'view';
      el.id = `view-${name}`;
      document.getElementById('views').appendChild(el);
    }
    el.classList.remove('hidden');
    document.getElementById('topbar-title').textContent = view.title || name;
    document.getElementById('topbar-crumb').textContent = view.crumb ? `/ ${view.crumb}` : '';
    this._updateRail(name);
    if(['home','content','progress','help','forge'].includes(name)) try{ location.hash = name + (params.tab ? '/'+params.tab : ''); }catch(_){}
    view.render(el, params);
  }
  _updateRail(name){
    const active = name === 'builder' ? 'content' : name;
    document.querySelectorAll('.tabbar-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.route === active);
    });
  }
}

/* ---------- Dashboard ---------- */
class DashboardView {
  get title(){ return I18n.t('nav.home'); }
  get crumb(){ return ''; }
  static _greeting(){
    const h = new Date().getHours();
    if(h < 12) return I18n.t('home.greetMorning');
    if(h < 18) return I18n.t('home.greetAfternoon');
    return I18n.t('home.greetEvening');
  }
  static _badgeClass(pct){
    return pct >= 70 ? 'badge-good' : pct >= 50 ? 'badge-warn' : 'badge-bad';
  }
  static _studentName(){
    try{ return localStorage.getItem('ef_last_candidate')?.trim() || ''; }catch(e){ return ''; }
  }
  static _examBestPct(examId){
    const hist = StorageManager.getHistory().filter(h=>h.examId===examId);
    return hist.length ? Math.max(...hist.map(h=>h.percentage||0)) : null;
  }
  static _progressRing(pct){
    const r=18,c=2*Math.PI*r,off=c-(pct/100)*c;
    return `<div class="home-progress-ring" title="${pct}%"><svg viewBox="0 0 44 44"><circle class="ring-bg" cx="22" cy="22" r="${r}"/><circle class="ring-fg" cx="22" cy="22" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><span class="pct">${pct}%</span></div>`;
  }
  static _groupCertsByTrack(exams){
    const groups = {};
    exams.forEach(e=>{
      const key = e.trackId || e.region || 'global';
      const track = (typeof GlobalDPOSeeder !== 'undefined' && GlobalDPOSeeder.TRACKS)
        ? GlobalDPOSeeder.TRACKS.find(t=>t.id===key || t.region===key) : null;
      const label = track ? track.name : (e.trilha || 'Outros');
      groups[label] = groups[label] || [];
      groups[label].push(e);
    });
    return Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));
  }
  static _homeProgressSummary(){
    const {history, avg, passed, attempts} = ProgressAnalytics.summary();
    const qt = ProgressAnalytics.questionTotals();
    const m = ProgressAnalytics.masteryScore();
    const g = StorageManager.getGame();
    if(!attempts && !qt.seen) return '';
    const parts = [];
    if(m.seen) parts.push(`<span><strong>${m.score}%</strong> ${I18n.t('home.mastery').toLowerCase()}</span>`);
    if(qt.seen) parts.push(`<span><strong>${qt.accuracy}%</strong> acertos</span>`);
    if(g.bestStreak) parts.push(`<span>Sequência <strong>${g.bestStreak}d</strong></span>`);
    if(attempts) parts.push(`<span><strong>${attempts}</strong> ${I18n.t('progress.sessions').toLowerCase()}</span>`);
    return `<div class="home-progress-summary">${parts.join('')}</div>`;
  }
  static _masteryStrip(){
    const m = ProgressAnalytics.masteryScore();
    const gap = ProgressAnalytics.topGap();
    if(!m.seen) return '';
    const gapLine = gap ? `<div class="home-mastery-gap">${I18n.t('home.gapHint', {area: gap.label})} · ${gap.acc}%</div>` : '';
    return `<div class="home-mastery">
      <div class="home-mastery-score"><strong>${m.score}%</strong><span>${I18n.t('home.mastery')}</span></div>
      ${gapLine}
    </div>`;
  }
  static _welcomeBlock(){
    return `<div class="home-welcome">
      <p class="home-kicker">${I18n.t('home.welcome')}</p>
      <h1 class="home-greet">${I18n.t('home.ready')}</h1>
      <span class="home-os-badge" id="home-forge-badge" role="button" tabindex="0" title="${I18n.t('forge.title')}">${Icons.sparkles} ${I18n.t('home.osBadge')}</span>
      <p class="home-mission">${I18n.t('home.mission')}</p>
      <details class="home-story-details">
        <summary>${I18n.t('home.aboutVelora')}</summary>
        <p class="home-story">${I18n.t('home.story')}</p>
        <p class="home-family">${I18n.t('home.family')}</p>
      </details>
    </div>`;
  }
  static _recentBlock(){
    const hist = StorageManager.getHistory().slice(-3).reverse();
    if(!hist.length) return '';
    const items = hist.map(h=>`
      <button type="button" class="home-recent-btn" data-recent-exam="${Util.escapeHtml(h.examId)}">
        <span class="home-recent-title">${Util.escapeHtml(h.examTitle || 'Sessão')}</span>
        <span class="home-recent-meta">${Util.formatDate(h.date)} · ${h.percentage ?? 0}%</span>
      </button>`).join('');
    return `<div class="home-recent">
      <h2 class="home-recent-label">${I18n.t('home.recent')}</h2>
      <div class="home-recent-list">${items}</div>
    </div>`;
  }
  render(el){
    el.classList.add('view-home');
    const session = StorageManager.getSession();
    const sessionExam = session ? StorageManager.getExam(session.examId) : null;
    const allCerts = StorageManager.getExams().filter(e=>e.questionIds?.length && (e.region || e.code))
      .sort((a,b)=>(a.code||'').localeCompare(b.code||'','pt-BR'));
    const grouped = DashboardView._groupCertsByTrack(allCerts);
    const answered = session?.answers ? Object.keys(session.answers).filter(k=>session.answers[k]!==undefined&&session.answers[k]!==null).length : 0;
    const totalQ = sessionExam?.questionIds?.length || 0;
    const recentBlock = DashboardView._recentBlock();

    const resumeBlock = sessionExam ? `
      <div class="home-hero">
        <div class="home-hero-body">
          <div class="home-hero-label">${I18n.t('home.continue')}</div>
          <div class="home-hero-title">${Util.escapeHtml(sessionExam.materia || sessionExam.title)}</div>
          <div class="home-hero-meta">${answered}/${totalQ} · ${I18n.t('home.answered')}</div>
        </div>
        <button class="btn btn-primary" id="home-resume" type="button" aria-label="Continuar">${Icons.play}</button>
      </div>` : '';

    const actionBar = `
      <div class="home-study-block">
        ${DashboardView._masteryStrip()}
        <div class="home-study-actions">
          <button class="btn btn-primary btn-lg" id="home-study-now" type="button">${I18n.t('home.studyNow')}</button>
          <button class="btn btn-ghost" id="home-customize" type="button">${I18n.t('home.customize')}</button>
        </div>
        <p class="hint" style="margin:8px 0 0;font-size:12px">${I18n.t('home.studyHint')}</p>
      </div>`;

    const listSections = grouped.map(([trackName, certs])=>{
      const items = certs.map(e=>{
        const best = DashboardView._examBestPct(e.id);
        const ring = best != null ? DashboardView._progressRing(best) : `<span class="home-list-play">${Icons.play}</span>`;
        return `
        <li class="home-list-item">
          <button class="home-list-btn" type="button" data-quick-exam="${e.id}">

              <span class="home-list-title">${Util.escapeHtml(e.materia)} — ${Util.escapeHtml(e.title)}</span>

            </span>
            ${ring}
          </button>
        </li>`;
      }).join('');
      return `<div class="home-track"><h2 class="home-track-title">${Util.escapeHtml(trackName)}</h2><ul class="home-list">${items}</ul></div>`;
    }).join('');

    const tracksBlock = allCerts.length
      ? `<details class="home-tracks-details">

          ${listSections}

    el.querySelector('#home-howto')?.addEventListener('click', ()=> App.instance.router.go('help', {tab:'howto'}));
    el.querySelector('#home-progress')?.addEventListener('click', ()=> App.instance.router.go('progress'));

    el.querySelectorAll('[data-quick-exam]').forEach(b=> b.addEventListener('click', ()=> ExamConfigModal.open(b.dataset.quickExam)));
    el.querySelectorAll('[data-recent-exam]').forEach(b=> b.addEventListener('click', ()=> ExamConfigModal.open(b.dataset.recentExam)));
  }
  onLeave(){

        <div class="desc">${Util.formatDate(h.date)} · ${Util.formatDuration(h.timeSpentSeconds)}</div>
      </div>
      <span class="badge ${cls}">${pct}%</span>
    </div>`;

    return `<div class="empty-state">${Icons.bank}<h3>${title}</h3><p>${desc}</p></div>`;
  }

          <button class="btn btn-primary" id="b-save">Salvar exame</button>
          ${e.id && StorageManager.getExam(e.id) ? `<button class="btn btn-danger" id="b-delete">${Icons.trash} Excluir</button>` : ''}
        </div>
      </div>

      <div id="tab-questions" class="hidden">
        <div class="row between" style="margin-bottom:14px">
          <span style="font-size:13px;color:var(--text-1)">${linkedCount} de ${allQuestions.length} questões do banco vinculadas</span>
          <button class="btn btn-primary btn-sm" id="b-add-question">${Icons.plus} Nova questão</button>
        </div>
        <div id="q-link-list">
          ${allQuestions.length ? allQuestions.map(q=>BuilderView._questionCheckRow(q, e.questionIds.includes(q.id))).join('') : DashboardView._empty('Banco de questões vazio', 'Crie questões na aba Banco de Questões ou clique em "Nova questão".')}
        </div>
      </div>
    `;

    el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{
      el.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      el.querySelector('#tab-meta').classList.toggle('hidden', t.dataset.tab!=='meta');
      el.querySelector('#tab-questions').classList.toggle('hidden', t.dataset.tab!=='questions');
    }));

    // tag input
    const tagsWrap = el.querySelector('#f-tags-wrap');
    const tagsInput = el.querySelector('#f-tags-input');
    tagsInput.addEventListener('keydown', ev=>{
      if(ev.key==='Enter' && tagsInput.value.trim()){
        ev.preventDefault();
        e.tags.push(tagsInput.value.trim());
        tagsInput.value='';
        this._refreshTags(tagsWrap, tagsInput);
      }
    });
    this._bindTagRemoval(tagsWrap, tagsInput);

    el.querySelector('#b-save').addEventListener('click', ()=>this._save(el));
    el.querySelector('#b-delete')?.addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Excluir exame', message:'Esta ação não pode ser desfeita. Deseja continuar?', confirmLabel:'Excluir', danger:true});
      if(ok){ StorageManager.deleteExam(e.id); Toast.show('Exame excluído.', 'success'); App.instance.router.go('home'); }
    });
    el.querySelector('#b-add-question').addEventListener('click', ()=> QuestionEditorController.openModal(null, (q)=>{
      this.exam.questionIds.push(q.id);
      this._renderForm(el);
      el.querySelector('[data-tab="questions"]').click();
    }));
    el.querySelectorAll('[data-link-q]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const qid = cb.dataset.linkQ;
        if(cb.checked){ if(!this.exam.questionIds.includes(qid)) this.exam.questionIds.push(qid); }
        else { this.exam.questionIds = this.exam.questionIds.filter(id=>id!==qid); }
      });
    });
  }
  _refreshTags(wrap, input){
    wrap.querySelectorAll('.tag-chip').forEach(c=>c.remove());
    this.exam.tags.forEach(t=>{
      const chip = document.createElement('span');
      chip.className='tag-chip';
      chip.innerHTML = `${Util.escapeHtml(t)} <button data-tag="${Util.escapeHtml(t)}">✕</button>`;
      wrap.insertBefore(chip, input);
    });
    this._bindTagRemoval(wrap, input);
  }
  _bindTagRemoval(wrap, input){
    wrap.querySelectorAll('[data-tag]').forEach(btn=>{
      btn.onclick = ()=>{
        this.exam.tags = this.exam.tags.filter(t=>t!==btn.dataset.tag);
        this._refreshTags(wrap, input);
      };
    });
  }
  static _tagChip(t){ return `<span class="tag-chip">${Util.escapeHtml(t)} <button data-tag="${Util.escapeHtml(t)}">✕</button></span>`; }
  static _questionCheckRow(q, checked){
    return `<label class="list-row" style="cursor:pointer">
      <input type="checkbox" data-link-q="${q.id}" ${checked?'checked':''} style="width:16px;height:16px;accent-color:var(--accent)">
      <div class="meta">
        <div class="title">${Util.escapeHtml(q.text.slice(0,90))}</div>
        <div class="desc">${QUESTION_TYPES[q.type]?.label||q.type} · ${Util.escapeHtml(q.category||'sem categoria')}</div>
      </div>
      <span class="badge">${Util.escapeHtml(q.level)}</span>
    </label>`;
  }
  _save(el){
    const e = this.exam;
    e.title = el.querySelector('#f-title').value.trim();
    e.description = el.querySelector('#f-desc').value.trim();
    e.category = el.querySelector('#f-category').value.trim();
    e.code = el.querySelector('#f-code').value.trim();
    e.language = el.querySelector('#f-language').value;
    e.timeMinutes = Number(el.querySelector('#f-time').value)||60;
    e.passScore = Number(el.querySelector('#f-pass').value)||70;
    e.author = el.querySelector('#f-author').value.trim();
    e.version = el.querySelector('#f-version').value.trim();
    e.updatedAt = new Date().toISOString();
    if(!e.trilha) e.trilha = e.category;
    if(!e.materia) e.materia = e.code || e.title.split('—')[0]?.trim() || e.category || 'Personalizado';
    if(!e.title){ Toast.show('Informe o título do exame.', 'error'); el.querySelector('#f-title')?.focus(); return; }
    if(!e.category){ Toast.show('Informe a categoria / trilha.', 'error'); el.querySelector('#f-category')?.focus(); return; }
    if(!e.questionIds.length){ Toast.show('Vincule ao menos 1 questão na aba Questões vinculadas.', 'error'); el.querySelector('[data-tab="questions"]')?.click(); return; }
    StorageManager.upsertExam(e);
    Toast.show('Exame salvo com sucesso.', 'success');
    App.instance.router.go('content', {tab:'certificacoes'});
  }
}

/* ---------- Question Bank ---------- */
class QuestionBankView {
  get title(){ return 'Banco de Questões'; }
  get crumb(){ return ''; }
  render(el){
    this.el = el;
    this._renderList();
  }
  _renderList(filter=''){
    const f = filter.trim().toLowerCase();
    const all = StorageManager.getQuestions();
    const match = q => (q.text+(q.materia||'')+(q.submateria||'')+(q.category||'')+q.tags.join(' ')).toLowerCase().includes(f);
    const content = f
      ? (all.filter(match).length ? all.filter(match).map(q=>this._row(q)).join('') : DashboardView._empty('Nenhuma questão', 'Ajuste a busca.'))
      : this._renderTree(BankHierarchy.groupByExam());
    const activeExam = IncrementalLearningController.getActiveExamId();
    const incStrip = activeExam && StorageManager.getExam(activeExam)
      ? IncrementalLearningController.renderStrip(activeExam)
      : '';
    this.el.innerHTML = `
      ${incStrip}
      <div class="row between" style="margin-bottom:12px;gap:8px">
        <input class="input" id="qb-search" placeholder="${I18n.isEn() ? 'Search track, subject or text…' : 'Buscar por prova, matéria ou texto…'}" value="${Util.escapeHtml(filter)}">
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-sm" id="qb-forge" type="button">${Icons.sparkles} ${I18n.t('lib.forge')}</button>
          <button class="btn btn-sm btn-primary" id="qb-new" type="button">${Icons.plus}</button>
        </div>
      </div>
      <div id="qb-list" class="${f?'':'bank-tree'}">${content}</div>
    `;
    this.el.querySelector('#qb-new').addEventListener('click', ()=>QuestionEditorController.openModal(null, ()=>this._renderList(this.el.querySelector('#qb-search').value)));
    this.el.querySelector('#qb-forge')?.addEventListener('click', ()=> LibraryForge.open(LibraryForge.questionParams()));
    IncrementalLearningController.bindStrip(this.el);
    this.el.querySelector('#qb-search').addEventListener('input', e=>this._renderList(e.target.value));
    this._bindActions(all);
  }
  _renderTree(tree){
    if(!tree.length) return DashboardView._empty('Nenhuma questão', 'Toque + para criar.');
    return tree.map(trilhaNode=>{
      const trilhaTotal = trilhaNode.certs.reduce((s,c)=>s+c.submaterias.reduce((t,sub)=>t+sub.questions.length,0),0);
      const certs = trilhaNode.certs.map(node=>{
        const ex = node.exam;
        const total = node.submaterias.reduce((t,sub)=>t+sub.questions.length,0);
        const subs = node.submaterias.map(sub=>`
          <details class="bank-sub">
            <summary>${Util.escapeHtml(sub.submateria)} <span class="bank-count">${sub.questions.length}</span></summary>
            ${sub.questions.map(q=>this._row(q)).join('')}
          </details>`).join('');
        return `<details class="bank-materia">
          <summary>${Util.escapeHtml(ex.materia||ex.title||'Certificação')} <span class="bank-count">${total} questões</span></summary>
          ${subs}
        </details>`;
      }).join('');
      return `<details class="bank-prova">
        <summary>${Util.escapeHtml(trilhaNode.trilha||'Trilha')} <span class="bank-count">${trilhaTotal} questões</span></summary>
        ${certs}
      </details>`;
    }).join('');
  }
  _bindActions(all){
    this.el.querySelectorAll('[data-fc-q]').forEach(b=>b.addEventListener('click', ()=>{
      const q = all.find(x=>x.id===b.dataset.fcQ);
      if(!q) return;
      FlashcardController.start(1, { scope:'all', questionIds:[q.id] });
    }));
    this.el.querySelectorAll('[data-edit-q]').forEach(b=>b.addEventListener('click', ()=>{
      const q = all.find(x=>x.id===b.dataset.editQ);
      QuestionEditorController.openModal(q, ()=>this._renderList(this.el.querySelector('#qb-search')?.value||''));
    }));
    this.el.querySelectorAll('[data-del-q]').forEach(b=>b.addEventListener('click', async ()=>{
      const ok = await Modal.confirm({title:'Excluir questão', message:'Esta questão será removida do banco.', confirmLabel:'Excluir', danger:true});
      if(ok){ StorageManager.deleteQuestion(b.dataset.delQ); Toast.show('Questão excluída.', 'success'); this._renderList(this.el.querySelector('#qb-search')?.value||''); }
    }));
  }
  _row(q){
    const desc = [q.materia, q.submateria||q.category].filter(Boolean).join(' · ') || 'geral';
    const fc = FSRS.card(q);
    const now = Date.now();
    let fsrsLbl = '';
    if(!fc.reps) fsrsLbl = I18n.isEn() ? 'new' : 'novo';
    else if(fc.due <= now) fsrsLbl = I18n.isEn() ? 'review' : 'revisar';
    const fsrsBadge = fsrsLbl ? `<span class="q-fsrs-badge"> · ${fsrsLbl}</span>` : '';
    return `<div class="list-row list-row-compact">
      <div class="meta">
        <div class="title">${Util.escapeHtml(q.text.slice(0,80)||'(sem enunciado)')}${fsrsBadge}</div>
        <div class="desc">${Util.escapeHtml(desc)}</div>
      </div>
      <button class="btn btn-icon btn-ghost btn-sm" data-fc-q="${q.id}" title="${I18n.isEn() ? 'Study as card' : 'Estudar como card'}">${Icons.play}</button>
      <button class="btn btn-icon btn-ghost btn-sm" data-edit-q="${q.id}">${Icons.edit}</button>
      <button class="btn btn-icon btn-danger btn-sm" data-del-q="${q.id}">${Icons.trash}</button>
    </div>`;
  }
}

/* ---------- Question Editor (modal, shared by Bank & Builder) ---------- */
class QuestionEditorController {
  static openModal(existing, onSaved, opts={}){
    const q = existing ? new Question(existing) : new Question();
    const ctx = opts.context || 'question';
    const forgeParams = opts.forgeParams || null;
    const forgeBanner = (!existing && ctx === 'flashcard') ? `
      <div class="lib-forge-banner">
        <p>${I18n.t('fc.forgeBanner')}</p>
        <button type="button" class="btn btn-sm" id="qe-forge">${Icons.sparkles} ${I18n.t('fc.createAi')}</button>
      </div>` : '';
    const bodyHtml = `
      ${forgeBanner}
      <div class="qtype-grid" id="qtype-grid">
        ${Object.entries(QUESTION_TYPES).map(([key,def])=>`
          <button type="button" class="qtype-btn ${q.type===key?'active':''}" data-type="${key}">${def.icon} ${def.label}</button>
        `).join('')}
      </div>
      <div class="field full"><label>Pergunta</label><textarea class="textarea" id="qe-text" placeholder="Digite o enunciado...">${Util.escapeHtml(q.text)}</textarea></div>
      <div class="field full"><label>Imagem (opcional)</label>
        <input type="file" accept="image/*" id="qe-image">
        <div id="qe-image-preview" style="margin-top:8px">${q.image?`<img src="${q.image}" style="max-width:100%;max-height:140px;border-radius:8px">`:''}</div>
      </div>
      <div id="qe-type-body"></div>
      <div class="form-grid" style="margin-top:6px">
        <div class="field"><label>Matéria</label><input class="input" id="qe-materia" value="${Util.escapeHtml(q.materia)}" placeholder="Ex.: Matemática"></div>
        <div class="field"><label>Sub-matéria</label><input class="input" id="qe-submateria" value="${Util.escapeHtml(q.submateria)}" placeholder="Ex.: Funções"></div>
        <div class="field"><label>Categoria</label><input class="input" id="qe-category" value="${Util.escapeHtml(q.category)}"></div>
        <div class="field"><label>Nível</label>
          <select class="select" id="qe-level">
            <option value="facil" ${q.level==='facil'?'selected':''}>Fácil</option>
            <option value="medio" ${q.level==='medio'?'selected':''}>Médio</option>
            <option value="dificil" ${q.level==='dificil'?'selected':''}>Difícil</option>
          </select>
        </div>
        <div class="field full"><label>Tags (separadas por vírgula)</label><input class="input" id="qe-tags" value="${Util.escapeHtml(q.tags.join(', '))}"></div>
        <div class="field full"><label>Explicação</label><textarea class="textarea" id="qe-explanation">${Util.escapeHtml(q.explanation)}</textarea></div>
        <div class="field full"><label>Comentários</label><textarea class="textarea" id="qe-comments">${Util.escapeHtml(q.comments)}</textarea></div>
      </div>
    `;
    const {el, close} = Modal.open({
      title: existing ? (I18n.isEn() ? 'Edit question' : 'Editar questão') : (ctx === 'flashcard' ? I18n.t('fc.newCardTitle') : (I18n.isEn() ? 'New question' : 'Nova questão')),
      wide:true,
      bodyHtml,
      footerHtml: `<button class="btn btn-ghost" data-cancel>${I18n.t('common.cancel')}</button><button class="btn btn-primary" data-save>${ctx === 'flashcard' ? I18n.t('fc.newCardSave') : (I18n.isEn() ? 'Save question' : 'Salvar questão')}</button>`,
      onMount:(modalEl, closeFn)=>{
        modalEl.querySelector('#qe-forge')?.addEventListener('click', ()=>{
          closeFn();
          LibraryForge.open(forgeParams || LibraryForge.flashcardParams());
        });
        const renderTypeBody = () => this._renderTypeBody(modalEl, q);
        modalEl.querySelectorAll('[data-type]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            q.type = btn.dataset.type;
            modalEl.querySelectorAll('[data-type]').forEach(b=>b.classList.toggle('active', b===btn));
            renderTypeBody();
          });
        });
        renderTypeBody();
        modalEl.querySelector('#qe-image').addEventListener('change', ev=>{
          const file = ev.target.files[0];
          if(!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            q.image = reader.result;
            modalEl.querySelector('#qe-image-preview').innerHTML = `<img src="${reader.result}" style="max-width:100%;max-height:140px;border-radius:8px">`;
          };
          reader.readAsDataURL(file);
        });
        modalEl.querySelector('[data-cancel]').addEventListener('click', closeFn);
        modalEl.querySelector('[data-save]').addEventListener('click', ()=>{
          q.text = modalEl.querySelector('#qe-text').value.trim();
          q.materia = modalEl.querySelector('#qe-materia').value.trim();
          q.submateria = modalEl.querySelector('#qe-submateria').value.trim();
          q.category = modalEl.querySelector('#qe-category').value.trim() || q.submateria;
          q.level = modalEl.querySelector('#qe-level').value;
          q.tags = modalEl.querySelector('#qe-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
          q.explanation = modalEl.querySelector('#qe-explanation').value.trim();
          q.comments = modalEl.querySelector('#qe-comments').value.trim();
          this._collectTypeData(modalEl, q);
          if(!q.text){ Toast.show('Informe o enunciado da questão.', 'error'); return; }
          StorageManager.upsertQuestion(q);
          Toast.show('Questão salva.', 'success');
          closeFn();
          onSaved && onSaved(q);
        });
      }
    });
  }
  static _renderTypeBody(modalEl, q){
    const body = modalEl.querySelector('#qe-type-body');
    if(q.type==='single' || q.type==='multi' || q.type==='image'){
      if(!q.options.length) q.options = [{id:Util.uid('opt'),text:'',correct:true},{id:Util.uid('opt'),text:'',correct:false}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Alternativas</label>
        <div id="alt-rows">${q.options.map((o,i)=>this._altRow(o,i,q.type)).join('')}</div>
        <button type="button" class="btn btn-sm" id="alt-add">${Icons.plus} Adicionar alternativa</button>
      `;
      this._bindAltRows(body, q);
    } else if(q.type==='boolean'){
      if(q.options.length!==2) q.options = [{id:Util.uid('opt'),text:'Verdadeiro',correct:true},{id:Util.uid('opt'),text:'Falso',correct:false}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Resposta correta</label>
        <div id="alt-rows">${q.options.map((o,i)=>this._altRow(o,i,'single', true)).join('')}</div>
      `;
      this._bindAltRows(body, q);
    } else if(q.type==='short'){
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Respostas aceitas (uma por linha)</label>
        <textarea class="textarea" id="short-answers" style="min-height:70px">${q.correctShort.join('\n')}</textarea>
      `;
    } else if(q.type==='matching'){
      if(!q.matchPairs.length) q.matchPairs = [{left:'',right:''},{left:'',right:''}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Pares (coluna A ⇄ coluna B)</label>
        <div id="match-rows">${q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('')}</div>
        <button type="button" class="btn btn-sm" id="match-add">${Icons.plus} Adicionar par</button>
      `;
      this._bindMatchRows(body, q);
    } else if(q.type==='sequence'){
      if(!q.sequenceItems.length) q.sequenceItems = [{text:''},{text:''}];
      body.innerHTML = `
        <label style="font-size:12.5px;font-weight:600;color:var(--text-1)">Itens na ordem correta</label>
        <div id="seq-rows">${q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('')}</div>
        <button type="button" class="btn btn-sm" id="seq-add">${Icons.plus} Adicionar item</button>
      `;
      this._bindSeqRows(body, q);
    }
  }
  static _altRow(o, i, type, radioForced=false){
    const inputType = (type==='multi') ? 'checkbox' : 'radio';
    return `<div class="alt-row" data-idx="${i}">
      <span class="letter">${Question.optionLetter(i)}</span>
      <input type="${inputType}" name="alt-correct" class="radio-check" data-correct-idx="${i}" ${o.correct?'checked':''}>
      <input type="text" class="input" data-text-idx="${i}" value="${Util.escapeHtml(o.text)}" placeholder="Texto da alternativa">
      ${!radioForced ? `<button type="button" class="btn btn-icon btn-ghost" data-remove-idx="${i}">${Icons.trash}</button>` : ''}
    </div>`;
  }
  static _bindAltRows(body, q){
    const wrap = body.querySelector('#alt-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-correct-idx]').forEach(inp=>{
        inp.addEventListener('change', ()=>{
          const idx = Number(inp.dataset.correctIdx);
          if(inp.type==='radio'){ q.options.forEach((o,i)=> o.correct = i===idx); }
          else { q.options[idx].correct = inp.checked; }
        });
      });
      wrap.querySelectorAll('[data-text-idx]').forEach(inp=>{
        inp.addEventListener('input', ()=>{ q.options[Number(inp.dataset.textIdx)].text = inp.value; });
      });
      wrap.querySelectorAll('[data-remove-idx]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          q.options.splice(Number(btn.dataset.removeIdx),1);
          wrap.innerHTML = q.options.map((o,i)=>this._altRow(o,i,q.type)).join('');
          rebind();
        });
      });
    };
    rebind();
    body.querySelector('#alt-add')?.addEventListener('click', ()=>{
      q.options.push({id:Util.uid('opt'), text:'', correct:false});
      wrap.innerHTML = q.options.map((o,i)=>this._altRow(o,i,q.type)).join('');
      rebind();
    });
  }
  static _matchRow(p,i){
    return `<div class="match-row" data-idx="${i}">
      <input type="text" class="input" data-left-idx="${i}" value="${Util.escapeHtml(p.left)}" placeholder="Item A">
      <span>⇄</span>
      <input type="text" class="input" data-right-idx="${i}" value="${Util.escapeHtml(p.right)}" placeholder="Item B (correspondente)">
      <button type="button" class="btn btn-icon btn-ghost" data-remove-match="${i}">${Icons.trash}</button>
    </div>`;
  }
  static _bindMatchRows(body, q){
    const wrap = body.querySelector('#match-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-left-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.matchPairs[Number(inp.dataset.leftIdx)].left = inp.value));
      wrap.querySelectorAll('[data-right-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.matchPairs[Number(inp.dataset.rightIdx)].right = inp.value));
      wrap.querySelectorAll('[data-remove-match]').forEach(btn=> btn.addEventListener('click', ()=>{
        q.matchPairs.splice(Number(btn.dataset.removeMatch),1);
        wrap.innerHTML = q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('');
        rebind();
      }));
    };
    rebind();
    body.querySelector('#match-add')?.addEventListener('click', ()=>{
      q.matchPairs.push({left:'',right:''});
      wrap.innerHTML = q.matchPairs.map((p,i)=>this._matchRow(p,i)).join('');
      rebind();
    });
  }
  static _seqRow(s,i){
    return `<div class="seq-row" data-idx="${i}">
      <span class="letter">${i+1}.</span>
      <input type="text" class="input" data-seq-idx="${i}" value="${Util.escapeHtml(s.text)}" placeholder="Item da sequência">
      <button type="button" class="btn btn-icon btn-ghost" data-remove-seq="${i}">${Icons.trash}</button>
    </div>`;
  }
  static _bindSeqRows(body, q){
    const wrap = body.querySelector('#seq-rows');
    const rebind = () => {
      wrap.querySelectorAll('[data-seq-idx]').forEach(inp=> inp.addEventListener('input', ()=> q.sequenceItems[Number(inp.dataset.seqIdx)].text = inp.value));
      wrap.querySelectorAll('[data-remove-seq]').forEach(btn=> btn.addEventListener('click', ()=>{
        q.sequenceItems.splice(Number(btn.dataset.removeSeq),1);
        wrap.innerHTML = q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('');
        rebind();
      }));
    };
    rebind();
    body.querySelector('#seq-add')?.addEventListener('click', ()=>{
      q.sequenceItems.push({text:''});
      wrap.innerHTML = q.sequenceItems.map((s,i)=>this._seqRow(s,i)).join('');
      rebind();
    });
  }
  static _collectTypeData(modalEl, q){
    if(q.type==='short'){
      const ta = modalEl.querySelector('#short-answers');
      if(ta) q.correctShort = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    }
    // options/matchPairs/sequenceItems já são atualizados via listeners diretamente no objeto q
  }
}

/* ---------- Progress analytics & charts ---------- */
class ProgressAnalytics {
  static KNOWLEDGE_AREAS = [
    { label: 'Legal', keys: ['lgpd','gdpr','legal','regulament','conform','compliance','lei','norma','artigo','juríd'] },
    { label: 'Governança', keys: ['govern','dpo','account','program','política','policy','organiz','privacy office'] },
    { label: 'Técnico', keys: ['segurança','security','iso','cifr','cript','técnic','infosec','27001','si ','controle'] },
    { label: 'Titular', keys: ['direito','rights','dsar','acesso','titular','subject','consent','consentimento','interessado'] },
    { label: 'Transfer.', keys: ['transfer','cross','fronteir','scc','adequa','internacional','binding'] },
    { label: 'Riscos', keys: ['risco','risk','dpia','impact','lia','avaliação','incident','breach','vazamento'] }
  ];
  static summary(){
    const history = StorageManager.getHistory();
    const g = StorageManager.getGame();
    const p = Gamification.progress();
    const avg = history.length ? Math.round(history.reduce((s,h)=>s+(h.percentage||0),0)/history.length) : 0;
    const passed = history.filter(h=>h.passed).length;
    return {history, g, p, avg, passed, attempts: history.length};
  }
  static questionTotals(){
    const stats = StorageManager.getStats();
    let seen = 0, correct = 0;
    Object.values(stats).forEach(s=>{ seen += s.seen||0; correct += s.correct||0; });
    return { seen, correct, accuracy: seen ? Math.round(correct/seen*100) : 0 };
  }
  static masteryScore(){
    const stats = StorageManager.getStats();
    const ids = Object.keys(stats).filter(id => (stats[id].seen||0) > 0);
    if(!ids.length) return { score: 0, seen: 0 };
    let sum = 0;
    ids.forEach(id=>{
      const s = stats[id];
      const acc = (s.correct||0) / s.seen;
      const streakPart = Math.min(s.streak||0, 5) / 5;
      sum += acc * 70 + streakPart * 30;
    });
    return { score: Math.round(sum / ids.length), seen: ids.length };
  }
  static topGap(){
    const areas = this.accuracyByKnowledgeArea().filter(a => a.seen >= 3);
    if(!areas.length) return null;
    const weak = [...areas].sort((a,b)=>a.acc-b.acc)[0];
    return weak.acc < 65 ? weak : null;
  }
  static gapCount(){
    return this.accuracyByKnowledgeArea().filter(a => a.seen >= 3 && a.acc < 65).length;
  }
  static _classifyQuestion(q){
    const blob = `${q.submateria||''} ${q.category||''} ${(q.tags||[]).join(' ')} ${q.materia||''}`.toLowerCase();
    for(const area of this.KNOWLEDGE_AREAS){
      if(area.keys.some(k=>blob.includes(k))) return area.label;
    }
    const sub = (q.submateria || q.category || '').trim();
    if(sub && sub.length <= 14) return sub;
    return 'Geral';
  }
  static accuracyByKnowledgeArea(){
    const map = Object.fromEntries(this.KNOWLEDGE_AREAS.map(a=>[a.label, {seen:0, correct:0}]));
    map.Geral = { seen:0, correct:0 };
    StorageManager.getQuestions().forEach(q=>{
      const s = StorageManager.getStat(q.id);
      if(!s.seen) return;
      const label = this._classifyQuestion(q);
      if(!map[label]) map[label] = { seen:0, correct:0 };
      map[label].seen += s.seen;
      map[label].correct += s.correct;
    });
    return Object.entries(map)
      .filter(([,v])=>v.seen>0)
      .map(([label,v])=>({ label, acc: Math.round(v.correct/v.seen*100), seen: v.seen }))
      .sort((a,b)=>b.seen-a.seen);
  }
  static strongWeak(areas){
    const withData = areas.filter(a=>a.seen>=3);
    if(!withData.length) return { strong:[], weak:[] };
    return {
      strong: [...withData].sort((a,b)=>b.acc-a.acc).filter(a=>a.acc>=65).slice(0,2),
      weak: [...withData].sort((a,b)=>a.acc-b.acc).filter(a=>a.acc<65).slice(0,2)
    };
  }
  static radarAxes(minSeen=3){
    const areas = this.accuracyByKnowledgeArea();
    const core = this.KNOWLEDGE_AREAS.map(a=>a.label);
    const rows = core.map(label=>{
      const hit = areas.find(a=>a.label===label);
      return hit && hit.seen >= minSeen ? hit : { label, acc: 0, seen: hit?.seen||0 };
    }).filter(r=>r.seen>=minSeen);
    if(rows.length>=3) return rows;
    return areas.filter(a=>a.seen>=minSeen).slice(0,6);
  }
  static resultBuckets(history){
    const buckets = {aprovado:0, media:0, baixo:0};
    history.forEach(h=>{
      const pct = h.percentage||0;
      if(pct>=70) buckets.aprovado++;
      else if(pct>=50) buckets.media++;
      else buckets.baixo++;
    });
    return buckets;
  }
  static accuracyByMateria(){
    const map = {};
    StorageManager.getQuestions().forEach(q=>{
      const m = q.materia || 'Outros';
      const s = StorageManager.getStat(q.id);
      if(s.seen===0) return;
      map[m] = map[m] || {seen:0, correct:0};
      map[m].seen += s.seen;
      map[m].correct += s.correct;
    });
    let rows = Object.entries(map).map(([materia,v])=>({materia, acc: Math.round(v.correct/v.seen*100)}));
    if(!rows.length){
      const exams = Object.fromEntries(StorageManager.getExams().map(e=>[e.id,e]));
      StorageManager.getHistory().forEach(h=>{
        const m = exams[h.examId]?.materia || h.examTitle?.split('—')[0]?.trim() || 'Outros';
        map[m] = map[m] || {sum:0, n:0};
        map[m].sum += h.percentage||0;
        map[m].n++;
      });
      rows = Object.entries(map).map(([materia,v])=>({materia, acc: Math.round(v.sum/v.n)}));
    }
    return rows.sort((a,b)=>a.materia.localeCompare(b.materia,'pt-BR')).slice(0,6);
  }
}

class ChartHelpers {
  static pie(segments, size=110){
    const total = segments.reduce((s,x)=>s+x.value,0);
    if(!total) return `<div class="chart-empty">Sem dados ainda</div>`;
    const cx=size/2, cy=size/2, r=size*0.38;
    let angle = -Math.PI/2;
    const slices = segments.filter(s=>s.value>0).map(s=>{
      const slice = (s.value/total)*Math.PI*2;
      const x1 = cx + r*Math.cos(angle);
      const y1 = cy + r*Math.sin(angle);
      angle += slice;
      const x2 = cx + r*Math.cos(angle);
      const y2 = cy + r*Math.sin(angle);
      const large = slice > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      return `<path d="${d}" fill="${s.color}"/>`;
    }).join('');
    const legend = segments.filter(s=>s.value>0).map(s=>`<span style="color:${s.color}">●</span> ${s.label} ${s.value}`).join(' · ');
    return `<svg class="chart-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${slices}</svg><div class="chart-legend">${legend}</div>`;
  }
  static radar(labels, values, size=200){
    if(!labels.length) return `<div class="chart-empty">Responda questões em simulados ou treinos para mapear seus domínios de conhecimento.<br><span style="font-size:11px;opacity:.85">Mínimo: 3 respostas por área.</span></div>`;
    const cx=size/2, cy=size/2, maxR=size*0.34, n=labels.length;
    const pt = (i,v)=>{ const a = -Math.PI/2 + (Math.PI*2*i/n); const r = maxR*(Math.max(0,Math.min(100,v))/100); return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
    const rings = [25,50,75,100].map(p=>{
      const pts = labels.map((_,i)=>pt(i,p).join(',')).join(' ');
      return `<polygon points="${pts}" fill="none" stroke="var(--border-soft)" stroke-width="1"/>`;
    }).join('');
    const axes = labels.map((_,i)=>{ const [x,y]=pt(i,100); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border-soft)" stroke-width="1"/>`; }).join('');
    const dataPts = labels.map((_,i)=>pt(i,values[i]||0).join(',')).join(' ');
    const dots = labels.map((_,i)=>{ const [x,y]=pt(i,values[i]||0); return `<circle cx="${x}" cy="${y}" r="3.5" fill="var(--accent)"/>`; }).join('');
    const lbls = labels.map((lb,i)=>{ const [x,y]=pt(i,112); const short = lb.length>10 ? lb.slice(0,9)+'…' : lb; return `<text x="${x}" y="${y}" text-anchor="middle" class="chart-radar-label">${Util.escapeHtml(short)}</text>`; }).join('');
    const pctLabels = labels.map((_,i)=>{ const [x,y]=pt(i,values[i]||0); const ox=(x-cx)*0.12+cx, oy=(y-cy)*0.12+cy; return values[i]>0?`<text x="${ox}" y="${oy}" text-anchor="middle" font-size="8" font-weight="600" fill="var(--text-0)">${values[i]}%</text>`:''; }).join('');
    return `<svg class="chart-svg chart-radar" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="Gráfico de domínios">${rings}${axes}<polygon points="${dataPts}" fill="rgba(123,92,255,.22)" stroke="var(--accent)" stroke-width="2"/>${dots}${pctLabels}${lbls}</svg>`;
  }
  static gauge(value, size=120){
    const pct = Math.max(0, Math.min(100, value||0));
    const cx=size/2, cy=size*0.58, r=size*0.38;
    const start = Math.PI, end = 0;
    const needleAngle = Math.PI + (pct/100)*Math.PI;
    const nx = cx + r*0.82*Math.cos(needleAngle);
    const ny = cy + r*0.82*Math.sin(needleAngle);
    const color = pct>=70?'var(--good)':pct>=50?'var(--warn)':'var(--bad)';
    const arc = (a1,a2,col)=>{ const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2); return `<path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"/>`; };
    return `<svg class="chart-svg" width="${size}" height="${size*0.72}" viewBox="0 0 ${size} ${size*0.72}">
      ${arc(start, start+Math.PI*0.5, 'var(--bad)')}
      ${arc(start+Math.PI*0.5, start+Math.PI*0.7, 'var(--warn)')}
      ${arc(start+Math.PI*0.7, end, 'var(--good)')}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="var(--text-0)"/>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="16" font-weight="700" fill="${color}">${pct}%</text>
    </svg><div class="chart-legend">Média geral</div>`;
  }
  static sparkline(history, width=320, height=72){
    const recent = history.slice(0, 12).reverse();
    if(!recent.length) return `<div class="chart-empty">Complete um simulado para ver sua evolução.</div>`;
    const pad = 4;
    const barGap = 4;
    const barW = Math.max(8, (width - pad*2 - (recent.length - 1) * barGap) / recent.length);
    const maxH = height - 24;
    const bars = recent.map((h,i)=>{
      const hgt = Math.max(2, (h.percentage / 100) * maxH);
      const x = pad + i * (barW + barGap);
      const y = height - 16 - hgt;
      const cls = h.percentage >= 70 ? 'good' : h.percentage >= 50 ? 'warn' : 'bad';
      return `<rect x="${x}" y="${y}" width="${barW}" height="${hgt}" rx="2" class="chart-bar-${cls}"><title>${h.percentage}%</title></rect>`;
    }).join('');
    return `<svg class="chart-spark" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
  }
}

ChartHelpers.bars = function(rows, maxLabel=12){
  if(!rows.length) return `<div class="chart-empty">Sem dados ainda</div>`;
  return rows.map(r=>{
    const pct = Math.max(0, Math.min(100, r.value||0));
    const color = pct>=70?'var(--good)':pct>=50?'var(--warn)':'var(--bad)';
    const lbl = Util.escapeHtml(String(r.label||'').slice(0,maxLabel));
    return `<div class="progress-bar-row"><span class="lbl" title="${lbl}">${lbl}</span><div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="val">${pct}%</span></div>`;
  }).join('');
};

ChartHelpers.weekActivity = function(history){
  const days = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - (6-i));
    return { key:d.toISOString().slice(0,10), label:d.toLocaleDateString(I18n.locale(), {weekday:'short'}), count:0 };
  });
  history.forEach(h=>{
    const key = (h.date||'').slice(0,10);
    const slot = days.find(d=>d.key===key);
    if(slot) slot.count++;
  });
  const max = Math.max(1, ...days.map(d=>d.count));
  const w = 280, h = 72, pad = 8;
  const barW = (w - pad*2) / 7 - 4;
  const bars = days.map((d,i)=>{
    const bh = Math.max(2, (d.count / max) * (h - 24));
    const x = pad + i * (barW + 4);
    const y = h - 16 - bh;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="2" fill="var(--accent)" opacity="${d.count?1:.25}"><title>${d.label}: ${d.count}</title></rect><text x="${x+barW/2}" y="${h-4}" text-anchor="middle" font-size="9" fill="var(--text-2)">${Util.escapeHtml(d.label.slice(0,3))}</text>`;
  }).join('');
  return `<svg class="chart-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
};

/* ---------- Demo progress (settings) ---------- */
class DemoProgressSeeder {
  static META_KEY = 'ef_demo_progress_meta';
  static hasDemo(){
    try{ return !!localStorage.getItem(this.META_KEY); }catch(e){ return false; }
  }
  static _meta(){ try{ return JSON.parse(localStorage.getItem(this.META_KEY)||'null'); }catch(e){ return null; } }
  static _saveMeta(m){ try{ localStorage.setItem(this.META_KEY, JSON.stringify(m)); }catch(e){} }
  static run(){
    if(this.hasDemo()) this.clear();
    const exams = StorageManager.getExams().filter(e=>e.questionIds?.length);
    const exam = exams[0] || StorageManager.getExams()[0];
    if(!exam) { Toast.show('Adicione conteúdo ou recarregue a página antes de gerar demo.', 'warn'); return; }
    const allQs = StorageManager.getQuestions();
    const byArea = { Legal:[], Governança:[], Técnico:[], Titular:[], 'Transfer.':[], Riscos:[] };
    allQs.forEach(q=>{
      const blob = `${q.submateria||''} ${q.category||''} ${(q.tags||[]).join(' ')}`.toLowerCase();
      if(/lgpd|gdpr|legal|regulament|lei/.test(blob)) byArea.Legal.push(q.id);
      else if(/govern|dpo|política|policy/.test(blob)) byArea.Governança.push(q.id);
      else if(/segurança|security|iso|27001/.test(blob)) byArea.Técnico.push(q.id);
      else if(/direito|rights|consent|titular/.test(blob)) byArea.Titular.push(q.id);
      else if(/transfer|cross|fronteir|internacional/.test(blob)) byArea['Transfer.'].push(q.id);
      else if(/risco|risk|dpia|incident/.test(blob)) byArea.Riscos.push(q.id);
    });
    const pick = (arr,n)=>arr.slice(0,n);
    const targets = {
      Legal: { ids: pick(byArea.Legal, 12), acc: 0.82 },
      Governança: { ids: pick(byArea.Governança, 10), acc: 0.74 },
      Técnico: { ids: pick(byArea.Técnico, 10), acc: 0.48 },
      Titular: { ids: pick(byArea.Titular, 8), acc: 0.58 },
      'Transfer.': { ids: pick(byArea['Transfer.'], 8), acc: 0.42 },
      Riscos: { ids: pick(byArea.Riscos, 8), acc: 0.52 }
    };
    const stats = StorageManager.getStats();
    const demoQids = [];
    Object.values(targets).forEach(({ids, acc})=>{
      ids.forEach(qid=>{
        demoQids.push(qid);
        const seen = 8 + Math.floor(Math.random()*6);
        const correct = Math.round(seen * acc);
        stats[qid] = {
          seen, correct,
          streak: acc >= 0.7 ? 3 : 0,
          ease: acc >= 0.7 ? 2.5 : 1.6,
          due: Date.now() + (acc < 0.6 ? -3600000 : 86400000 * 2),
          last: Date.now() - 86400000
        };
      });
    });
    StorageManager.saveStats(stats);
    const histIds = [];
    const history = StorageManager.getHistory();
    const pctSeries = [52, 58, 61, 55, 68, 72, 66, 74, 78, 71];
    pctSeries.forEach((pct, i)=>{
      const id = Util.uid('hist_demo');
      histIds.push(id);
      const total = 15;
      const correctCount = Math.round(total * pct / 100);
      history.unshift({
        id, examId: exam.id,
        examTitle: `[Demo] ${exam.materia || exam.title} — sessão ${i+1}`,
        date: new Date(Date.now() - (pctSeries.length - i) * 86400000 * 1.4).toISOString(),
        correctCount, totalCount: total, percentage: pct,
        timeSpentSeconds: 720 + i * 40,
        passed: pct >= 70,
        markedCount: Math.floor(Math.random()*3),
        detail: []
      });
    });
    StorageManager._set(StorageManager.KEYS.HISTORY, history);
    const fsrs = FSRS.all();
    demoQids.slice(0, 20).forEach((qid, i)=>{
      const weak = i % 3 === 0;
      fsrs[qid] = {
        due: weak ? Date.now() - 60000 : Date.now() + 86400000,
        stability: weak ? 1.2 : 4 + i * 0.2,
        difficulty: weak ? 7.5 : 4,
        reps: 3 + (i % 4),
        lapses: weak ? 2 : 0,
        state: weak ? 'learning' : 'review',
        last: Date.now() - 86400000,
        correct: weak ? 1 : 3
      };
    });
    FSRS.save(fsrs);
    const g = StorageManager.getGame();
    g.xp = Math.max(g.xp, 420);
    g.level = Math.max(g.level, 3);
    g.bestStreak = Math.max(g.bestStreak, 5);
    g.examsCompleted = Math.max(g.examsCompleted, pctSeries.length);
    g.totalCorrect = Math.max(g.totalCorrect, 85);
    g.lastActive = new Date().toISOString();
    StorageManager.saveGame(g);
    this._saveMeta({ histIds, qids: demoQids });
  }
  static clear(){
    const meta = this._meta();
    if(!meta) return;
    const drop = new Set(meta.histIds || []);
    StorageManager._set(StorageManager.KEYS.HISTORY, StorageManager.getHistory().filter(h=>!drop.has(h.id)));
    const stats = StorageManager.getStats();
    (meta.qids || []).forEach(qid=>{ delete stats[qid]; });
    StorageManager.saveStats(stats);
    const fsrs = FSRS.all();
    (meta.qids || []).forEach(qid=>{ delete fsrs[qid]; });
    FSRS.save(fsrs);
    try{ localStorage.removeItem(this.META_KEY); }catch(e){}
  }
}
